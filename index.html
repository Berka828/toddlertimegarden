```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM MediaPipe Interactive Meadow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Overlays */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        .bxcm-logo {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .c-y { color: #FFC107; } .c-o { color: #FF5722; } .c-m { color: #E91E63; }
        .c-g { color: #4CAF50; } .c-b { color: #2196F3; }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 2rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            z-index: 30;
        }

        video { display: none; } /* Used internally by MediaPipe */
    </style>
    
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="loading" class="pulse">Loading AI Tracking & Scene...</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div style="text-shadow: 1px 1px 2px black;">Touch the Sun, the Cloud, or the Flower! (Press F for Fullscreen)</div>
    </div>

    <!-- Hidden Video for AI Processing -->
    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 10, 30);
        camera.lookAt(0, 8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB, 1);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // --- INTERACTIVE QUADRANTS & ELEMENTS ---
        // 1. The Sun (Top Left)
        const sunGeo = new THREE.SphereGeometry(3, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFC107 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(-18, 20, -10);
        scene.add(sun);
        let sunActive = false;

        // 2. The Rain Cloud (Top Right)
        const cloudGroup = new THREE.Group();
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0 });
        [[-2,0,0], [2,0,0], [0,2,0], [-3,-1,1], [3,-1,-1]].forEach(pos => {
            const puff = new THREE.Mesh(new THREE.SphereGeometry(2.5, 16, 16), cloudMat);
            puff.position.set(...pos);
            cloudGroup.add(puff);
        });
        cloudGroup.position.set(18, 20, -10);
        scene.add(cloudGroup);
        let rainActive = false;

        // Rain Particles
        const rainCount = 1000;
        const rainGeo = new THREE.BufferGeometry();
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = (Math.random() - 0.5) * 15;
            rainPos[i*3+1] = Math.random() * 20;
            rainPos[i*3+2] = (Math.random() - 0.5) * 5;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0xaaaaFF, size: 0.3, transparent: true, opacity: 0 });
        const rainSys = new THREE.Points(rainGeo, rainMat);
        rainSys.position.set(18, 0, -10);
        scene.add(rainSys);

        // 3. The Giant Flower (Center)
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, -5);
        scene.add(flowerGroup);

        const stemGeo = new THREE.CylinderGeometry(0.3, 0.5, 12, 16);
        stemGeo.translate(0, 6, 0);
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 12;
        flowerGroup.add(flowerHead);

        const petalGeo = new THREE.ConeGeometry(2, 6, 16);
        petalGeo.translate(0, 3, 0);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63 });
        const petals = [];
        for (let i = 0; i < 12; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.z = (i / 12) * Math.PI * 2;
            petal.rotation.x = 0.2; // closed initially
            petal.userData.baseRotZ = petal.rotation.z;
            flowerHead.add(petal);
            petals.push(petal);
        }
        const center = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 16), new THREE.MeshStandardMaterial({ color: 0xFF5722 }));
        flowerHead.add(center);
        let flowerActiveLevel = 0;

        // --- GRASS SYSTEM ---
        const numGrass = 20000;
        const grassGeo = new THREE.PlaneGeometry(0.15, 3.5);
        grassGeo.translate(0, 1.75, 0);
        
        const grassMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color1: { value: new THREE.Color(0x2d5a27) },
                color2: { value: new THREE.Color(0x55aa55) },
                playerPos: { value: new THREE.Vector3(0,0,0) }
            },
            vertexShader: `
                uniform float time;
                uniform vec3 playerPos;
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    vec3 pos = position;
                    
                    // Basic wind
                    float wind = sin(time * 2.0 + instanceMatrix[3][0] * 0.1) * 0.1;
                    
                    // Player interaction (bend away from player)
                    vec3 worldPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                    float dist = distance(worldPos.xz, playerPos.xz);
                    float bend = smoothstep(6.0, 0.0, dist);
                    
                    if(pos.y > 0.0) {
                        pos.x += wind * pos.y;
                        pos.x += sign(worldPos.x - playerPos.x) * bend * pos.y * 0.5;
                        pos.z += sign(worldPos.z - playerPos.z) * bend * pos.y * 0.5;
                    }
                    
                    gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 color1;
                uniform vec3 color2;
                varying vec2 vUv;
                void main() {
                    gl_FragColor = vec4(mix(color1, color2, vUv.y), 1.0);
                }
            `,
            side: THREE.DoubleSide
        });

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i=0; i<numGrass; i++) {
            dummy.position.set((Math.random()-0.5)*60, 0, (Math.random()-0.5)*20 - 5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(grassMesh);

        // --- SILHOUETTE MESH (Perfect AI Cutout) ---
        const silCanvas = document.createElement('canvas');
        silCanvas.width = 640; silCanvas.height = 480;
        const silCtx = silCanvas.getContext('2d');
        const silTex = new THREE.CanvasTexture(silCanvas);
        silTex.colorSpace = THREE.SRGBColorSpace;

        const silGeo = new THREE.PlaneGeometry(48, 36);
        const silMat = new THREE.MeshBasicMaterial({ map: silTex, transparent: true, side: THREE.DoubleSide });
        const silMesh = new THREE.Mesh(silGeo, silMat);
        silMesh.position.set(0, 16, 2); // Positioned nicely in the field
        scene.add(silMesh);

        // Hand Trackers (Visual feedback for kids)
        const trackerGeo = new THREE.SphereGeometry(1, 16, 16);
        const trackerMat = new THREE.MeshBasicMaterial({ color: 0x00FF00, transparent: true, opacity: 0.6 });
        const leftHandTracker = new THREE.Mesh(trackerGeo, trackerMat);
        const rightHandTracker = new THREE.Mesh(trackerGeo, trackerMat);
        scene.add(leftHandTracker);
        scene.add(rightHandTracker);


        // --- MEDIAPIPE AI SETUP ---
        const videoElement = document.getElementById('webcam');
        let playerWorldPos = new THREE.Vector3(0,0,0);

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: true, // Crucial for silhouette
            smoothSegmentation: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            // 1. Draw Perfect Silhouette
            silCtx.save();
            silCtx.clearRect(0, 0, 640, 480);
            if (results.segmentationMask) {
                // Draw mask
                silCtx.drawImage(results.segmentationMask, 0, 0, 640, 480);
                // Cutout webcam feed
                silCtx.globalCompositeOperation = 'source-in';
                silCtx.drawImage(results.image, 0, 0, 640, 480);
                
                // Add brand-color tint for stylized silhouette
                silCtx.globalCompositeOperation = 'source-atop';
                silCtx.fillStyle = 'rgba(33, 150, 243, 0.2)'; 
                silCtx.fillRect(0, 0, 640, 480);
            }
            silCtx.restore();
            silTex.needsUpdate = true;

            // 2. Track Hands for Interaction
            if (results.poseLandmarks) {
                const leftWrist = results.poseLandmarks[15];
                const rightWrist = results.poseLandmarks[16];
                const bodyCenter = results.poseLandmarks[24]; // Hip for grass interaction

                if (leftWrist && leftWrist.visibility > 0.5) {
                    // Map AI coords to Three.js World (Mirror X)
                    leftHandTracker.position.set((0.5 - leftWrist.x) * 48, (1 - leftWrist.y) * 36, 2);
                }
                if (rightWrist && rightWrist.visibility > 0.5) {
                    rightHandTracker.position.set((0.5 - rightWrist.x) * 48, (1 - rightWrist.y) * 36, 2);
                }
                if(bodyCenter) {
                     playerWorldPos.set((0.5 - bodyCenter.x) * 48, 0, 2);
                }

                checkInteractions();
            }
        });

        const cameraMP = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraMP.start();


        // --- INTERACTION LOGIC ---
        function checkInteractions() {
            // Check Sun (Top Left)
            const dLeftSun = leftHandTracker.position.distanceTo(sun.position);
            const dRightSun = rightHandTracker.position.distanceTo(sun.position);
            sunActive = (dLeftSun < 6 || dRightSun < 6);

            // Check Rain Cloud (Top Right)
            const dLeftCloud = leftHandTracker.position.distanceTo(cloudGroup.position);
            const dRightCloud = rightHandTracker.position.distanceTo(cloudGroup.position);
            rainActive = (dLeftCloud < 8 || dRightCloud < 8);

            // Check Flower (Center)
            const dLeftFlower = leftHandTracker.position.distanceTo(flowerHead.position);
            const dRightFlower = rightHandTracker.position.distanceTo(flowerHead.position);
            
            if (dLeftFlower < 8 || dRightFlower < 8) {
                flowerActiveLevel += 0.05;
            } else {
                flowerActiveLevel -= 0.02;
            }
            flowerActiveLevel = THREE.MathUtils.clamp(flowerActiveLevel, 0, 1);
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            grassMat.uniforms.time.value = time;
            grassMat.uniforms.playerPos.value.copy(playerWorldPos);

            // Sun Animation
            if(sunActive) {
                sun.scale.setScalar(1.2 + Math.sin(time*10)*0.1);
                scene.fog.color.setHex(0xFFD700);
                renderer.setClearColor(0xFFD700, 1);
            } else {
                sun.scale.setScalar(1.0);
                scene.fog.color.lerp(new THREE.Color(0x87CEEB), 0.05);
                renderer.setClearColor(scene.fog.color, 1);
            }

            // Rain Animation
            if(rainActive) {
                rainMat.opacity = 0.6;
                cloudMat.color.setHex(0xaaaaaa);
                const positions = rainGeo.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    positions[i*3+1] -= 0.5;
                    if(positions[i*3+1] < 0) positions[i*3+1] = 20;
                }
                rainGeo.attributes.position.needsUpdate = true;
            } else {
                rainMat.opacity = 0;
                cloudMat.color.setHex(0xffffff);
            }

            // Flower Bloom Animation
            flowerGroup.rotation.z = Math.sin(time * 2) * 0.05 * flowerActiveLevel;
            petals.forEach((petal, i) => {
                // Open wide based on interaction level
                const targetRotX = THREE.MathUtils.lerp(0.2, 1.8, flowerActiveLevel);
                petal.rotation.x += (targetRotX - petal.rotation.x) * 0.1;
                // Add flutter
                petal.rotation.x += Math.sin(time * 5 + i) * 0.05 * flowerActiveLevel;
            });

            renderer.render(scene, camera);
        }

        animate();

        // Fullscreen Handling
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
