<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM Interactive Grass Garden</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Overlays */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        .bxcm-logo {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        /* BxCM Brand Colors */
        .c-y { color: #FFC107; }
        .c-o { color: #FF5722; }
        .c-m { color: #E91E63; }
        .c-g { color: #4CAF50; }
        .c-b { color: #2196F3; }

        #camera-settings {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            max-width: 300px;
            margin-top: 15px;
        }

        select {
            padding: 8px;
            font-size: 1rem;
            border-radius: 4px;
            margin-top: 5px;
            width: 100%;
            background: #222;
            color: white;
            border: 1px solid #555;
        }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            z-index: 10;
            display: none; 
        }

        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <label for="camera-select">🎥 Select Sensor/Camera:</label>
            <select id="camera-select">
                <option value="">Loading cameras...</option>
            </select>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="motion-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Configuration & State ---
        const config = {
            motionSensitivity: 30,
            plantDensity: 1.5,
            plantLifespan: 600,
            showWebcam: false,
            shadowOpacity: 0.35,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        const brandColors = [0xFFC107, 0xFF5722, 0xE91E63, 0x2196F3, 0x9C27B0]; // Excluded green to pop against grass
        const plants = [];

        // --- Setup Admin GUI ---
        const gui = new GUI({ title: '🌿 Garden Settings' });
        const motionFolder = gui.addFolder('Sensor & Interaction');
        motionFolder.add(config, 'motionSensitivity', 10, 80, 1).name('Motion Sensitivity');
        motionFolder.add(config, 'plantDensity', 0.5, 4, 0.1).name('Plant Density');
        motionFolder.add(config, 'plantLifespan', 200, 1500, 10).name('Time Before Fading');
        motionFolder.add(config, 'shadowOpacity', 0, 1, 0.05).name('Kids Shadow Opacity').onChange(v => {
            if(silhouetteMat) silhouetteMat.opacity = v;
        });
        motionFolder.add(config, 'showWebcam').name('Show Webcam UI').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Setup Three.js Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background
        scene.fog = new THREE.Fog(0x87CEEB, 20, 60);

        // Angled perspective to see the 3D depth of the grass/flowers
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -10, 25); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Enable shadows for a realistic look
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 15, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        scene.add(dirLight);

        // --- Ground Plane ---
        const groundGeo = new THREE.PlaneGeometry(80, 60);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x4CAF50, // Rich grass green
            roughness: 0.8,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Video Silhouette Layer (As a Natural Shadow) ---
        const video = document.getElementById('webcam');
        let videoTexture, silhouetteMat;

        function initSilhouette() {
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.colorSpace = THREE.SRGBColorSpace;

            // Multiply blending makes the video act like a dark shadow cast on the ground
            silhouetteMat = new THREE.MeshBasicMaterial({ 
                map: videoTexture, 
                color: 0x000000, 
                transparent: true, 
                opacity: config.shadowOpacity,
                blending: THREE.MultiplyBlending 
            });

            const silGeo = new THREE.PlaneGeometry(55, 35);
            const silPlane = new THREE.Mesh(silGeo, silhouetteMat);
            silPlane.position.set(0, 0, 0.1); // Slightly above ground
            silPlane.scale.x = -1; // Mirror to match movement
            scene.add(silPlane);
        }

        // --- Plant Geometries ---
        const centerGeo = new THREE.SphereGeometry(0.2, 12, 12);
        const petalGeo = new THREE.SphereGeometry(0.3, 12, 12);
        petalGeo.scale(1, 0.2, 2);
        
        // Grass blade geometry
        const grassGeo = new THREE.ConeGeometry(0.08, 1.5, 4);
        grassGeo.translate(0, 0.75, 0); // Pivot at the bottom
        grassGeo.rotateX(Math.PI / 2);

        function createPlant(x, y) {
            const plantGroup = new THREE.Group();
            const isFlower = Math.random() > 0.6; // 40% chance for a flower, 60% for grass clumps

            const targetScale = 0.8 + Math.random() * 0.7;

            if (isFlower) {
                const colorHex = brandColors[Math.floor(Math.random() * brandColors.length)];
                
                // Flower Center
                const centerMat = new THREE.MeshStandardMaterial({ color: 0xFFD54F, roughness: 0.5 });
                const center = new THREE.Mesh(centerGeo, centerMat);
                center.position.z = 0.5;
                center.castShadow = true;
                plantGroup.add(center);

                // Petals
                const petalMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4 });
                const numPetals = 6 + Math.floor(Math.random() * 3);
                for(let i=0; i<numPetals; i++) {
                    const petal = new THREE.Mesh(petalGeo, petalMat);
                    const angle = (i / numPetals) * Math.PI * 2;
                    petal.position.x = Math.cos(angle) * 0.4;
                    petal.position.y = Math.sin(angle) * 0.4;
                    petal.position.z = 0.4;
                    petal.rotation.z = angle;
                    petal.rotation.x = 0.2; 
                    petal.castShadow = true;
                    plantGroup.add(petal);
                }
                
                // Stem
                const stemGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
                stemGeo.rotateX(Math.PI / 2);
                stemGeo.translate(0, 0, 0.5);
                const stemMat = new THREE.MeshStandardMaterial({ color: 0x388E3C });
                const stem = new THREE.Mesh(stemGeo, stemMat);
                stem.castShadow = true;
                plantGroup.add(stem);

            } else {
                // Tall Grass Clump
                const grassMat = new THREE.MeshStandardMaterial({ color: 0x43A047, roughness: 0.8 });
                const numBlades = 3 + Math.floor(Math.random() * 4);
                for(let i=0; i<numBlades; i++) {
                    const blade = new THREE.Mesh(grassGeo, grassMat);
                    blade.position.set((Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3, 0);
                    blade.rotation.z = (Math.random() - 0.5) * 0.5;
                    blade.rotation.y = (Math.random() - 0.5) * 0.5;
                    blade.castShadow = true;
                    plantGroup.add(blade);
                }
            }

            plantGroup.position.set(x, y, 0);
            plantGroup.scale.set(0, 0, 0); 
            plantGroup.rotation.z = Math.random() * Math.PI;

            // Sway physics offset
            plantGroup.userData = {
                swayOffset: Math.random() * Math.PI * 2,
                swaySpeed: 0.02 + Math.random() * 0.02
            };

            scene.add(plantGroup);
            plants.push({ mesh: plantGroup, targetScale: targetScale, age: 0, state: 'growing' });
        }

        // --- Camera & Motion Setup ---
        const cameraSelect = document.getElementById('camera-select');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

        const GRID_W = 60; 
        const GRID_H = 40;
        motionCanvas.width = GRID_W;
        motionCanvas.height = GRID_H;

        let prevFrame = null;
        let currentStream = null;

        const wallWidth = 45;
        const wallHeight = 30;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) {
                cameraSelect.innerHTML = '<option>Permission Denied/Error</option>';
            }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
                });
                video.srcObject = currentStream;
                initSilhouette();
            } catch (err) { console.error(err); }
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Motion Tracking ---
        function checkMotion() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currentFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y+=2) { 
                    for (let x = 0; x < GRID_W; x+=2) {
                        const i = (y * GRID_W + x) * 4;

                        const rDiff = Math.abs(currentFrame[i] - prevFrame[i]);
                        const gDiff = Math.abs(currentFrame[i+1] - prevFrame[i+1]);
                        const bDiff = Math.abs(currentFrame[i+2] - prevFrame[i+2]);

                        if (rDiff + gDiff + bDiff > config.motionSensitivity) {

                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const normY = -( (y / GRID_H) * 2 - 1 );

                            const worldX = normX * (wallWidth / 2);
                            const worldY = normY * (wallHeight / 2);

                            // Check distance to existing plants to avoid overcrowding
                            let tooClose = false;
                            for(let p of plants) {
                                const dist = Math.hypot(p.mesh.position.x - worldX, p.mesh.position.y - worldY);
                                if(dist < config.plantDensity && p.state !== 'shrinking') {
                                    tooClose = true;
                                    break;
                                }
                            }

                            if(!tooClose) {
                                createPlant(worldX, worldY);
                            }
                        }
                    }
                }
            }
            prevFrame = new Uint8ClampedArray(currentFrame);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            checkMotion();

            const time = Date.now();

            // Animate Plants
            for(let i = plants.length - 1; i >= 0; i--) {
                let p = plants[i];
                p.age++;

                // Gentle wind sway
                p.mesh.rotation.x = Math.sin(time * p.mesh.userData.swaySpeed + p.mesh.userData.swayOffset) * 0.1;
                p.mesh.rotation.y = Math.cos(time * p.mesh.userData.swaySpeed + p.mesh.userData.swayOffset) * 0.1;

                if(p.state === 'growing') {
                    p.mesh.scale.lerp(new THREE.Vector3(p.targetScale, p.targetScale, p.targetScale), 0.1);
                    if(p.targetScale - p.mesh.scale.x < 0.05) p.state = 'blooming';
                } 
                else if (p.state === 'blooming') {
                    if(p.age > config.plantLifespan) p.state = 'shrinking';
                }
                else if (p.state === 'shrinking') {
                    p.mesh.scale.multiplyScalar(0.92);
                    if(p.mesh.scale.x < 0.05) {
                        scene.remove(p.mesh);
                        plants.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // --- Fullscreen and UI Logic ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            const videoContainer = document.getElementById('video-container');

            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
                videoContainer.style.display = 'none';
                gui.hide();
            } else {
                uiOverlay.style.display = 'block';
                if(config.showWebcam) videoContainer.style.display = 'block';
                gui.show();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        getCameras();
        animate();
    </script>
</body>
</html>
