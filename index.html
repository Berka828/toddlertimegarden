<body>

    <div id="center-message" class="pulse">Step away to calibrate...<br>Then run in to bloom the flower!</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <label for="camera-select">🎥 Select Sensor/Camera:</label>
            <select id="camera-select">
                <option value="">Loading cameras...</option>

            <button id="calibrate-btn">📸 Calibrate Background</button>
            <div style="font-size: 0.8rem; margin-top: 5px; color: #ccc;">
                *Click when no one is in the frame to cut out the silhouettes!
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="motion-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Configuration ---
        const config = {
            motionSensitivity: 20, 
            bgThreshold: 0.15, 
            showWebcam: false,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        let hasStarted = false;

        // --- GUI ---
        const gui = new GUI({ title: '🌸 Meadow Admin Panel' });
        gui.add(config, 'motionSensitivity', 5, 100, 1).name('Motion Tracking Sens.');
        gui.add(config, 'bgThreshold', 0.05, 0.5, 0.01).name('Silhouette Cutout Sens.');
        gui.add(config, 'showWebcam').name('Show Webcam Feed').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xffe4e1, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 10, 32); 
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffe4e1, 1); 
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // --- Environment Objects (Placed IN FRONT of the player) ---
        // Decorative Sun
        const sunGeo = new THREE.CircleGeometry(8, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff0aa, fog: false });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(-18, 22, -10); // Placed at z=-10
        scene.add(sun);

        // Decorative Cloud
        const cloudGroup = new THREE.Group();
        const cloudGeo = new THREE.SphereGeometry(3, 16, 16);
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1.0, flatShading: true });
        
        const c1 = new THREE.Mesh(cloudGeo, cloudMat); c1.position.set(0, 0, 0);
        const c2 = new THREE.Mesh(cloudGeo, cloudMat); c2.position.set(-3, -1, 1); c2.scale.setScalar(0.8);
        const c3 = new THREE.Mesh(cloudGeo, cloudMat); c3.position.set(3, -1, -1); c3.scale.setScalar(0.9);
        cloudGroup.add(c1, c2, c3);
        cloudGroup.position.set(15, 20, -5); // Placed at z=-5
        scene.add(cloudGroup);

        // --- Grass Wind Map ---
        const mapSize = 512;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        // --- Realistic Instanced Grass ---
        const numGrass = 40000;
        const grassGeo = new THREE.PlaneGeometry(0.15, 3.0, 1, 4);
        grassGeo.translate(0, 1.5, 0); 

        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            side: THREE.DoubleSide,
            roughness: 0.8
        });

        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;

            shader.vertexShader = `
                uniform float time;
                uniform sampler2D windMap;
                varying vec2 vMyUv;
            ` + shader.vertexShader;

            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);

                vec2 mapUv = vec2((instPos.x + 30.0) / 60.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;

                float naturalWind = sin(time * 2.0 + instPos.x * 0.5 + instPos.z * 0.5) * 0.15;

                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 2.5 * position.y;
                    transformed.z -= windForce * 2.5 * position.y;
                    transformed.y -= windForce * 1.0 * position.y; 
                }
                `
            );

            shader.fragmentShader = `
                varying vec2 vMyUv;
            ` + shader.fragmentShader;

            shader.fragmentShader = shader.fragmentShader.replace(
                `#include <color_fragment>`,
                `
                #include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.12, 0.01);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
                `
            );
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 60, 0, (Math.random() - 0.5) * 25 - 2.5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- Silhouette / Background Subtraction (BEHIND EVERYTHING) ---
        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        videoTex.colorSpace = THREE.SRGBColorSpace;

        const bgCanvas = document.createElement('canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const bgTex = new THREE.CanvasTexture(bgCanvas);
        bgTex.colorSpace = THREE.SRGBColorSpace;

        // Silhouette placed deeply in the background so the sun and clouds are in front
        const silhouetteGeo = new THREE.PlaneGeometry(120, 80); 
        const silhouetteMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTex },
                tBackground: { value: bgTex },
                brandColor: { value: new THREE.Color(0x2196F3) }, 
                threshold: { value: config.bgThreshold }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = vec2(uv.x, uv.y); // Flipped mirroring to correct physical orientation
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform sampler2D tBackground;
                uniform vec3 brandColor;
                uniform float threshold;
                varying vec2 vUv;

                void main() {
                    vec4 curr = texture2D(tDiffuse, vUv);
                    vec4 bg = texture2D(tBackground, vUv);
                    float diff = distance(curr.rgb, bg.rgb);
                    float alpha = smoothstep(threshold * 0.8, threshold * 1.2, diff);
                    vec3 finalColor = mix(brandColor, curr.rgb, 0.6) * 1.2; // Brighter and clearer
                    gl_FragColor = vec4(finalColor, alpha * 0.95);
                }
            `,
            transparent: true,
            blending: THREE.NormalBlending,
            depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 20, -40); // Deep background (Z = -40)
        scene.add(silhouetteMesh);

        function captureBackground() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                bgCanvas.width = video.videoWidth;
                bgCanvas.height = video.videoHeight;
                bgCtx.drawImage(video, 0, 0);
                bgTex.needsUpdate = true;

                if(!hasStarted) {
                    hasStarted = true;
                    document.getElementById('center-message').innerHTML = "Run to the flower!";
                    setTimeout(() => { document.getElementById('center-message').style.opacity = 0; }, 3000);
                }
            }
        }
        document.getElementById('calibrate-btn').addEventListener('click', captureBackground);


        // --- The Giant Interactive Flower ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 5); 
        scene.add(flowerGroup);

        const stemGeo = new THREE.CylinderGeometry(0.4, 0.7, 10, 16);
        stemGeo.translate(0, 5, 0);
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.6 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 10;
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0);
        petalShape.bezierCurveTo(2.0, 2.0, 2.5, 6.0, 0, 8.0);
        petalShape.bezierCurveTo(-2.5, 6.0, -2.0, 2.0, 0, 0);

        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });

        const petals = [];
        const numPetals = 14;
        for (let i = 0; i < numPetals; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / numPetals) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.5;
            flowerHead.add(petal);
            petals.push(petal);
        }

        const innerPetals = [];
        const innerPetalMat = new THREE.MeshStandardMaterial({ color: 0xFFC107, side: THREE.DoubleSide });
        for (let i = 0; i < 10; i++) {
            const petal = new THREE.Mesh(petalGeo, innerPetalMat);
            petal.scale.setScalar(0.6);
            petal.rotation.y = (i / 10) * Math.PI * 2 + 0.2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.3;
            flowerHead.add(petal);
            innerPetals.push(petal);
        }

        const centerGeo = new THREE.SphereGeometry(2.2, 32, 16);
        centerGeo.scale(1, 0.4, 1);
        const centerMat = new THREE.MeshStandardMaterial({ color: 0xFF5722, roughness: 0.9 });
        const center = new THREE.Mesh(centerGeo, centerMat);
        center.position.y = 0.5;
        flowerHead.add(center);

        // --- BIG Magic Pollen Particles ---
        const pollenCount = 400;
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(pollenCount * 3);
        const pollenVel = [];

        for(let i=0; i<pollenCount; i++) {
            pollenPos[i*3] = 0; 
            pollenPos[i*3+1] = -100;
            pollenPos[i*3+2] = 0;
            pollenVel.push(new THREE.Vector3());
        }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));

        const pCanvas = document.createElement('canvas');
        pCanvas.width = 64; pCanvas.height = 64;
        const pCtx = pCanvas.getContext('2d');
        const pGrad = pCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
        pGrad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        pGrad.addColorStop(0.2, 'rgba(255, 215, 0, 0.8)');
        pGrad.addColorStop(1, 'rgba(255, 193, 7, 0)');
        pCtx.fillStyle = pGrad;
        pCtx.beginPath(); pCtx.arc(32, 32, 32, 0, Math.PI*2); pCtx.fill();
        const pollenTex = new THREE.CanvasTexture(pCanvas);

        const pollenMat = new THREE.PointsMaterial({ 
            size: 4.5,
            map: pollenTex,
            transparent: true, 
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xffffff
        });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);

        let pollenIdx = 0;

        // --- Camera Setup ---
        const cameraSelect = document.getElementById('camera-select');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

        const GRID_W = 60, GRID_H = 40;
        motionCanvas.width = GRID_W; motionCanvas.height = GRID_H;

        let prevFrame = null;
        let currentStream = null;

        let interactionLevel = 0; 
        let interactionTarget = 0;
        let motionX = 0;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) { cameraSelect.innerHTML = '<option>Error</option>'; }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
                });
                video.srcObject = currentStream;
                setTimeout(() => { if(!hasStarted) captureBackground(); }, 4000);
            } catch (err) {}
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Motion Physics Analysis ---
        function checkMotion() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currentFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;
            let motionCount = 0; 
            let totalX = 0;

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y+=2) { 
                    for (let x = 0; x < GRID_W; x+=2) {
                        const i = (y * GRID_W + x) * 4;
                        const diff = Math.abs(currentFrame[i] - prevFrame[i]) + 
                                     Math.abs(currentFrame[i+1] - prevFrame[i+1]) + 
                                     Math.abs(currentFrame[i+2] - prevFrame[i+2]);

                        if (diff > config.motionSensitivity) {
                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const normY = -( (y / GRID_H) * 2 - 1 );
                            const worldX = normX * 30.0; 
                            const worldZ = normY * 15.0; 

                            totalX += worldX; 
                            motionCount++;

                            const tx = ((worldX + 30) / 60) * mapSize;
                            const ty = ((worldZ + 15) / 30) * mapSize;

                            windCtx.beginPath();
                            const g1 = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 25);
                            g1.addColorStop(0, 'rgba(255,255,255,1)');
                            g1.addColorStop(1, 'rgba(255,255,255,0)');
                            windCtx.fillStyle = g1;
                            windCtx.arc(tx, ty, 25, 0, Math.PI*2);
                            windCtx.fill();
                        }
                    }
                }
            }

            if(motionCount > 2) {
                motionX = totalX / motionCount;
                if (Math.abs(motionX) < 18) { 
                    interactionTarget = 1;
                } else {
                    interactionTarget = 0;
                }
            } else {
                interactionTarget = 0;
            }

            prevFrame = new Uint8ClampedArray(currentFrame);
            windTex.needsUpdate = true;
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            windCtx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            windCtx.fillRect(0, 0, mapSize, mapSize);

            checkMotion();

            silhouetteMat.uniforms.threshold.value = config.bgThreshold;
            grassParams.time.value += 0.016;
            const time = Date.now() * 0.001;

            // Sky animations
            cloudGroup.position.y = 20 + Math.sin(time) * 0.5;

            interactionLevel += (interactionTarget - interactionLevel) * 0.08;

            flowerGroup.rotation.z = Math.sin(time) * 0.05 + (interactionLevel * (motionX * 0.03));
            flowerGroup.scale.setScalar(1.0 + interactionLevel * 0.15);

            petals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.5, 1.8, interactionLevel); 
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });
            innerPetals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.3, 1.6, interactionLevel);
                petal.rotation.x += Math.cos(time * 2.5 + petal.userData.baseRotY) * 0.06;
            });

            flowerHead.rotation.y = time * 0.3;

            if (interactionLevel > 0.3) {
                for(let k=0; k<4; k++) { 
                    pollenPos[pollenIdx*3] = flowerHead.position.x + (Math.random()-0.5)*5;
                    pollenPos[pollenIdx*3+1] = flowerHead.position.y + 2 + flowerGroup.position.y;
                    pollenPos[pollenIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*5;

                    pollenVel[pollenIdx].set((Math.random()-0.5)*0.2, Math.random()*0.2 + 0.1, (Math.random()-0.5)*0.2);
                    pollenIdx = (pollenIdx + 1) % pollenCount;
                }
            }

            const pPositions = pollenGeo.attributes.position.array;
            for(let i=0; i<pollenCount; i++) {
                if(pPositions[i*3+1] > -50) { 
                    pPositions[i*3] += pollenVel[i].x;
                    pPositions[i*3+1] += pollenVel[i].y;
                    pPositions[i*3+2] += pollenVel[i].z;
                    pPositions[i*3] += Math.sin(time * 3 + i) * 0.04; 
                    if(pPositions[i*3+1] > 40) pPositions[i*3+1] = -100; 
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // --- UI Logic ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            const videoContainer = document.getElementById('video-container');

            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
                videoContainer.style.display = 'none';
                gui.hide();
            } else {
                uiOverlay.style.display = 'block';
                if(config.showWebcam) videoContainer.style.display = 'block';
                gui.show();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        getCameras();
        animate();
    </script>
</body>
</html>
