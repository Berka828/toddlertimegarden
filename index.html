<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM Interactive Plant Lifecycle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;800&display=swap');

        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Overlays */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        .bxcm-logo {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .c-y { color: #FFC107; }
        .c-o { color: #FF5722; }
        .c-m { color: #E91E63; }
        .c-g { color: #4CAF50; }
        .c-b { color: #2196F3; }

        #camera-settings {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            max-width: 320px;
            margin-top: 15px;
        }

        select, button {
            padding: 10px;
            font-size: 1rem;
            border-radius: 4px;
            margin-top: 10px;
            width: 100%;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
        }

        button { background: #E91E63; font-weight: 800; }
        button:hover { background: #FF5722; }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            opacity: 0.8;
            z-index: 10;
            display: none; 
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Dynamic Instructions */
        #instruction-banner {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 3.5rem;
            font-weight: 800;
            text-shadow: 0px 6px 20px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 20;
            transition: all 0.5s ease;
        }

        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); text-shadow: 0px 6px 20px rgba(0,0,0,0.7); }
            50% { transform: scale(1.05); text-shadow: 0px 10px 30px rgba(255,255,255,0.8); }
            100% { transform: scale(0.95); text-shadow: 0px 6px 20px rgba(0,0,0,0.7); }
        }
    </style>
</head>
<body>

    <div id="instruction-banner" class="pulse">Step away and click Calibrate!</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <label for="camera-select">🎥 Select Sensor/Camera:</label>
            <select id="camera-select"><option value="">Loading...</option></select>
            <button id="calibrate-btn">📸 Calibrate Background</button>
            <div style="font-size: 0.8rem; margin-top: 5px; color: #ccc;">
                *Click when empty to cut out the kids perfectly!
            </div>
        </div>
    </div>

    <div id="video-container"><video id="webcam" autoplay playsinline></video></div>
    <canvas id="motion-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Configuration ---
        const config = {
            motionSensitivity: 25, 
            bgThreshold: 0.15, 
            showWebcam: false,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        let hasStarted = false;
        
        // Lifecycle States: 0=Seed, 1=Watering, 2=Sunlight, 3=Blooming, 4=Resetting
        let plantState = 0; 
        let growthProgress = 0; 

        // --- GUI ---
        const gui = new GUI({ title: '🌱 Lifecycle Admin' });
        gui.add(config, 'motionSensitivity', 5, 100, 1).name('Motion Tracking Sens.');
        gui.add(config, 'bgThreshold', 0.05, 0.5, 0.01).name('Silhouette Sens.');
        gui.add(config, 'showWebcam').name('Show Webcam Feed').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 10, 35); 
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB, 1); // Sky blue
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // --- Environment & Weather Objects ---
        
        // 1. The Sun (Top Left)
        const sunGroup = new THREE.Group();
        sunGroup.position.set(-20, 22, -10);
        scene.add(sunGroup);
        
        const sunGeo = new THREE.CircleGeometry(4, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        sunGroup.add(sunMesh);
        
        const glowGeo = new THREE.CircleGeometry(6, 32);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0xFFEA00, transparent: true, opacity: 0.3 });
        const sunGlow = new THREE.Mesh(glowGeo, glowMat);
        sunGroup.add(sunGlow);

        // 2. The Rain Cloud (Top Right)
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(20, 20, -10);
        scene.add(cloudGroup);
        
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, flatShading: true });
        const c1 = new THREE.Mesh(new THREE.SphereGeometry(3, 16, 16), cloudMat);
        const c2 = new THREE.Mesh(new THREE.SphereGeometry(2.5, 16, 16), cloudMat); c2.position.set(-3, -1, 0);
        const c3 = new THREE.Mesh(new THREE.SphereGeometry(2.5, 16, 16), cloudMat); c3.position.set(3, -1, 0);
        cloudGroup.add(c1, c2, c3);

        // Rain Particles
        const rainCount = 300;
        const rainGeo = new THREE.BufferGeometry();
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = (Math.random() - 0.5) * 10;
            rainPos[i*3+1] = Math.random() * -20 - 100; // Hidden initially
            rainPos[i*3+2] = (Math.random() - 0.5) * 5;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0x4fc3f7, size: 0.3, transparent: true });
        const rainSys = new THREE.Points(rainGeo, rainMat);
        cloudGroup.add(rainSys);

        // 3. The Rainbow (Arching across sky)
        const rbGeo = new THREE.TorusGeometry(30, 1.5, 16, 100, Math.PI);
        const rbMat = new THREE.ShaderMaterial({
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                varying vec2 vUv;
                uniform float opacity;
                void main() {
                    float t = vUv.y;
                    vec3 col = mix(vec3(1,0,0), vec3(1,0.5,0), step(0.14, t));
                    col = mix(col, vec3(1,1,0), step(0.28, t));
                    col = mix(col, vec3(0,1,0), step(0.42, t));
                    col = mix(col, vec3(0,0,1), step(0.56, t));
                    col = mix(col, vec3(0.3,0,0.5), step(0.70, t));
                    col = mix(col, vec3(0.5,0,1), step(0.84, t));
                    gl_FragColor = vec4(col, opacity * sin(vUv.x * 3.1415)); // Fade edges
                }
            `,
            uniforms: { opacity: { value: 0.0 } },
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
        });
        const rainbow = new THREE.Mesh(rbGeo, rbMat);
        rainbow.position.set(0, 0, -25);
        scene.add(rainbow);

        // --- Grass System (Preserved) ---
        const mapSize = 512;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const numGrass = 30000;
        const grassGeo = new THREE.PlaneGeometry(0.15, 3.0, 1, 4);
        grassGeo.translate(0, 1.5, 0); 
        const grassMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.8 });
        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time; shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `uniform float time; uniform sampler2D windMap; varying vec2 vMyUv;` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `#include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 30.0) / 60.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5 + instPos.z * 0.5) * 0.15;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y + windForce * 2.5 * position.y;
                    transformed.z -= windForce * 2.5 * position.y;
                }`
            );
            shader.fragmentShader = `varying vec2 vMyUv;` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(
                `#include <color_fragment>`,
                `#include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.12, 0.01);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);`
            );
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 60, 0, (Math.random() - 0.5) * 25 - 2.5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- Silhouette / Webcam Cutout ---
        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video); videoTex.colorSpace = THREE.SRGBColorSpace;
        const bgCanvas = document.createElement('canvas'); const bgCtx = bgCanvas.getContext('2d');
        const bgTex = new THREE.CanvasTexture(bgCanvas); bgTex.colorSpace = THREE.SRGBColorSpace;

        const silhouetteGeo = new THREE.PlaneGeometry(55, 40); 
        const silhouetteMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTex }, tBackground: { value: bgTex },
                brandColor: { value: new THREE.Color(0xFFC107) }, threshold: { value: config.bgThreshold }
            },
            vertexShader: `varying vec2 vUv; void main() { vUv = vec2(1.0 - uv.x, uv.y); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform sampler2D tBackground; uniform vec3 brandColor; uniform float threshold; varying vec2 vUv;
                void main() {
                    vec4 curr = texture2D(tDiffuse, vUv); vec4 bg = texture2D(tBackground, vUv);
                    float diff = distance(curr.rgb, bg.rgb);
                    float alpha = smoothstep(threshold * 0.8, threshold * 1.2, diff);
                    vec3 finalColor = mix(brandColor, curr.rgb, 0.8);
                    gl_FragColor = vec4(finalColor, alpha * 0.85);
                }
            `,
            transparent: true, depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -5); 
        scene.add(silhouetteMesh);

        function captureBackground() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                bgCanvas.width = video.videoWidth; bgCanvas.height = video.videoHeight;
                bgCtx.drawImage(video, 0, 0); bgTex.needsUpdate = true;
                if(!hasStarted) {
                    hasStarted = true;
                    setInstruction("Wave at the CLOUD to water the seed!", 0);
                }
            }
        }
        document.getElementById('calibrate-btn').addEventListener('click', captureBackground);

        // --- The Lifecycle Plant ---
        const plantGroup = new THREE.Group();
        plantGroup.position.set(0, 0, 5); // Firmly on the ground
        scene.add(plantGroup);

        // Seed
        const seedGeo = new THREE.SphereGeometry(1, 16, 16);
        const seedMat = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.9 });
        const seed = new THREE.Mesh(seedGeo, seedMat);
        seed.position.y = 0.5;
        plantGroup.add(seed);

        // Stem
        const stemGeo = new THREE.CylinderGeometry(0.5, 0.8, 12, 16);
        stemGeo.translate(0, 6, 0); // Pivot at bottom
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        stem.scale.y = 0.001; // Hidden initially
        plantGroup.add(stem);

        // Flower Head
        const flowerHead = new THREE.Group();
        flowerHead.position.y = 12;
        flowerHead.scale.setScalar(0.001); // Hidden initially
        stem.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0); petalShape.bezierCurveTo(3.0, 3.0, 3.5, 8.0, 0, 10.0); petalShape.bezierCurveTo(-3.5, 8.0, -3.0, 3.0, 0, 0);
        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });
        
        const petals = [];
        for (let i = 0; i < 12; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / 12) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.1; // Tightly closed Bud
            flowerHead.add(petal); petals.push(petal);
        }
        
        const center = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 16), new THREE.MeshStandardMaterial({ color: 0xFF9800 }));
        center.scale.y = 0.4; center.position.y = 0.5;
        flowerHead.add(center);

        // BIG Magic Pollen Particles (Bloom Effect)
        const pollenCount = 300;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pollenCount * 3);
        const pVel = [];
        for(let i=0; i<pollenCount; i++) { pPos[i*3+1] = -100; pVel.push(new THREE.Vector3()); }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        
        const pCanvas = document.createElement('canvas'); pCanvas.width = 64; pCanvas.height = 64;
        const pCtx = pCanvas.getContext('2d');
        const pGrad = pCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
        pGrad.addColorStop(0, '#FFF'); pGrad.addColorStop(0.3, '#FFD700'); pGrad.addColorStop(1, 'transparent');
        pCtx.fillStyle = pGrad; pCtx.beginPath(); pCtx.arc(32, 32, 32, 0, Math.PI*2); pCtx.fill();
        
        const pollenMat = new THREE.PointsMaterial({ size: 3.0, map: new THREE.CanvasTexture(pCanvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const pollenSys = new THREE.Points(pGeo, pollenMat);
        scene.add(pollenSys);

        // --- Camera Setup ---
        const cameraSelect = document.getElementById('camera-select');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
        const GRID_W = 60, GRID_H = 40;
        motionCanvas.width = GRID_W; motionCanvas.height = GRID_H;

        let prevFrame = null; let currentStream = null;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const vDevs = devices.filter(d => d.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                vDevs.forEach((d, i) => { cameraSelect.add(new Option(d.label || `Camera ${i+1}`, d.deviceId)); });
                if (vDevs.length > 0) startStream(vDevs[0].deviceId);
            } catch (err) { cameraSelect.innerHTML = '<option>Error</option>'; }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true });
                video.srcObject = currentStream;
            } catch (err) {}
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Interaction State Tracking ---
        let sunInteraction = 0; 
        let cloudInteraction = 0;
        let plantInteraction = 0;
        let pIndex = 0;

        function setInstruction(text, state) {
            const banner = document.getElementById('instruction-banner');
            banner.style.opacity = 0;
            setTimeout(() => {
                banner.innerHTML = text;
                banner.style.opacity = 1;
                plantState = state;
                growthProgress = 0;
            }, 500);
        }

        // --- Motion Logic ---
        function checkMotion() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;

            let motions = { sun: 0, cloud: 0, plant: 0 };

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y+=2) { 
                    for (let x = 0; x < GRID_W; x+=2) {
                        const i = (y * GRID_W + x) * 4;
                        const diff = Math.abs(currFrame[i] - prevFrame[i]) + Math.abs(currFrame[i+1] - prevFrame[i+1]) + Math.abs(currFrame[i+2] - prevFrame[i+2]);

                        if (diff > config.motionSensitivity) {
                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const normY = -( (y / GRID_H) * 2 - 1 );
                            
                            // Map to 3 huge distinct zones to make it extremely easy for kids
                            if (normY > 0) { // Top half
                                if (normX < -0.2) motions.sun++;
                                else if (normX > 0.2) motions.cloud++;
                            } else { // Bottom half / Center
                                if (Math.abs(normX) < 0.6) motions.plant++;
                            }

                            // Wind Grass Effect
                            const tx = ((normX * 30 + 30) / 60) * mapSize;
                            const ty = ((normY * 15 + 15) / 30) * mapSize;
                            windCtx.beginPath();
                            const g1 = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 30);
                            g1.addColorStop(0, 'rgba(255,255,255,1)'); g1.addColorStop(1, 'rgba(255,255,255,0)');
                            windCtx.fillStyle = g1; windCtx.arc(tx, ty, 30, 0, Math.PI*2); windCtx.fill();
                        }
                    }
                }
            }

            // Smoothing triggers
            sunInteraction += ((motions.sun > 5 ? 1 : 0) - sunInteraction) * 0.1;
            cloudInteraction += ((motions.cloud > 5 ? 1 : 0) - cloudInteraction) * 0.1;
            plantInteraction += ((motions.plant > 5 ? 1 : 0) - plantInteraction) * 0.1;

            prevFrame = new Uint8ClampedArray(currFrame);
            windTex.needsUpdate = true;
        }

        // --- Main Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            windCtx.fillStyle = 'rgba(0,0,0,0.12)'; windCtx.fillRect(0,0,mapSize,mapSize);
            checkMotion();

            const time = Date.now() * 0.001;
            grassParams.time.value += 0.016;
            silhouetteMat.uniforms.threshold.value = config.bgThreshold;

            // --- Weather Effects ---
            sunGlow.scale.setScalar(1 + sunInteraction * 0.5 + Math.sin(time*5)*0.1);
            sunMesh.rotation.z = time * 0.5;

            cloudGroup.position.y = 20 + Math.sin(time)*1;
            
            // Rain Logic
            const rPositions = rainGeo.attributes.position.array;
            if (cloudInteraction > 0.1) {
                for(let i=0; i<rainCount; i++) {
                    if (rPositions[i*3+1] < -50) { // Respawn drop
                        rPositions[i*3] = (Math.random()-0.5)*8;
                        rPositions[i*3+1] = 0;
                        rPositions[i*3+2] = (Math.random()-0.5)*4;
                    }
                }
            }
            for(let i=0; i<rainCount; i++) {
                if (rPositions[i*3+1] > -50) rPositions[i*3+1] -= 0.8; // Fall speed
            }
            rainGeo.attributes.position.needsUpdate = true;

            // Rainbow Fade
            let targetRbOpacity = (plantState >= 1 && cloudInteraction > 0.2) ? 0.8 : 0.0;
            rbMat.uniforms.opacity.value += (targetRbOpacity - rbMat.uniforms.opacity.value) * 0.05;

            // --- LIFECYCLE LOGIC ---
            if (hasStarted) {
                if (plantState === 0) { // SEED NEEDS WATER
                    if (cloudInteraction > 0.5) growthProgress += 0.005; // Fills up progress bar
                    if (growthProgress >= 1) {
                        setInstruction("Great! Now wave at the SUN to help it grow!", 1);
                    }
                } 
                else if (plantState === 1) { // SPROUT NEEDS SUN
                    seed.scale.setScalar(Math.max(0, 1 - growthProgress*2)); // Seed disappears
                    stem.scale.y = THREE.MathUtils.lerp(stem.scale.y, 1.0, 0.05); // Grow tall
                    flowerHead.scale.setScalar(THREE.MathUtils.lerp(flowerHead.scale.y, 1.0, 0.05)); // Bud appears
                    
                    if (sunInteraction > 0.5) growthProgress += 0.005;
                    if (growthProgress >= 1) {
                        setInstruction("Perfect! Now touch the FLOWER to Bloom!", 2);
                    }
                }
                else if (plantState === 2) { // BUD NEEDS TOUCH
                    if (plantInteraction > 0.2) {
                        setInstruction("WOW! Magic Bloom!", 3);
                    }
                }
                else if (plantState === 3) { // BLOOMING!
                    growthProgress += 0.002; // acts as a timer for reset
                    
                    // Open Petals Wide!
                    petals.forEach(p => {
                        p.rotation.x = THREE.MathUtils.lerp(p.rotation.x, 1.8, 0.05);
                        p.rotation.x += Math.sin(time*3 + p.userData.baseRotY)*0.02;
                    });
                    
                    // Spew Pollen
                    for(let k=0; k<5; k++) {
                        pPos[pIndex*3] = flowerHead.position.x + plantGroup.position.x;
                        pPos[pIndex*3+1] = flowerHead.position.y + stem.scale.y*12;
                        pPos[pIndex*3+2] = plantGroup.position.z;
                        pVel[pIndex].set((Math.random()-0.5)*0.3, Math.random()*0.3+0.1, (Math.random()-0.5)*0.3);
                        pIndex = (pIndex + 1) % pollenCount;
                    }

                    if (growthProgress > 1.5) { // Reset Cycle
                        setInstruction("Wave at the CLOUD to water the seed!", 0);
                        stem.scale.y = 0.001; flowerHead.scale.setScalar(0.001);
                        seed.scale.setScalar(1);
                        petals.forEach(p => p.rotation.x = 0.1);
                    }
                }
            }

            // Animate Pollen Physics
            const pPositions = pGeo.attributes.position.array;
            for(let i=0; i<pollenCount; i++) {
                if(pPositions[i*3+1] > -50) { 
                    pPositions[i*3] += pVel[i].x; pPositions[i*3+1] += pVel[i].y; pPositions[i*3+2] += pVel[i].z;
                    pPositions[i*3] += Math.sin(time*2+i)*0.05; // wind drift
                    if(pPositions[i*3+1] > 40) pPositions[i*3+1] = -100; // hide
                }
            }
            pGeo.attributes.position.needsUpdate = true;

            // Interactive plant bending
            if (plantState > 0) {
                plantGroup.rotation.z = Math.sin(time)*0.05 + (plantInteraction * 0.1);
            }

            renderer.render(scene, camera);
        }

        // --- UI & Setup ---
        document.addEventListener('fullscreenchange', () => {
            const ui = document.getElementById('ui-overlay'); const vc = document.getElementById('video-container');
            if (document.fullscreenElement) { ui.style.display = 'none'; vc.style.display = 'none'; gui.hide(); } 
            else { ui.style.display = 'block'; if(config.showWebcam) vc.style.display = 'block'; gui.show(); }
        });
        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'f') config.goFullscreen(); });
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

        getCameras();
        animate();
    </script>
</body>
</html>
