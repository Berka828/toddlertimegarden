```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM Educational Garden</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap');

        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Fredoka', sans-serif; }
        canvas { display: block; }

        /* UI Overlay */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        .bxcm-logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 50px;
            display: inline-block;
        }

        .c-y { color: #FFC107; }
        .c-o { color: #FF5722; }
        .c-m { color: #E91E63; }
        .c-g { color: #4CAF50; }
        .c-b { color: #2196F3; }

        #admin-panel {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 12px;
            pointer-events: auto;
            max-width: 300px;
            margin-top: 15px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        select, button {
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            margin-top: 10px;
            width: 100%;
            background: white;
            color: #333;
            border: none;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
        }

        button:hover { background: #FFC107; }

        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            border: 3px solid white;
            border-radius: 12px;
            overflow: hidden;
            transform: scaleX(-1);
            z-index: 10;
        }

        video { width: 100%; height: auto; display: block; }

        /* Giant Educational Instructions */
        #instruction-text {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 3.5rem;
            font-weight: 700;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.5s;
        }

        .bounce { animation: bounce 2s infinite; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Progress Bar for Kids */
        #progress-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background: rgba(255,255,255,0.4);
            border-radius: 20px;
            border: 3px solid white;
            z-index: 20;
            overflow: hidden;
            display: none;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: #E91E63;
            transition: width 0.2s;
        }
    </style>
</head>
<body>

    <div id="instruction-text" class="bounce">Step back so the camera can see you!</div>

    <div id="progress-container">
        <div id="progress-fill"></div>
    </div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="admin-panel">
            <label style="color:white; font-size: 0.9rem;">🎥 Camera Setup:</label>
            <select id="camera-select"><option value="">Loading...</option></select>
            <button id="fullscreen-btn">Toggle Fullscreen (F)</button>
            <button id="reset-btn">🔄 Reset Lesson</button>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <!-- Hidden canvas for tracking motion pixels -->
    <canvas id="motion-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Game State & Stages ---
        // 0: Waiting for user, 1: Plant Seed, 2: Water, 3: Sun, 4: Bloom
        let currentStage = 0; 
        let stageProgress = 0; // 0 to 100
        const progressFill = document.getElementById('progress-fill');
        const progressContainer = document.getElementById('progress-container');
        const instructionText = document.getElementById('instruction-text');

        // --- Basic Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB'); // Sky blue

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 20); 
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // --- 3D Objects: The Garden ---

        // 1. The Ground/Soil
        const groundGeo = new THREE.BoxGeometry(40, 2, 10);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -1;
        scene.add(ground);

        const grassGeo = new THREE.PlaneGeometry(40, 10);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2;
        grass.position.y = 0.01;
        scene.add(grass);

        // 2. The Plant Group
        const plantGroup = new THREE.Group();
        plantGroup.position.y = 0;
        scene.add(plantGroup);

        // Seed
        const seed = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({ color: 0x3e2723 }));
        seed.position.y = 0.5;
        seed.visible = false;
        plantGroup.add(seed);

        // Stem
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 5), new THREE.MeshStandardMaterial({ color: 0x4CAF50 }));
        stem.position.y = 2.5;
        stem.scale.y = 0.001; // Hidden initially
        plantGroup.add(stem);

        // Flower Head (Hidden initially)
        const flowerHead = new THREE.Group();
        flowerHead.position.y = 5;
        flowerHead.scale.setScalar(0.001);
        plantGroup.add(flowerHead);

        const center = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 16), new THREE.MeshStandardMaterial({ color: 0xFFC107 }));
        flowerHead.add(center);

        const petals = [];
        const petalGeo = new THREE.CylinderGeometry(0.5, 0.1, 3);
        petalGeo.translate(0, 1.5, 0); // Pivot at base
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63 }); // BxCM Pink
        for(let i=0; i<8; i++) {
            const p = new THREE.Mesh(petalGeo, petalMat);
            p.rotation.z = Math.PI / 2; // Lay flat
            p.rotation.x = (i / 8) * Math.PI * 2;
            flowerHead.add(p);
            petals.push(p);
        }

        // 3. Interactive Props (Cloud & Sun)
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(-8, 12, 0);
        const cloudGeo = new THREE.SphereGeometry(1.5);
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const c1 = new THREE.Mesh(cloudGeo, cloudMat);
        const c2 = new THREE.Mesh(cloudGeo, cloudMat); c2.position.set(-1.5, -0.5, 0);
        const c3 = new THREE.Mesh(cloudGeo, cloudMat); c3.position.set(1.5, -0.5, 0);
        cloudGroup.add(c1, c2, c3);
        cloudGroup.visible = false;
        scene.add(cloudGroup);

        const sunGroup = new THREE.Group();
        sunGroup.position.set(8, 12, 0);
        const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), new THREE.MeshStandardMaterial({ color: 0xFFC107, emissive: 0xFF9800, emissiveIntensity: 0.5 }));
        sunGroup.add(sunMesh);
        sunGroup.visible = false;
        scene.add(sunGroup);


        // --- Visual Touch Feedback (Sparkles) ---
        // Shows kids EXACTLY where the camera sees their movement
        const sparkleGeo = new THREE.BufferGeometry();
        const sparklePos = new Float32Array(300 * 3);
        sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
        const sparkleMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.8 });
        const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
        scene.add(sparkles);
        let sparkleIdx = 0;

        // Water Drops Particle System
        const dropGeo = new THREE.BufferGeometry();
        const dropPos = new Float32Array(100 * 3);
        dropGeo.setAttribute('position', new THREE.BufferAttribute(dropPos, 3));
        const dropMat = new THREE.PointsMaterial({ color: 0x2196F3, size: 0.4 });
        const drops = new THREE.Points(dropGeo, dropMat);
        scene.add(drops);


        // --- Camera & Motion Setup ---
        const video = document.getElementById('webcam');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
        
        const GRID_W = 40, GRID_H = 30; // Low res grid for fast analysis
        motionCanvas.width = GRID_W; motionCanvas.height = GRID_H;

        let prevFrame = null;
        let currentStream = null;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                video.srcObject = stream;
                
                // Hide video behind scenes if full screen, or keep it as a mini-map
                setTimeout(() => {
                    startLesson();
                }, 3000);
            } catch (err) {
                instructionText.innerHTML = "Camera error! Please allow camera access.";
            }
        }

        function startLesson() {
            currentStage = 1;
            stageProgress = 0;
            instructionText.innerHTML = "🌱 Wave at the SOIL to dig a hole!";
            instructionText.style.color = "#5C4033";
            progressContainer.style.display = "block";
            progressFill.style.background = "#5C4033";
            progressFill.style.width = "0%";
            
            seed.visible = false;
            stem.scale.y = 0.001;
            flowerHead.scale.setScalar(0.001);
            cloudGroup.visible = false;
            sunGroup.visible = false;
        }

        function advanceStage() {
            currentStage++;
            stageProgress = 0;
            progressFill.style.width = "0%";

            if (currentStage === 2) {
                seed.visible = true;
                instructionText.innerHTML = "💧 Wave at the CLOUD to rain water!";
                instructionText.style.color = "#2196F3";
                progressFill.style.background = "#2196F3";
                cloudGroup.visible = true;
            } 
            else if (currentStage === 3) {
                cloudGroup.visible = false;
                sunGroup.visible = true;
                instructionText.innerHTML = "☀️ Wave at the SUN for light!";
                instructionText.style.color = "#FF9800";
                progressFill.style.background = "#FF9800";
                
                // Grow stem
                stem.scale.y = 1;
                stem.position.y = 2.5;
            }
            else if (currentStage === 4) {
                sunGroup.visible = false;
                instructionText.innerHTML = "🌸 Touch the Plant to make it BLOOM!";
                instructionText.style.color = "#E91E63";
                progressFill.style.background = "#E91E63";
                
                // Show bud
                flowerHead.scale.setScalar(0.5);
                petals.forEach(p => p.rotation.z = Math.PI / 2); // Closed bud
            }
            else if (currentStage === 5) {
                instructionText.innerHTML = "🎉 Beautiful! You grew a BxCM Flower! 🎉";
                progressContainer.style.display = "none";
                
                // Full bloom
                flowerHead.scale.setScalar(1);
            }
        }

        // --- Core Motion Detection Logic ---
        function analyzeMovement() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currentFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;
            
            let interactionScore = 0;

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y++) { 
                    for (let x = 0; x < GRID_W; x++) {
                        const i = (y * GRID_W + x) * 4;
                        
                        // Pixel difference
                        const diff = Math.abs(currentFrame[i] - prevFrame[i]) + 
                                     Math.abs(currentFrame[i+1] - prevFrame[i+1]) + 
                                     Math.abs(currentFrame[i+2] - prevFrame[i+2]);

                        if (diff > 40) { // Motion detected here!
                            
                            // Map pixel coords to 3D world space for sparkles
                            // X is mirrored
                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const normY = -( (y / GRID_H) * 2 - 1 );
                            
                            const worldX = normX * 15; 
                            const worldY = normY * 10 + 6;

                            // Create visual sparkle feedback so kids know they are "touching"
                            if(Math.random() > 0.8) {
                                sparklePos[sparkleIdx*3] = worldX;
                                sparklePos[sparkleIdx*3+1] = worldY;
                                sparklePos[sparkleIdx*3+2] = 2; // In front
                                sparkleIdx = (sparkleIdx + 1) % 300;
                            }

                            // --- Check Intersection with Target Zones ---
                            
                            if (currentStage === 1) { // Stage 1: Dig Soil (Bottom Area)
                                if (worldY < 3 && Math.abs(worldX) < 8) interactionScore++;
                            } 
                            else if (currentStage === 2) { // Stage 2: Water Cloud (Top Left Area)
                                if (worldY > 8 && worldX < -4) {
                                    interactionScore++;
                                    // Make rain fall
                                    if(Math.random() > 0.5) {
                                        for(let d=0; d<100; d++) {
                                            if(dropPos[d*3+1] < -2) {
                                                dropPos[d*3] = cloudGroup.position.x + (Math.random()-0.5)*3;
                                                dropPos[d*3+1] = cloudGroup.position.y - 1;
                                                dropPos[d*3+2] = 0;
                                                break;
                                            }
                                        }
                                    }
                                }
                            }
                            else if (currentStage === 3) { // Stage 3: Sun (Top Right Area)
                                if (worldY > 8 && worldX > 4) interactionScore++;
                            }
                            else if (currentStage === 4) { // Stage 4: Bloom (Center Area)
                                if (worldY > 3 && worldY < 10 && Math.abs(worldX) < 5) interactionScore++;
                            }
                        }
                    }
                }
            }

            prevFrame = new Uint8ClampedArray(currentFrame);

            // Update Progress
            if (interactionScore > 5 && currentStage <= 4) {
                stageProgress += 0.8; // Speed of progress
                progressFill.style.width = `${Math.min(stageProgress, 100)}%`;

                // Add visual shake/feedback to the target object
                if(currentStage === 2) cloudGroup.position.y = 12 + Math.sin(Date.now()*0.02)*0.2;
                if(currentStage === 3) sunGroup.scale.setScalar(1 + Math.sin(Date.now()*0.02)*0.1);

                if (stageProgress >= 100) {
                    advanceStage();
                }
            }
            
            sparkleGeo.attributes.position.needsUpdate = true;
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            analyzeMovement();

            const time = Date.now() * 0.001;

            // Idle Animations
            if (cloudGroup.visible) cloudGroup.position.y = 12 + Math.sin(time) * 0.5;
            if (sunGroup.visible) sunGroup.rotation.z = time * 0.5;

            // Stage 4 to 5 Blooming Animation
            if (currentStage === 5) {
                flowerHead.rotation.y += 0.01;
                petals.forEach(p => {
                    // Open petals gracefully
                    p.rotation.z = THREE.MathUtils.lerp(p.rotation.z, 0.2, 0.05);
                });
            }

            // Update Particles
            const sPositions = sparkleGeo.attributes.position.array;
            for(let i=0; i<300; i++) {
                sPositions[i*3+1] -= 0.05; // Sparkles fall down
                if(sPositions[i*3+1] < -10) sPositions[i*3+1] = -100; // Hide
            }
            sparkleGeo.attributes.position.needsUpdate = true;

            const dPositions = dropGeo.attributes.position.array;
            for(let i=0; i<100; i++) {
                dPositions[i*3+1] -= 0.3; // Rain falls fast
            }
            dropGeo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // --- Event Listeners ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('video-container').style.display = 'none';
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('video-container').style.display = 'block';
            }
        });

        document.getElementById('reset-btn').addEventListener('click', startLesson);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        for(let i=0; i<300; i++) sparklePos[i*3+1] = -100; // Hide sparkles initially
        for(let i=0; i<100; i++) dropPos[i*3+1] = -100; // Hide rain initially

        initCamera();
        animate();
    </script>
</body>
</html>
