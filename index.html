<body>

    <script type="importmap">

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration & State ---
        const config = {

            goFullscreen: () => {

        const brandColors = [0xFFC107, 0xFF5722, 0xE91E63, 0x2196F3, 0x9C27B0];

        // --- Setup Admin GUI ---
        const gui = new GUI({ title: '🌿 Meadow Admin Panel' });
        gui.add(config, 'motionSensitivity', 10, 100, 1).name('Motion Sensitivity');
        gui.add(config, 'showWebcam').name('Show Webcam').onChange(v => {

        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Silhouette Setup ---
        const silCanvas = document.getElementById('silhouette-canvas');
        const silCtx = silCanvas.getContext('2d');
        function resizeSilhouette() {
            silCanvas.width = window.innerWidth;
            silCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeSilhouette);
        resizeSilhouette();

        // --- 1. Texture Map Physics (Wind & Bloom) ---
        const mapSize = 512;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const bloomCanvas = document.createElement('canvas');
        bloomCanvas.width = mapSize; bloomCanvas.height = mapSize;
        const bloomCtx = bloomCanvas.getContext('2d');
        const bloomTex = new THREE.CanvasTexture(bloomCanvas);

        // --- Setup Three.js Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xffe4e1, 0.025); // Initial Spring mist

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 12, 22); 
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffe4e1, 1);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // --- Interactive Season Orbs ---
        const orbs = [];
        const seasons = [
            { name: 'Spring', color: 0xE91E63, fog: 0xffe4e1, root: 0x011f01 }, // Pink
            { name: 'Autumn', color: 0xFF5722, fog: 0xffb347, root: 0x3a1f00 }, // Orange
            { name: 'Winter', color: 0x2196F3, fog: 0xe0f7fa, root: 0x556677 }  // Blue
        ];
        
        // Season targets for smooth transitions
        let targetFogColor = new THREE.Color(seasons[0].fog);
        let targetRootColor = new THREE.Color(seasons[0].root);

        seasons.forEach((season, index) => {
            const geo = new THREE.SphereGeometry(1.5, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: season.color });
            const orb = new THREE.Mesh(geo, mat);
            // Spread them across the sky
            orb.position.set((index - 1) * 12, 16, -15);
            scene.add(orb);
            orbs.push({ mesh: orb, season: season });
        });

        // --- Realistic Instanced Grass ---
        const numGrass = 50000;
        const grassGeo = new THREE.PlaneGeometry(0.15, 2.5, 1, 4);
        grassGeo.translate(0, 1.25, 0); // Pivot at the ground

        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            side: THREE.DoubleSide,
            roughness: 0.8
        });

        const grassParams = { 
            time: { value: 0 }, 
            windMap: { value: windTex },
            rootColor: { value: new THREE.Color(seasons[0].root) }
        };

        // Inject custom shaders to bend grass dynamically and change colors
        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.uniforms.rootColor = grassParams.rootColor;
            
            shader.vertexShader = `
                uniform float time;
                uniform sampler2D windMap;
                varying vec2 vMyUv;
            ` + shader.vertexShader;
            
            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                
                // Map position to texture space
                vec2 mapUv = vec2((instPos.x + 25.0) / 50.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                
                // Natural gentle wind
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5 + instPos.z * 0.5) * 0.15;
                
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    
                    // Bend heavily based on kids movement
                    transformed.x += windForce * 2.5 * position.y;
                    transformed.z -= windForce * 2.5 * position.y;
                    transformed.y -= windForce * 1.0 * position.y; // squash down
                }
                `
            );
            
            shader.fragmentShader = `
                varying vec2 vMyUv;
                uniform vec3 rootColor;
            ` + shader.fragmentShader;
            
            shader.fragmentShader = shader.fragmentShader.replace(
                `#include <color_fragment>`,
                `
                #include <color_fragment>
                // Add vertical gradient to grass (season root color at bottom, bright at tips)
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
                `
            );
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 50, 0, (Math.random() - 0.5) * 30);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- Instanced Blooming Flowers ---
        const pCan = document.createElement('canvas');
        pCan.width = 256; pCan.height = 256;
        const pCtx = pCan.getContext('2d');
        pCtx.fillStyle = 'transparent'; pCtx.fillRect(0, 0, 256, 256);
        pCtx.shadowColor = 'rgba(0,0,0,0.5)'; pCtx.shadowBlur = 6;
        for(let i=0; i<6; i++) {
            const a = (i/6) * Math.PI * 2;
            pCtx.fillStyle = 'white';
            pCtx.beginPath();
            pCtx.ellipse(128 + Math.cos(a)*40, 128 + Math.sin(a)*40, 25, 55, a, 0, Math.PI*2);
            pCtx.fill();
        }
        pCtx.shadowBlur = 0;
        pCtx.fillStyle = '#FFDD00';
        pCtx.beginPath(); pCtx.arc(128, 128, 25, 0, Math.PI*2); pCtx.fill();
        const flowerTex = new THREE.CanvasTexture(pCan);

        const numFlowers = 2500;
        const flowerGeo = new THREE.PlaneGeometry(1.5, 1.5);
        flowerGeo.translate(0, 0.75, 0); 
        
        const flowerMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            map: flowerTex,
            transparent: true,
            alphaTest: 0.1,
            side: THREE.DoubleSide,
            roughness: 0.5
        });

        const flowerParams = { bloomMap: { value: bloomTex } };

        flowerMat.onBeforeCompile = (shader) => {
            shader.uniforms.bloomMap = flowerParams.bloomMap;
            shader.vertexShader = `
                uniform sampler2D bloomMap;
            ` + shader.vertexShader;
            
            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `
                #include <begin_vertex>
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 25.0) / 50.0, (instPos.z + 15.0) / 30.0);
                float bloomForce = texture2D(bloomMap, mapUv).r;
                
                // Scale up dramatically when kids trigger the bloom map
                float targetScale = max(0.001, bloomForce * 1.6);
                transformed *= targetScale;
                `
            );
        };

        const flowerMesh = new THREE.InstancedMesh(flowerGeo, flowerMat, numFlowers);
        for(let i = 0; i < numFlowers; i++) {
            dummy.position.set((Math.random() - 0.5) * 50, 0, (Math.random() - 0.5) * 30);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.5 + Math.random() * 0.5);
            dummy.updateMatrix();
            flowerMesh.setMatrixAt(i, dummy.matrix);
            flowerMesh.setColorAt(i, new THREE.Color().setHex(brandColors[i % brandColors.length]));
        }
        scene.add(flowerMesh);

        // --- Interactive Butterflies ---
        const bGeo = new THREE.PlaneGeometry(0.3, 0.3);
        bGeo.rotateX(Math.PI / 2);
        const bMat = new THREE.MeshBasicMaterial({ color: 0xFFEB3B, side: THREE.DoubleSide });
        const butterflies = [];
        for(let i=0; i<40; i++) {
            const b = new THREE.Mesh(bGeo, bMat);
            b.position.set((Math.random()-0.5)*50, 2+Math.random()*4, (Math.random()-0.5)*30);
            b.userData = { vel: new THREE.Vector3() };
            scene.add(b);
            butterflies.push(b);
        }
        let butterflyTarget = new THREE.Vector3(0, 2, 0);

        // --- Camera & Motion Setup ---
        const video = document.getElementById('webcam');
        const cameraSelect = document.getElementById('camera-select');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

        const GRID_W = 60, GRID_H = 40;
        motionCanvas.width = GRID_W; motionCanvas.height = GRID_H;

        let prevFrame = null;
        let currentStream = null;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) {
                cameraSelect.innerHTML = '<option>Permission Denied/Error</option>';
            }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
                });
                video.srcObject = currentStream;
            } catch (err) { console.error(err); }
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Motion Physics Analysis ---
        function checkMotion() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currentFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;
            let motionCount = 0; let avgX = 0; let avgZ = 0;

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y+=2) { 
                    for (let x = 0; x < GRID_W; x+=2) {
                        const i = (y * GRID_W + x) * 4;

                        const diff = Math.abs(currentFrame[i] - prevFrame[i]) + 
                                     Math.abs(currentFrame[i+1] - prevFrame[i+1]) + 
                                     Math.abs(currentFrame[i+2] - prevFrame[i+2]);

                        if (diff > config.motionSensitivity) {
                            if(!hasStarted) {
                                hasStarted = true;
                                document.getElementById('center-message').style.opacity = 0;
                            }

                            // --- 1. Draw Silhouette ---
                            // Map webcam grid to screen size to draw magical blue shadows
                            const silX = (1 - (x / GRID_W)) * silCanvas.width;
                            const silY = (y / GRID_H) * silCanvas.height;
                            
                            silCtx.fillStyle = 'rgba(33, 150, 243, 0.4)'; // BxCM Blue with opacity
                            silCtx.beginPath();
                            silCtx.arc(silX, silY, 20, 0, Math.PI*2);
                            silCtx.fill();

                            // Convert webcam coordinates to 3D Field Coordinates
                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const normY = -( (y / GRID_H) * 2 - 1 );

                            const worldX = normX * 25.0; 
                            const worldZ = normY * 15.0; 

                            avgX += worldX; avgZ += worldZ; motionCount++;

                            // --- 2. Check Orb Collisions (Weather Change) ---
                            orbs.forEach(orbData => {
                                // Project 3D orb position to 2D screen space
                                const pos = orbData.mesh.position.clone().project(camera);
                                const orbGridX = (1 - (pos.x + 1) / 2) * GRID_W; 
                                const orbGridY = (-(pos.y - 1) / 2) * GRID_H;
                                
                                // Check if motion is near the orb in 2D space
                                if (Math.hypot(x - orbGridX, y - orbGridY) < 4) {
                                    targetFogColor.setHex(orbData.season.fog);
                                    targetRootColor.setHex(orbData.season.root);
                                    // Make it pop visually to confirm touch
                                    orbData.mesh.scale.set(1.6, 1.6, 1.6); 
                                }
                            });

                            // --- 3. Grass physics Map ---
                            const tx = ((worldX + 25) / 50) * mapSize;
                            const ty = ((worldZ + 15) / 30) * mapSize;

                            windCtx.beginPath();
                            const g1 = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 20);
                            g1.addColorStop(0, 'rgba(255,255,255,0.9)');
                            g1.addColorStop(1, 'rgba(255,255,255,0)');
                            windCtx.fillStyle = g1;
                            windCtx.arc(tx, ty, 20, 0, Math.PI*2);
                            windCtx.fill();

                            bloomCtx.beginPath();
                            const g2 = bloomCtx.createRadialGradient(tx, ty, 0, tx, ty, 35);
                            g2.addColorStop(0, 'rgba(255,255,255,1)');
                            g2.addColorStop(1, 'rgba(255,255,255,0)');
                            bloomCtx.fillStyle = g2;
                            bloomCtx.arc(tx, ty, 35, 0, Math.PI*2);
                            bloomCtx.fill();
                        }
                    }
                }
            }

            if(motionCount > 0) {
                butterflyTarget.x += (avgX/motionCount - butterflyTarget.x) * 0.05;
                butterflyTarget.z += (avgZ/motionCount - butterflyTarget.z) * 0.05;
            }

            prevFrame = new Uint8ClampedArray(currentFrame);
            windTex.needsUpdate = true;
            bloomTex.needsUpdate = true;
        }

        // --- Animation & Fade Loops ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Fade out the silhouette over time so it looks like a shadow trail
            silCtx.globalCompositeOperation = 'destination-out';
            silCtx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // speed of fading
            silCtx.fillRect(0, 0, silCanvas.width, silCanvas.height);
            silCtx.globalCompositeOperation = 'source-over'; // reset

            // 2. Fade physics textures
            windCtx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            windCtx.fillRect(0, 0, mapSize, mapSize);

            bloomCtx.fillStyle = 'rgba(0, 0, 0, 0.015)';
            bloomCtx.fillRect(0, 0, mapSize, mapSize);

            checkMotion();
            
            // 3. Smoothly transition seasons based on orb touches
            scene.fog.color.lerp(targetFogColor, 0.02);
            renderer.setClearColor(scene.fog.color);
            grassParams.rootColor.value.lerp(targetRootColor, 0.02);
            
            // Shrink orbs back to normal if they were touched
            orbs.forEach(o => o.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1));

            grassParams.time.value += 0.016;
            const time = Date.now() * 0.001;

            if(hasStarted && Math.random() > 0.98) {
                butterflyTarget.x = Math.sin(time)*15;
                butterflyTarget.z = Math.cos(time*1.3)*10;
            }

            butterflies.forEach((b, i) => {
                let target = butterflyTarget.clone();
                target.x += Math.sin(time*2 + i)*3;
                target.z += Math.cos(time*2 + i)*3;
                target.y = 2 + Math.sin(time*3 + i)*1.5;

                let dir = new THREE.Vector3().subVectors(target, b.position).normalize();
                b.userData.vel.add(dir.multiplyScalar(0.005));
                b.userData.vel.clampLength(0, 0.15);
                b.position.add(b.userData.vel);
                
                b.scale.x = 0.2 + Math.abs(Math.sin(time * 20 + i)) * 0.8; 
                b.lookAt(b.position.clone().add(b.userData.vel));
            });

            // Gentle floating motion for the sky orbs
            orbs.forEach((o, i) => {
                o.mesh.position.y = 16 + Math.sin(time * 2 + i * 2) * 0.5;
            });

            renderer.render(scene, camera);
        }

        // --- Fullscreen and UI Logic ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            const videoContainer = document.getElementById('video-container');

            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
                videoContainer.style.display = 'none';
                gui.hide();
            } else {
                uiOverlay.style.display = 'block';
                if(config.showWebcam) videoContainer.style.display = 'block';
                gui.show();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        getCameras();
        animate();
    </script>
</body>
</html>
