<body>

    <div id="loading-indicator">Initializing AI Hand Tracking...</div>
    <div id="center-message" class="pulse" style="opacity: 0;">Step away to calibrate background...<br>Then step in and touch the flower!</div>

    <div id="ui-overlay">

        <div id="camera-settings">

            <select id="camera-select">
                <option value="">Loading cameras...</option>
            </select>

                *Click when no one is in frame to isolate silhouettes!
            </div>

    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="motion-canvas" style="display:none;"></canvas>

    <!-- Import Maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <!-- Load MediaPipe Tasks Vision directly via ES Modules -->
    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js";

        // --- Configuration ---
        const config = {
            bgThreshold: 0.15, 
            showWebcam: false,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        let hasStarted = false;
        let handLandmarker = undefined;

        // --- GUI Setup ---
        const gui = new GUI({ title: '🌸 Admin Setup' });
        gui.add(config, 'bgThreshold', 0.05, 0.5, 0.01).name('Silhouette Sens.');
        gui.add(config, 'showWebcam').name('Show Webcam Feed').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Three.js Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015); // Light sky blue

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 8, 30); 
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB, 1); 
        // Enable depth sorting for proper layering
        renderer.sortObjects = true; 
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.7);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // Background elements (Sun & Clouds) pushed way back
        const sunGeo = new THREE.CircleGeometry(12, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff0aa, fog: false });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(-25, 25, -60);
        scene.add(sun);

        // --- Realistic Instanced Grass ---
        const windCanvas = document.createElement('canvas');
        windCanvas.width = 512; windCanvas.height = 512;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const numGrass = 35000;
        const grassGeo = new THREE.PlaneGeometry(0.15, 3.5, 1, 4);
        grassGeo.translate(0, 1.75, 0);

        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            side: THREE.DoubleSide,
            roughness: 0.8
        });

        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `
                uniform float time;
                uniform sampler2D windMap;
                varying vec2 vMyUv;
            ` + shader.vertexShader;

            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 30.0) / 60.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5 + instPos.z * 0.5) * 0.15;

                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 2.5 * position.y;
                    transformed.z -= windForce * 2.5 * position.y;
                }
                `
            );
            shader.fragmentShader = `varying vec2 vMyUv;` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(
                `#include <color_fragment>`,
                `
                #include <color_fragment>
                vec3 rootColor = vec3(0.02, 0.18, 0.02);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
                `
            );
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            // Grass distributed deep into the background and into the foreground
            dummy.position.set((Math.random() - 0.5) * 60, 0, (Math.random() - 0.5) * 40 - 5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- The Interactive Flower (Placed Mid-Ground) ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 2); // Flower is slightly forward
        scene.add(flowerGroup);

        const stemGeo = new THREE.CylinderGeometry(0.4, 0.7, 12, 16);
        stemGeo.translate(0, 6, 0);
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.6 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 12;
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0);
        petalShape.bezierCurveTo(2.0, 2.0, 3.0, 7.0, 0, 9.0);
        petalShape.bezierCurveTo(-3.0, 7.0, -2.0, 2.0, 0, 0);

        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });

        const petals = [];
        for (let i = 0; i < 12; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / 12) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.5; // Starts relatively closed
            flowerHead.add(petal);
            petals.push(petal);
        }

        const centerGeo = new THREE.SphereGeometry(2.5, 32, 16);
        centerGeo.scale(1, 0.4, 1);
        const centerMat = new THREE.MeshStandardMaterial({ color: 0xFFC107, roughness: 0.9 });
        const center = new THREE.Mesh(centerGeo, centerMat);
        center.position.y = 0.5;
        flowerHead.add(center);

        // --- HUGE Sparkles / Pollen System ---
        const pollenCount = 300;
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(pollenCount * 3);
        const pollenVel = [];

        for(let i=0; i<pollenCount; i++) {
            pollenPos[i*3] = 0; pollenPos[i*3+1] = -100; pollenPos[i*3+2] = 0;
            pollenVel.push(new THREE.Vector3());
        }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));

        const pCanvas = document.createElement('canvas');
        pCanvas.width = 64; pCanvas.height = 64;
        const pCtx = pCanvas.getContext('2d');
        const pGrad = pCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
        pGrad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        pGrad.addColorStop(0.3, 'rgba(255, 215, 0, 0.8)');
        pGrad.addColorStop(1, 'rgba(255, 193, 7, 0)');
        pCtx.fillStyle = pGrad;
        pCtx.beginPath(); pCtx.arc(32, 32, 32, 0, Math.PI*2); pCtx.fill();
        const pollenTex = new THREE.CanvasTexture(pCanvas);

        const pollenMat = new THREE.PointsMaterial({ 
            size: 6.0, map: pollenTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        let pollenIdx = 0;

        // --- SILHOUETTE (Depth Corrected & Mirrored Properly) ---
        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        videoTex.colorSpace = THREE.SRGBColorSpace;

        const bgCanvas = document.createElement('canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const bgTex = new THREE.CanvasTexture(bgCanvas);
        bgTex.colorSpace = THREE.SRGBColorSpace;

        // Positioned AT Z=0 so they are standing IN the grass, slightly behind the front flower
        const silhouetteGeo = new THREE.PlaneGeometry(60, 45); 
        const silhouetteMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTex },
                tBackground: { value: bgTex },
                brandColor: { value: new THREE.Color(0x2196F3) }, 
                threshold: { value: config.bgThreshold }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = vec2(1.0 - uv.x, uv.y); // Mirrors visual horizontally
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform sampler2D tBackground;
                uniform vec3 brandColor;
                uniform float threshold;
                varying vec2 vUv;

                void main() {
                    vec4 curr = texture2D(tDiffuse, vUv);
                    vec4 bg = texture2D(tBackground, vUv);
                    float diff = distance(curr.rgb, bg.rgb);
                    
                    if (diff < threshold) discard; // The Magic Fix for Depth Layering

                    float alpha = smoothstep(threshold, threshold * 1.5, diff);
                    if (alpha < 0.2) discard; // Ensures clean edges in the depth buffer
                    
                    vec3 finalColor = mix(brandColor, curr.rgb, 0.6) * 1.3;
                    gl_FragColor = vec4(finalColor, 1.0); 
                }
            `,
            transparent: false, // Turned off normal transparency because we use 'discard'
            depthWrite: true, // Now it correctly hides behind foreground grass and blocks background grass!
            side: THREE.DoubleSide
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -2); // Perfectly nested amidst the environment
        scene.add(silhouetteMesh);

        // Debug hands
        const handGeo = new THREE.SphereGeometry(1.5, 16, 16);
        const handMat = new THREE.MeshBasicMaterial({ color: 0xFFC107 });
        const leftHandPoint = new THREE.Mesh(handGeo, handMat);
        const rightHandPoint = new THREE.Mesh(handGeo, handMat);
        leftHandPoint.visible = false; rightHandPoint.visible = false;
        scene.add(leftHandPoint, rightHandPoint);

        function captureBackground() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                bgCanvas.width = video.videoWidth;
                bgCanvas.height = video.videoHeight;
                bgCtx.drawImage(video, 0, 0);
                bgTex.needsUpdate = true;

                if(!hasStarted) {
                    hasStarted = true;
                    document.getElementById('center-message').innerHTML = "Run to the flower!";
                    setTimeout(() => { document.getElementById('center-message').style.opacity = 0; }, 3000);
                }
            }
        }
        document.getElementById('calibrate-btn').addEventListener('click', captureBackground);


        // --- Initialize Camera & MediaPipe ---
        const cameraSelect = document.getElementById('camera-select');
        let currentStream = null;

        async function initializeAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 4 // Allow 2 kids (4 hands total)
            });
            document.getElementById('loading-indicator').style.display = 'none';
            document.getElementById('center-message').style.opacity = 1;
            getCameras();
        }

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) { cameraSelect.innerHTML = '<option>Camera Error</option>'; }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
                });
                video.srcObject = currentStream;
                setTimeout(() => { if(!hasStarted) captureBackground(); }, 5000);
            } catch (err) {}
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Interaction Logic ---
        let interactionLevel = 0; 
        let interactionTarget = 0;
        let lastVideoTime = -1;

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // MediaPipe Hand Tracking update
            let isTouchingFlower = false;
            
            if (handLandmarker && video.readyState === video.HAVE_ENOUGH_DATA) {
                if (video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    const results = handLandmarker.detectForVideo(video, performance.now());
                    
                    if (results.landmarks) {
                        results.landmarks.forEach((landmarks, idx) => {
                            // Index finger tip is landmark 8
                            const indexFinger = landmarks[8];
                            
                            // Map coordinate space. 
                            // MediaPipe 'x' goes 0 to 1 left-to-right from camera view.
                            // We mirrored visual, so x needs to map to (1.0 - x).
                            const screenX = 1.0 - indexFinger.x; 
                            const screenY = indexFinger.y;

                            const worldX = (screenX - 0.5) * 60.0; 
                            const worldY = -(screenY - 0.5) * 45.0 + 15.0; // Offset by silhouette height

                            // Wind push based on hands
                            const tx = ((worldX + 30) / 60) * 512;
                            windCtx.fillStyle = 'rgba(255,255,255,0.8)';
                            windCtx.beginPath();
                            windCtx.arc(tx, 256, 30, 0, Math.PI*2);
                            windCtx.fill();

                            // Distance to flower head
                            const distToFlower = Math.hypot(worldX - flowerHead.position.x, worldY - (flowerHead.position.y + flowerGroup.position.y));
                            
                            if (distToFlower < 8.0) { // Large forgiving hitbox for kids
                                isTouchingFlower = true;
                            }
                        });
                    }
                }
            }

            // Fade Wind
            windCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            windCtx.fillRect(0, 0, 512, 512);
            windTex.needsUpdate = true;

            silhouetteMat.uniforms.threshold.value = config.bgThreshold;
            grassParams.time.value += 0.016;

            // Flower Bloom Logic
            interactionTarget = isTouchingFlower ? 1.0 : 0.0;
            interactionLevel += (interactionTarget - interactionLevel) * 0.1;

            flowerGroup.rotation.z = Math.sin(time) * 0.05;
            flowerGroup.scale.setScalar(1.0 + interactionLevel * 0.2); 

            petals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.5, 2.0, interactionLevel); // Wide bloom!
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });

            flowerHead.rotation.y = time * 0.3;

            // Emit SPARKLES when touched
            if (interactionLevel > 0.4) {
                for(let k=0; k<5; k++) {
                    pollenPos[pollenIdx*3] = flowerHead.position.x + (Math.random()-0.5)*8;
                    pollenPos[pollenIdx*3+1] = flowerHead.position.y + 2 + flowerGroup.position.y;
                    pollenPos[pollenIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*8;

                    pollenVel[pollenIdx].set((Math.random()-0.5)*0.3, Math.random()*0.3 + 0.1, (Math.random()-0.5)*0.3);
                    pollenIdx = (pollenIdx + 1) % pollenCount;
                }
            }

            const pPositions = pollenGeo.attributes.position.array;
            for(let i=0; i<pollenCount; i++) {
                if(pPositions[i*3+1] > -50) { 
                    pPositions[i*3] += pollenVel[i].x;
                    pPositions[i*3+1] += pollenVel[i].y;
                    pPositions[i*3+2] += pollenVel[i].z;
                    pPositions[i*3] += Math.sin(time * 3 + i) * 0.05; // Wiggle
                    if(pPositions[i*3+1] > 40) pPositions[i*3+1] = -100;
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // --- Screen Resizing & Events ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            const videoContainer = document.getElementById('video-container');
            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
                videoContainer.style.display = 'none';
                gui.hide();
            } else {
                uiOverlay.style.display = 'block';
                if(config.showWebcam) videoContainer.style.display = 'block';
                gui.show();
            }
        });

        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'f') config.goFullscreen(); });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Launch AI and Loop
        initializeAI();
        animate();
    </script>
</body>
</html>
