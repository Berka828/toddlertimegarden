<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM Magical Seasons Garden</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #0a1710; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Overlays */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        .bxcm-logo {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        /* BxCM Brand Colors */
        .c-y { color: #FFC107; }
        .c-o { color: #FF5722; }
        .c-m { color: #E91E63; }
        .c-g { color: #4CAF50; }
        .c-b { color: #2196F3; }

        #camera-settings {
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            max-width: 300px;
            margin-top: 15px;
        }

        select {
            padding: 8px;
            font-size: 1rem;
            border-radius: 4px;
            margin-top: 5px;
            width: 100%;
            background: #222;
            color: white;
            border: 1px solid #555;
        }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
            opacity: 0.8;
            z-index: 10;
            display: none; 
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Welcome Message */
        #center-message {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 3rem;
            text-shadow: 0px 5px 15px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 20;
            transition: opacity 1s ease;
        }

        .pulse { animation: pulse 3s infinite; }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }
    </style>
</head>
<body>

    <div id="center-message" class="pulse">Wave your hands<br>to grow a magical garden!</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <label for="camera-select">🎥 Select Sensor/Camera:</label>
            <select id="camera-select">
                <option value="">Loading cameras...</option>
            </select>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="motion-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Configuration & State ---
        const config = {
            motionSensitivity: 35,
            flowerDensity: 2.5,
            gardenLifespan: 400,
            showWebcam: false,
            silhouetteOpacity: 0.25,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        const brandColors = [0xFFC107, 0xFF5722, 0xE91E63, 0x4CAF50, 0x2196F3, 0x9C27B0, 0x00BCD4]; 
        let hasStarted = false;

        const seasons = {
            SPRING: { color: 0x2196F3, bg: 0x0a1710, dropSpeed: 0.15, size: 0.05, sway: 0 },
            SUMMER: { color: 0xFFC107, bg: 0x1a1a00, dropSpeed: 0.02, size: 0.08, sway: 0.02 },
            AUTUMN: { color: 0xFF5722, bg: 0x1a0d00, dropSpeed: 0.05, size: 0.1, sway: 0.05 },
            WINTER: { color: 0xffffff, bg: 0x0a101a, dropSpeed: 0.03, size: 0.06, sway: 0.03 }
        };
        let currentSeason = 'SPRING';

        // --- Setup Admin GUI ---
        const gui = new GUI({ title: '🌱 Garden Admin Panel' });
        const motionFolder = gui.addFolder('Sensor & Timing');
        motionFolder.add(config, 'motionSensitivity', 10, 80, 1).name('Motion Sensitivity');
        motionFolder.add(config, 'flowerDensity', 1, 5, 0.1).name('Flower Spacing');
        motionFolder.add(config, 'gardenLifespan', 100, 1000, 10).name('Flower Lifespan');
        motionFolder.add(config, 'silhouetteOpacity', 0, 1, 0.05).name('Silhouette Visibility').onChange(v => {
            if(silhouetteMat) silhouetteMat.opacity = v;
        });
        motionFolder.add(config, 'showWebcam').name('Show Webcam').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Setup Three.js Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(seasons[currentSeason].bg, 0.015);

        // Orthographic-like wide perspective for the wall
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(seasons[currentSeason].bg, 1);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // --- Video Silhouette Layer ---
        const video = document.getElementById('webcam');
        let videoTexture, silhouetteMat;
        
        function initSilhouette() {
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.colorSpace = THREE.SRGBColorSpace;
            
            // Apply a tinted additive material to create a glowing silhouette effect
            silhouetteMat = new THREE.MeshBasicMaterial({ 
                map: videoTexture, 
                color: 0x2196F3, // Default brand blue tint
                transparent: true, 
                opacity: config.silhouetteOpacity,
                blending: THREE.AdditiveBlending 
            });
            
            // Large plane behind flowers
            const silGeo = new THREE.PlaneGeometry(55, 35);
            const silPlane = new THREE.Mesh(silGeo, silhouetteMat);
            silPlane.position.set(0, 0, -5); 
            silPlane.scale.x = -1; // Mirror to match movement
            scene.add(silPlane);
        }

        // --- Weather Triggers (Orbs in the sky) ---
        const triggers = [];
        const seasonConfigs = [
            { name: 'SUMMER', color: 0xFFC107, x: -12, y: 9 }, // Sun
            { name: 'AUTUMN', color: 0xFF5722, x: -4, y: 9 },  // Leaf
            { name: 'WINTER', color: 0xffffff, x: 4, y: 9 },   // Snow
            { name: 'SPRING', color: 0x2196F3, x: 12, y: 9 }   // Rain
        ];

        seasonConfigs.forEach(s => {
            const geo = new THREE.SphereGeometry(1.2, 16, 16);
            const mat = new THREE.MeshStandardMaterial({ color: s.color, emissive: s.color, emissiveIntensity: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(s.x, s.y, 0);
            scene.add(mesh);
            
            // Add a subtle glowing ring
            const ringGeo = new THREE.TorusGeometry(1.6, 0.1, 8, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: s.color, transparent: true, opacity: 0.5 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            mesh.add(ring);

            triggers.push({ mesh, name: s.name, color: s.color });
        });

        function changeSeason(newSeasonName) {
            if(currentSeason === newSeasonName) return;
            currentSeason = newSeasonName;
            const s = seasons[currentSeason];
            
            // Update environment
            renderer.setClearColor(s.bg, 1);
            scene.fog.color.setHex(s.bg);
            if(silhouetteMat) silhouetteMat.color.setHex(s.color);

            // Update particles
            weatherParticles.forEach(p => {
                p.mesh.material.color.setHex(s.color);
                p.mesh.scale.setScalar(s.size * 10);
            });
        }

        // --- Weather Particles ---
        const weatherParticles = [];
        const weatherGeo = new THREE.SphereGeometry(1, 8, 8);
        const weatherMat = new THREE.MeshBasicMaterial({ color: seasons.SPRING.color, transparent: true, opacity: 0.6 });

        for(let i=0; i<150; i++) {
            const mesh = new THREE.Mesh(weatherGeo, weatherMat.clone());
            mesh.position.set((Math.random()-0.5)*40, Math.random()*25, (Math.random()-0.5)*10);
            mesh.scale.setScalar(seasons.SPRING.size * 10);
            scene.add(mesh);
            weatherParticles.push({ mesh, offset: Math.random() * Math.PI * 2 });
        }

        // --- Garden Elements (Flowers & Fireflies) ---
        const flowers = [];
        const fireflies = [];

        const centerGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const petalGeo = new THREE.SphereGeometry(0.5, 16, 16);
        petalGeo.scale(1, 0.2, 1.5);

        function createFlower(x, y) {
            const flowerGroup = new THREE.Group();
            const colorHex = brandColors[Math.floor(Math.random() * brandColors.length)];
            const targetScale = 0.8 + Math.random() * 0.7;

            const centerMat = new THREE.MeshStandardMaterial({ color: 0xFFC107, roughness: 0.4 });
            const center = new THREE.Mesh(centerGeo, centerMat);
            flowerGroup.add(center);

            const petalMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.3 });
            for(let i=0; i<5; i++) {
                const petal = new THREE.Mesh(petalGeo, petalMat);
                const angle = (i / 5) * Math.PI * 2;
                petal.position.x = Math.cos(angle) * 0.6;
                petal.position.y = Math.sin(angle) * 0.6;
                petal.rotation.z = angle;
                petal.rotation.x = 0.2; 
                flowerGroup.add(petal);
            }

            flowerGroup.position.set(x, y, 0);
            flowerGroup.scale.set(0, 0, 0); 
            flowerGroup.rotation.z = Math.random() * Math.PI;

            scene.add(flowerGroup);
            flowers.push({ mesh: flowerGroup, targetScale: targetScale, age: 0, state: 'growing' });
        }

        // --- Camera & Motion Setup ---
        const cameraSelect = document.getElementById('camera-select');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

        const GRID_W = 60; 
        const GRID_H = 40;
        motionCanvas.width = GRID_W;
        motionCanvas.height = GRID_H;

        let prevFrame = null;
        let currentStream = null;

        const wallWidth = 35;
        const wallHeight = 22;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) {
                cameraSelect.innerHTML = '<option>Permission Denied/Error</option>';
            }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
                });
                video.srcObject = currentStream;
                initSilhouette(); // Initialize silhouette once camera starts
            } catch (err) { console.error(err); }
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Motion Tracking ---
        function checkMotion() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currentFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y+=2) { 
                    for (let x = 0; x < GRID_W; x+=2) {
                        const i = (y * GRID_W + x) * 4;

                        const rDiff = Math.abs(currentFrame[i] - prevFrame[i]);
                        const gDiff = Math.abs(currentFrame[i+1] - prevFrame[i+1]);
                        const bDiff = Math.abs(currentFrame[i+2] - prevFrame[i+2]);

                        if (rDiff + gDiff + bDiff > config.motionSensitivity) {

                            if(!hasStarted) {
                                hasStarted = true;
                                document.getElementById('center-message').style.opacity = 0;
                            }

                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const normY = -( (y / GRID_H) * 2 - 1 );

                            const worldX = normX * (wallWidth / 2);
                            const worldY = normY * (wallHeight / 2);

                            // Check Weather Triggers
                            if(worldY > 7) {
                                triggers.forEach(t => {
                                    if(Math.hypot(t.mesh.position.x - worldX, t.mesh.position.y - worldY) < 2) {
                                        changeSeason(t.name);
                                        // Simple pulse animation for the orb
                                        t.mesh.scale.set(1.3, 1.3, 1.3);
                                    }
                                });
                            }

                            // Spawn flowers on ground/mid level
                            let tooClose = false;
                            for(let f of flowers) {
                                const dist = Math.hypot(f.mesh.position.x - worldX, f.mesh.position.y - worldY);
                                if(dist < config.flowerDensity && f.state !== 'shrinking') {
                                    tooClose = true;
                                    break;
                                }
                            }

                            if(!tooClose && worldY < 8) {
                                createFlower(worldX, worldY);
                            }
                        }
                    }
                }
            }
            prevFrame = new Uint8ClampedArray(currentFrame);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            checkMotion();

            // Animate triggers
            triggers.forEach((t, index) => {
                t.mesh.position.y = 9 + Math.sin(Date.now() * 0.002 + index) * 0.3;
                t.mesh.rotation.y += 0.01;
                t.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1); // Recover from pulse
            });

            // Animate Weather
            const sConfig = seasons[currentSeason];
            weatherParticles.forEach(p => {
                p.mesh.position.y -= sConfig.dropSpeed;
                p.mesh.position.x += Math.sin(Date.now() * 0.001 + p.offset) * sConfig.sway;
                
                // Wrap around
                if(p.mesh.position.y < -12) {
                    p.mesh.position.y = 12 + Math.random() * 5;
                    p.mesh.position.x = (Math.random()-0.5)*40;
                }
            });

            // Animate Flowers
            for(let i = flowers.length - 1; i >= 0; i--) {
                let f = flowers[i];
                f.age++;

                if(f.state === 'growing') {
                    f.mesh.scale.lerp(new THREE.Vector3(f.targetScale, f.targetScale, f.targetScale), 0.1);
                    f.mesh.rotation.z += 0.02; 
                    if(f.targetScale - f.mesh.scale.x < 0.01) f.state = 'blooming';
                } 
                else if (f.state === 'blooming') {
                    const breath = Math.sin(f.age * 0.05) * 0.05;
                    f.mesh.scale.set(f.targetScale + breath, f.targetScale + breath, f.targetScale + breath);
                    if(f.age > config.gardenLifespan) f.state = 'shrinking';
                }
                else if (f.state === 'shrinking') {
                    f.mesh.scale.multiplyScalar(0.9);
                    f.mesh.rotation.z -= 0.05;
                    if(f.mesh.scale.x < 0.05) {
                        scene.remove(f.mesh);
                        flowers.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // --- Fullscreen and UI Logic ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            const videoContainer = document.getElementById('video-container');

            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
                videoContainer.style.display = 'none';
                gui.hide();
            } else {
                uiOverlay.style.display = 'block';
                if(config.showWebcam) videoContainer.style.display = 'block';
                gui.show();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        getCameras();
        animate();
    </script>
</body>
</html>
