<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM Interactive MediaPipe Meadow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Elements */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

            font-weight: 700;

            letter-spacing: 2px;

    </style>

<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h1>Loading AI Vision Camera...</h1>
        <p>Please stand back so the camera can see you!</p>
    </div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
    </div>

    <div class="instructions">
        ✨ <b>Reach up</b> to touch the Sun & Clouds<br>
        🌸 <b>Stand near</b> the center to bloom the flower<br>
        ⌨️ Press <b>F</b> for Fullscreen, <b>V</b> to toggle Video
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. Three.js Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02); // Sky blue background

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 15, 35); 
        camera.lookAt(0, 8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB, 1);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 40, 20);
        scene.add(dirLight);

        // --- 2. Interactive Environment Elements ---

        // A. The Sun (Top Right)
        const sunGeo = new THREE.SphereGeometry(4, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(20, 25, -10);
        scene.add(sun);
        
        // Sun Glow Rings
        const sunRingGeo = new THREE.RingGeometry(4.5, 6, 32);
        const sunRingMat = new THREE.MeshBasicMaterial({ color: 0xFFEA00, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
        const sunRing = new THREE.Mesh(sunRingGeo, sunRingMat);
        sun.add(sunRing);

        // B. The Cloud & Rain (Top Left)
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(-20, 24, -10);
        scene.add(cloudGroup);
        
        const cGeo = new THREE.SphereGeometry(3, 16, 16);
        const cMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
        const c1 = new THREE.Mesh(cGeo, cMat); c1.position.set(0, 0, 0);
        const c2 = new THREE.Mesh(cGeo, cMat); c2.position.set(3, -1, 1); c2.scale.setScalar(0.8);
        const c3 = new THREE.Mesh(cGeo, cMat); c3.position.set(-3, -0.5, -1); c3.scale.setScalar(0.9);
        const c4 = new THREE.Mesh(cGeo, cMat); c4.position.set(1.5, 2, 0); c4.scale.setScalar(0.7);
        cloudGroup.add(c1, c2, c3, c4);

        // Rain Particles
        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 300;
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = (Math.random()-0.5)*10;
            rainPos[i*3+1] = -100; // Hidden
            rainPos[i*3+2] = (Math.random()-0.5)*4;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0x2196F3, size: 0.4, transparent: true, opacity: 0.6 });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        cloudGroup.add(rainSystem);

        // C. The Rainbow (Center Sky)
        const rbGeo = new THREE.TorusGeometry(25, 1.5, 16, 64, Math.PI);
        // Custom simple rainbow shader
        const rbMat = new THREE.ShaderMaterial({
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                varying vec2 vUv;
                uniform float opacity;
                void main() {
                    float t = vUv.y;
                    vec3 col = vec3(1.0);
                    if(t > 0.8) col = vec3(1.0, 0.0, 0.0);
                    else if(t > 0.6) col = vec3(1.0, 0.5, 0.0);
                    else if(t > 4.0) col = vec3(1.0, 1.0, 0.0);
                    else if(t > 0.2) col = vec3(0.0, 1.0, 0.0);
                    else col = vec3(0.0, 0.0, 1.0);
                    gl_FragColor = vec4(col, opacity);
                }
            `,
            transparent: true,
            uniforms: { opacity: { value: 0.0 } }
        });
        const rainbow = new THREE.Mesh(rbGeo, rbMat);
        rainbow.position.set(0, 0, -20);
        scene.add(rainbow);

        // --- 3. The Giant Flower ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 5); // Ground level, center
        scene.add(flowerGroup);

        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0x4CAF50 }));
        stem.position.y = 4;
        flowerGroup.add(stem);

        const head = new THREE.Group();
        head.position.y = 8;
        flowerGroup.add(head);
        
        const pGeo = new THREE.CapsuleGeometry(1.5, 5, 4, 8);
        const pMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });
        const petals = [];
        for(let i=0; i<12; i++) {
            const p = new THREE.Mesh(pGeo, pMat);
            p.rotation.z = (i/12) * Math.PI * 2;
            p.position.set(Math.cos(p.rotation.z)*2, Math.sin(p.rotation.z)*2, 0);
            p.userData.baseRotZ = p.rotation.z;
            p.rotation.x = 0.5; // Closed initial state
            head.add(p);
            petals.push(p);
        }
        const centerGeo = new THREE.SphereGeometry(2.5, 16, 16);
        const centerMat = new THREE.MeshStandardMaterial({ color: 0xFFC107 });
        const fCenter = new THREE.Mesh(centerGeo, centerMat);
        fCenter.scale.z = 0.3;
        head.add(fCenter);

        // --- 4. Responsive Grass Shader ---
        // We pass an array of vectors representing player hands/feet to push the grass
        const interactors = [
            new THREE.Vector3(0,-100,0), new THREE.Vector3(0,-100,0), // Hands
            new THREE.Vector3(0,-100,0), new THREE.Vector3(0,-100,0)  // Feet
        ];
        
        const numGrass = 25000;
        const grassGeo = new THREE.PlaneGeometry(0.2, 3.5, 1, 4);
        grassGeo.translate(0, 1.75, 0); // Pivot at ground
        
        const grassMat = new THREE.ShaderMaterial({
            side: THREE.DoubleSide,
            uniforms: {
                time: { value: 0 },
                interactors: { value: interactors }
            },
            vertexShader: `
                uniform float time;
                uniform vec3 interactors[4];
                varying vec2 vUv;
                
                void main() {
                    vUv = uv;
                    vec3 pos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                    vec3 transformed = vec3(position);
                    
                    // Wind
                    float wind = sin(time * 2.0 + pos.x * 0.5 + pos.z * 0.5) * 0.15;
                    
                    if (position.y > 0.0) {
                        transformed.x += wind * position.y;
                        
                        // Push away from interactors
                        for(int i=0; i<4; i++) {
                            vec3 interactor = interactors[i];
                            float dist = distance(pos.xz, interactor.xz);
                            if (dist < 6.0) {
                                float force = (1.0 - dist / 6.0) * 2.5;
                                vec2 dir = normalize(pos.xz - interactor.xz);
                                transformed.x += dir.x * force * (position.y / 3.5);
                                transformed.z += dir.y * force * (position.y / 3.5);
                                transformed.y -= force * 0.5; // Squash down slightly
                            }
                        }
                    }
                    gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(transformed, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                void main() {
                    vec3 rootColor = vec3(0.05, 0.25, 0.05);
                    vec3 tipColor = vec3(0.3, 0.7, 0.2);
                    gl_FragColor = vec4(mix(rootColor, tipColor, vUv.y), 1.0);
                }
            `
        });

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 80, 0, (Math.random() - 0.5) * 40 - 5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.5 + Math.random() * 0.5);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(grassMesh);

        // --- 5. Player 3D Avatar (Constructed from MediaPipe Landmarks) ---
        const jointCount = 33;
        const avatarGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const avatarMat = new THREE.MeshBasicMaterial({ color: 0x2196F3, transparent: true, opacity: 0.8 });
        const avatarMesh = new THREE.InstancedMesh(avatarGeo, avatarMat, jointCount);
        
        // Initialize avatar far away
        for(let i=0; i<jointCount; i++) {
            dummy.position.set(0, -100, 0);
            dummy.updateMatrix();
            avatarMesh.setMatrixAt(i, dummy.matrix);
        }
        avatarMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(avatarMesh);

        // Smoothly interpolate landmarks to prevent jitter
        const targetJoints = Array(jointCount).fill(0).map(() => new THREE.Vector3(0, -100, 0));
        const currentJoints = Array(jointCount).fill(0).map(() => new THREE.Vector3(0, -100, 0));

        // --- 6. AI Vision Setup (MediaPipe Pose) ---
        const videoElement = document.getElementById('webcam');
        let aiInitialized = false;

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1, // Fast but accurate body tracking
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            if (!aiInitialized) {
                aiInitialized = true;
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }

            if (results.poseLandmarks) {
                results.poseLandmarks.forEach((lm, index) => {
                    // Map MediaPipe (0-1) to Three.js World Coordinates
                    // Mirrored horizontally: 1 - lm.x
                    const worldX = ((1 - lm.x) - 0.5) * 60; // Spread wide
                    const worldY = (1 - lm.y) * 35 - 5;    // Ground zero adjusted
                    const worldZ = (lm.z * -30) + 10;      // Depth

                    // Map specific joints we care about, hide facial features to look more abstract
                    if(index > 10) { 
                        targetJoints[index].set(worldX, worldY, worldZ);
                    } else if (index === 0) { // Nose / Head
                        targetJoints[index].set(worldX, worldY, worldZ);
                    } else {
                        targetJoints[index].set(0, -100, 0); // Hide eyes/ears
                    }
                });
            } else {
                // If nobody is on camera, move avatar away
                targetJoints.forEach(tj => tj.set(0, -100, 0));
            }
        });

        // Initialize WebCam
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // --- 7. Interaction Logic & Animation Loop ---
        let sunActive = 0, cloudActive = 0, flowerActive = 0;
        let rainIntensity = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Smooth Avatar Interpolation
            for(let i=0; i<jointCount; i++) {
                currentJoints[i].lerp(targetJoints[i], 0.2); // Smooth out movements
                dummy.position.copy(currentJoints[i]);
                
                // Make hands/head slightly larger
                if(i===0) dummy.scale.setScalar(2.0); // Head
                else if(i===15 || i===16) dummy.scale.setScalar(1.5); // Hands
                else dummy.scale.setScalar(1.0);
                
                dummy.updateMatrix();
                avatarMesh.setMatrixAt(i, dummy.matrix);
            }
            avatarMesh.instanceMatrix.needsUpdate = true;

            // Track Interaction Points (Left Hand [15], Right Hand [16], Feet [31,32])
            interactors[0].copy(currentJoints[15]); 
            interactors[1].copy(currentJoints[16]); 
            interactors[2].copy(currentJoints[31]); 
            interactors[3].copy(currentJoints[32]);

            // Grass wind update
            grassMat.uniforms.time.value = time;

            // Interactions (Checking distance of hands/body to elements)
            
            // 1. Sun Check
            const leftDistSun = interactors[0].distanceTo(sun.position);
            const rightDistSun = interactors[1].distanceTo(sun.position);
            if (leftDistSun < 8 || rightDistSun < 8) sunActive += (1 - sunActive) * 0.1;
            else sunActive += (0 - sunActive) * 0.05;

            sun.scale.setScalar(1 + sunActive * 0.5);
            sunRing.rotation.z = time * (1 + sunActive * 5); // Spin faster
            sunMat.color.setHSL(0.14, 1, 0.5 + sunActive * 0.3); // Glow brighter

            // 2. Cloud Check
            const leftDistCloud = interactors[0].distanceTo(cloudGroup.position);
            const rightDistCloud = interactors[1].distanceTo(cloudGroup.position);
            if (leftDistCloud < 8 || rightDistCloud < 8) cloudActive += (1 - cloudActive) * 0.1;
            else cloudActive += (0 - cloudActive) * 0.05;

            cloudGroup.position.y = 24 + Math.sin(time*2) * 1; // Bobbing
            cMat.color.setRGB(1 - cloudActive*0.3, 1 - cloudActive*0.3, 1 - cloudActive*0.1); // Darken to rain cloud

            // Rain mechanics
            if (cloudActive > 0.5) rainIntensity = 1;
            else rainIntensity = Math.max(0, rainIntensity - 0.01);

            const rPositions = rainGeo.attributes.position.array;
            for(let i=0; i<rainCount; i++) {
                if(i < rainCount * rainIntensity) {
                    rPositions[i*3+1] -= 0.6; // Fall
                    if(rPositions[i*3+1] < -5) rPositions[i*3+1] = 5; // Reset top of cloud
                } else {
                    rPositions[i*3+1] = -100; // Hide
                }
            }
            rainGeo.attributes.position.needsUpdate = true;

            // 3. Rainbow (Appears if both sun and rain are recently active)
            if(sunActive > 0.2 && rainIntensity > 0.2) {
                rbMat.uniforms.opacity.value += (0.8 - rbMat.uniforms.opacity.value) * 0.02;
            } else {
                rbMat.uniforms.opacity.value += (0 - rbMat.uniforms.opacity.value) * 0.02;
            }

            // 4. Flower Check (Distance of ANY joint to center)
            let minDistanceToFlower = 100;
            for(let i=0; i<jointCount; i++) {
                const d = currentJoints[i].distanceTo(flowerGroup.position);
                if(d < minDistanceToFlower) minDistanceToFlower = d;
            }
            
            // Bloom if within 12 units
            if (minDistanceToFlower < 12) flowerActive += (1 - flowerActive) * 0.08;
            else flowerActive += (0 - flowerActive) * 0.05;

            // Animate Petals
            petals.forEach(p => {
                // Open wide when active
                p.rotation.x = THREE.MathUtils.lerp(0.5, 1.8, flowerActive);
                // Idle breathing
                p.rotation.x += Math.sin(time * 3 + p.userData.baseRotZ) * 0.05;
            });
            
            // Flower swells and spins
            head.scale.setScalar(1 + flowerActive * 0.3);
            flowerGroup.rotation.y = time * 0.2 + flowerActive * Math.sin(time*5)*0.2; // Wiggles happily

            renderer.render(scene, camera);
        }

        // Fullscreen & UI Toggles
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
            if (e.key.toLowerCase() === 'v') {
                const vc = document.getElementById('video-container');
                vc.style.opacity = vc.style.opacity === '0' ? '0.5' : '0';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
