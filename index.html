<head>

    <title>BxCM MediaPipe Interactive Meadow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Overlays */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;

    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading-message">Loading AI Vision Models...<br>Please wait!</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <div style="font-size: 0.9rem; margin-bottom: 5px;">Touch the Cloud for Rain! 🌧️</div>
            <div style="font-size: 0.9rem; margin-bottom: 5px;">Touch the Sun for a Rainbow! 🌈</div>
            <div style="font-size: 0.9rem; margin-bottom: 5px;">Touch the Flower to Bloom! 🌸</div>
            <button id="fs-btn">Toggle Fullscreen (F)</button>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <!-- Script imports -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 15, 45); 
        camera.lookAt(0, 10, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB, 1); // Sky blue
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // --- Game State Variables ---
        let handLeftPos = new THREE.Vector3(-100, -100, 0);
        let handRightPos = new THREE.Vector3(-100, -100, 0);
        let isRaining = false;
        let rainIntensity = 0;
        let isRainbow = false;
        let rainbowIntensity = 0;
        let flowerBloomLevel = 0;

        // --- 1. Silhouette / Background Removal Canvas ---
        // We render the user directly to an offscreen canvas using MediaPipe's mask
        const maskCanvas = document.createElement('canvas');
        maskCanvas.width = 640; maskCanvas.height = 480;
        const maskCtx = maskCanvas.getContext('2d');
        const silhouetteTex = new THREE.CanvasTexture(maskCanvas);
        silhouetteTex.colorSpace = THREE.SRGBColorSpace;

        const silhouetteGeo = new THREE.PlaneGeometry(50, 37.5);
        // Pivot at the bottom so it sits perfectly on the floor
        silhouetteGeo.translate(0, 18.75, 0); 
        const silhouetteMat = new THREE.MeshBasicMaterial({ 
            map: silhouetteTex, 
            transparent: true,
            side: THREE.DoubleSide
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 0, -5); // Ground level, slightly behind flower
        scene.add(silhouetteMesh);

        // Hand trackers (Visual indicators for the kids)
        const handGeo = new THREE.SphereGeometry(1.2, 16, 16);
        const handMat = new THREE.MeshBasicMaterial({ color: 0xFFC107, transparent: true, opacity: 0.8 });
        const handMeshL = new THREE.Mesh(handGeo, handMat);
        const handMeshR = new THREE.Mesh(handGeo, handMat);
        scene.add(handMeshL);
        scene.add(handMeshR);

        // --- 2. Interactive Sky Elements ---
        // Sun (Top Right)
        const sunGeo = new THREE.CircleGeometry(6, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff0aa });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(18, 30, -10);
        scene.add(sun);

        // Cloud (Top Left)
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(-18, 28, -8);
        const cGeo = new THREE.SphereGeometry(3, 16, 16);
        const cMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
        const c1 = new THREE.Mesh(cGeo, cMat);
        const c2 = new THREE.Mesh(cGeo, cMat); c2.position.set(-3, -1, 0); c2.scale.setScalar(0.8);
        const c3 = new THREE.Mesh(cGeo, cMat); c3.position.set(3, -1, 0); c3.scale.setScalar(0.9);
        cloudGroup.add(c1, c2, c3);
        scene.add(cloudGroup);

        // Rain Particles
        const rainCount = 500;
        const rainGeo = new THREE.BufferGeometry();
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = -18 + (Math.random()-0.5)*12; // Under cloud
            rainPos[i*3+1] = Math.random() * 30; // Height
            rainPos[i*3+2] = -8 + (Math.random()-0.5)*4;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0xAAAAFF, size: 0.3, transparent: true, opacity: 0 });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        scene.add(rainSystem);

        // Rainbow (Center Arch)
        const rainbowGeo = new THREE.TorusGeometry(20, 1.5, 16, 100, Math.PI);
        const rainbowMat = new THREE.ShaderMaterial({
            uniforms: { opacity: { value: 0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float opacity;
                varying vec2 vUv;
                void main() {
                    float t = vUv.y;
                    vec3 col = vec3(1.0, 0.0, 0.0);
                    if(t < 0.2) col = mix(vec3(1.0,0.0,0.0), vec3(1.0,0.5,0.0), t/0.2);
                    else if(t < 0.4) col = mix(vec3(1.0,0.5,0.0), vec3(1.0,1.0,0.0), (t-0.2)/0.2);
                    else if(t < 0.6) col = mix(vec3(1.0,1.0,0.0), vec3(0.0,1.0,0.0), (t-0.4)/0.2);
                    else if(t < 0.8) col = mix(vec3(0.0,1.0,0.0), vec3(0.0,0.0,1.0), (t-0.6)/0.2);
                    else col = mix(vec3(0.0,0.0,1.0), vec3(0.5,0.0,1.0), (t-0.8)/0.2);
                    gl_FragColor = vec4(col, opacity * sin(vUv.x * 3.1415));
                }
            `,
            transparent: true, depthWrite: false
        });
        const rainbow = new THREE.Mesh(rainbowGeo, rainbowMat);
        rainbow.position.set(0, 0, -15);
        scene.add(rainbow);

        // --- 3. Grass Engine (Lowered & Responsive) ---
        const mapSize = 256;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const numGrass = 30000;
        const grassGeo = new THREE.PlaneGeometry(0.2, 3.0, 1, 4);
        grassGeo.translate(0, 1.5, 0); // Ground zero

        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, side: THREE.DoubleSide, roughness: 0.8
        });
        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `uniform float time; uniform sampler2D windMap; varying vec2 vMyUv;` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 30.0) / 60.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5 + instPos.z * 0.5) * 0.15;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 2.0 * position.y;
                    transformed.z -= windForce * 2.0 * position.y;
                    transformed.y -= windForce * 0.5 * position.y; 
                }
                `
            );
            shader.fragmentShader = `varying vec2 vMyUv;` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(
                `#include <color_fragment>`,
                `
                #include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.12, 0.01);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
                `
            );
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 60, 0, (Math.random() - 0.5) * 25);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- 4. The Giant Interactive Flower ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 8); // Deep in foreground
        scene.add(flowerGroup);

        const stemGeo = new THREE.CylinderGeometry(0.4, 0.7, 10, 16);
        stemGeo.translate(0, 5, 0); 
        const stem = new THREE.Mesh(stemGeo, new THREE.MeshStandardMaterial({ color: 0x4CAF50 }));
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 10;
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0); petalShape.bezierCurveTo(2.0, 2.0, 2.5, 6.0, 0, 8.0); petalShape.bezierCurveTo(-2.5, 6.0, -2.0, 2.0, 0, 0);
        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petals = [];
        for (let i = 0; i < 14; i++) {
            const petal = new THREE.Mesh(petalGeo, new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide }));
            petal.rotation.y = (i / 14) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            flowerHead.add(petal);
            petals.push(petal);
        }

        const center = new THREE.Mesh(new THREE.SphereGeometry(2.2, 32, 16), new THREE.MeshStandardMaterial({ color: 0xFF5722 }));
        center.scale.set(1, 0.4, 1);
        center.position.y = 0.5;
        flowerHead.add(center);

        // --- 5. MediaPipe AI Logic ---
        const videoElement = document.getElementById('webcam');
        let poseModel = null;

        function initializeMediaPipe() {
            poseModel = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
            poseModel.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: true, // Crucial for background removal
                smoothSegmentation: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            poseModel.onResults((results) => {
                document.getElementById('loading-message').classList.add('hidden');

                // 1. Draw Silhouette (Background Subtraction)
                maskCtx.save();
                maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
                if (results.segmentationMask) {
                    maskCtx.drawImage(results.segmentationMask, 0, 0, maskCanvas.width, maskCanvas.height);
                    // Use the mask to only show the person from the raw video feed
                    maskCtx.globalCompositeOperation = 'source-in';
                    maskCtx.drawImage(results.image, 0, 0, maskCanvas.width, maskCanvas.height);
                }
                maskCtx.restore();
                silhouetteTex.needsUpdate = true;

                // 2. Track Hands for Interactivity
                let touchedFlower = false;
                
                if (results.poseLandmarks) {
                    const lms = results.poseLandmarks;
                    // Left Index (19) and Right Index (20)
                    const left = lms[19]; const right = lms[20];

                    if(left) {
                        handLeftPos.x = (1 - left.x) * 50 - 25; // Mirror mapping
                        handLeftPos.y = (1 - left.y) * 37.5;
                        handMeshL.position.copy(handLeftPos);
                        createWindRipple(handLeftPos.x, handLeftPos.y);
                        checkCollisions(handLeftPos);
                        if(handLeftPos.distanceTo(flowerHead.position) < 10) touchedFlower = true;
                    }
                    if(right) {
                        handRightPos.x = (1 - right.x) * 50 - 25; 
                        handRightPos.y = (1 - right.y) * 37.5;
                        handMeshR.position.copy(handRightPos);
                        createWindRipple(handRightPos.x, handRightPos.y);
                        checkCollisions(handRightPos);
                        if(handRightPos.distanceTo(flowerHead.position) < 10) touchedFlower = true;
                    }
                    
                    // Track body for grass
                    if(lms[24] && lms[23]) { // Hips
                        const bodyX = (1 - ((lms[24].x + lms[23].x)/2)) * 50 - 25;
                        createWindRipple(bodyX, 0); // Push grass near feet
                    }
                }

                // Smoothly bloom flower
                flowerBloomLevel += ((touchedFlower ? 1 : 0) - flowerBloomLevel) * 0.1;
            });

            // Start Camera
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await poseModel.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraUtils.start();
        }

        // Draw circles on the wind map to bend grass
        function createWindRipple(x, y) {
            const tx = ((x + 30) / 60) * mapSize;
            const ty = 128; // Grass is at the bottom
            
            windCtx.beginPath();
            const g = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 20);
            g.addColorStop(0, 'rgba(255,255,255,0.8)');
            g.addColorStop(1, 'rgba(255,255,255,0)');
            windCtx.fillStyle = g;
            windCtx.arc(tx, ty, 20, 0, Math.PI*2);
            windCtx.fill();
        }

        function checkCollisions(handPos) {
            // Cloud Collision (Top Left)
            if (handPos.distanceTo(cloudGroup.position) < 8) isRaining = true;
            else isRaining = false;

            // Sun Collision (Top Right)
            if (handPos.distanceTo(sun.position) < 8) isRainbow = true;
            else isRainbow = false;
        }

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Fade wind texture (grass bounces back)
            windCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            windCtx.fillRect(0, 0, mapSize, mapSize);
            windTex.needsUpdate = true;

            const time = Date.now() * 0.001;
            grassParams.time.value = time;

            // Flower Bloom Animation
            flowerGroup.rotation.z = Math.sin(time) * 0.05 + (flowerBloomLevel * 0.2);
            petals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.3, 1.8, flowerBloomLevel); 
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });

            // Rain Physics
            rainIntensity += ((isRaining ? 1 : 0) - rainIntensity) * 0.05;
            rainMat.opacity = rainIntensity;
            if(rainIntensity > 0.01) {
                const positions = rainGeo.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    positions[i*3+1] -= 0.5; // fall speed
                    if(positions[i*3+1] < 0) positions[i*3+1] = 28; // reset to cloud height
                }
                rainGeo.attributes.position.needsUpdate = true;
            }

            // Rainbow Physics
            rainbowIntensity += ((isRainbow ? 1 : 0) - rainbowIntensity) * 0.05;
            rainbowMat.uniforms.opacity.value = rainbowIntensity;

            renderer.render(scene, camera);
        }

        // --- Init ---
        document.getElementById('fs-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initializeMediaPipe();
        animate();
    </script>
</body>
</html>
