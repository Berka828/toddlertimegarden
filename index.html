<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM Interactive Meadow Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Elements */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
        }

        .bxcm-logo {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);

            transition: opacity 1s ease; pointer-events: auto;

        #start-btn {
            padding: 15px 30px; font-size: 1.5rem; font-family: 'Quicksand', sans-serif;
            font-weight: bold; color: white; background: #E91E63; border: none;

            margin-top: 20px; transition: transform 0.2s; display: none;
        }
        #start-btn:hover { transform: scale(1.05); background: #FF5722; }

        #status-text { font-size: 1.5rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); margin-top: 15px;}

        /* Debug Video (Hidden by default) */
        .input_video { display: none; }
    </style>

    <!-- MediaPipe Libraries (Loaded synchronously to ensure they are ready) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <!-- Three.js Library -->

            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="loading-screen">
        <h1 style="font-size: 3rem; margin: 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.3);">BxCM Magic Meadow</h1>
        <div id="status-text">Loading AI Tracking Models... Please wait.</div>
        <button id="start-btn">Start Experience</button>
    </div>

    <div id="ui-layer">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
    </div>

    <video class="input_video" autoplay playsinline></video>
    <canvas id="output_canvas" style="display:none;"></canvas>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. System Setup & State ---
        const videoElement = document.getElementsByClassName('input_video')[0];
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d', { willReadFrequently: true });
        
        // Internal resolution for processing
        canvasElement.width = 640; 
        canvasElement.height = 480;

        let isRunning = false;
        const handPositions = { 
            left: new THREE.Vector3(0,-100,0), 
            right: new THREE.Vector3(0,-100,0),
            center: new THREE.Vector3(0,-100,0) // Body center for grass
        };

        // Interaction States
        let isSunny = false;
        let isRaining = false;
        let flowerBloom = 0;

        // --- 2. Three.js Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 25); 
        camera.lookAt(0, 6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffdfaa, 1.2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 3. Environment Objects ---

        // A. The Sun (Top Right, Z = -15)
        const sunGeo = new THREE.SphereGeometry(3, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFEB3B });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(12, 16, -15);
        scene.add(sun);

        // Sun Aura
        const auraGeo = new THREE.CircleGeometry(4.5, 32);
        const auraMat = new THREE.MeshBasicMaterial({ color: 0xFFC107, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
        const sunAura = new THREE.Mesh(auraGeo, auraMat);
        sunAura.position.set(12, 16, -15.1);
        scene.add(sunAura);

        // B. The Rainbow (Hidden by default, Z = -12)
        const rainbowGeo = new THREE.TorusGeometry(15, 1.5, 16, 64, Math.PI);
        const rainbowMat = new THREE.MeshNormalMaterial({ transparent: true, opacity: 0 }); // Simple coloring
        const rainbow = new THREE.Mesh(rainbowGeo, rainbowMat);
        rainbow.position.set(0, 0, -12);
        rainbow.rotation.z = Math.PI; // Arch up
        scene.add(rainbow);

        // C. The Cloud (Top Left, Z = -15)
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(-12, 16, -15);
        const cGeo = new THREE.SphereGeometry(2.5, 16, 16);
        const cMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
        const c1 = new THREE.Mesh(cGeo, cMat);
        const c2 = new THREE.Mesh(new THREE.SphereGeometry(2), cMat); c2.position.set(-2.5, -0.5, 0);
        const c3 = new THREE.Mesh(new THREE.SphereGeometry(2), cMat); c3.position.set(2.5, -0.5, 0);
        cloudGroup.add(c1, c2, c3);
        scene.add(cloudGroup);

        // Rain Particles
        const rainCount = 300;
        const rainGeo = new THREE.BufferGeometry();
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = -12 + (Math.random() - 0.5) * 6; // X near cloud
            rainPos[i*3+1] = 16 - Math.random() * 20; // Y
            rainPos[i*3+2] = -15 + (Math.random() - 0.5) * 2; // Z
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0x4fc3f7, size: 0.2, transparent: true, opacity: 0 });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        scene.add(rainSystem);

        // D. The Giant Flower (Center, Ground level, Z = 0)
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 0);
        scene.add(flowerGroup);

        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 6), new THREE.MeshStandardMaterial({color: 0x4CAF50}));
        stem.position.y = 3;
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 6;
        flowerGroup.add(flowerHead);

        const center = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({color: 0xFF9800}));
        flowerHead.add(center);

        const petals = [];
        const petalGeo = new THREE.ConeGeometry(1, 4, 16);
        petalGeo.translate(0, 2, 0); // Pivot at bottom
        const petalMat = new THREE.MeshStandardMaterial({color: 0xE91E63});
        for(let i=0; i<8; i++) {
            const p = new THREE.Mesh(petalGeo, petalMat);
            p.rotation.z = Math.PI / 2; // Lay flat
            p.rotation.y = (i / 8) * Math.PI * 2;
            p.userData.baseRotY = p.rotation.y;
            flowerHead.add(p);
            petals.push(p);
        }

        // Flower Pollen/Sparkles
        const pollenCount = 100;
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(pollenCount * 3);
        for(let i=0; i<pollenCount; i++) { pollenPos[i*3+1] = -100; } // Hide initially
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
        const pollenMat = new THREE.PointsMaterial({ color: 0xFFEB3B, size: 0.5, transparent: true, opacity: 0.8 });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        let pIdx = 0;

        // --- 4. The Grass Field (Z = -10 to 10) ---
        const numGrass = 10000;
        const grassGeo = new THREE.PlaneGeometry(0.2, 2.5);
        grassGeo.translate(0, 1.25, 0);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x8BC34A, side: THREE.DoubleSide });
        const grassInstanced = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        
        const dummy = new THREE.Object3D();
        const grassPositions = [];
        for(let i=0; i<numGrass; i++) {
            const gx = (Math.random() - 0.5) * 40;
            const gz = (Math.random() - 0.5) * 20; // -10 to 10
            grassPositions.push({x: gx, z: gz, originalY: Math.random() * Math.PI});
            dummy.position.set(gx, 0, gz);
            dummy.rotation.y = grassPositions[i].originalY;
            dummy.updateMatrix();
            grassInstanced.setMatrixAt(i, dummy.matrix);
            grassInstanced.setColorAt(i, new THREE.Color().setHSL(0.25 + Math.random()*0.05, 0.8, 0.4));
        }
        scene.add(grassInstanced);

        // --- 5. The Player Silhouette Plane (Z = -5) ---
        // Right between the background/clouds and the flower/foreground grass
        const silhouetteTex = new THREE.CanvasTexture(canvasElement);
        silhouetteTex.minFilter = THREE.LinearFilter;
        // The camera view is 640x480 (aspect 1.33). 
        // We make the plane proportionally wide. 24 width x 18 height.
        const silhouetteGeo = new THREE.PlaneGeometry(24, 18);
        const silhouetteMat = new THREE.MeshBasicMaterial({ 
            map: silhouetteTex, 
            transparent: true, 
            side: THREE.DoubleSide,
            depthWrite: false // Helps avoid clipping issues with particles
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        // Positioned so the bottom of the plane (y=9) is roughly at the floor (y=0)
        silhouetteMesh.position.set(0, 9, -5); 
        scene.add(silhouetteMesh);

        // --- 6. MediaPipe Integration ---
        function onResults(results) {
            if (!results.poseLandmarks || !results.segmentationMask) return;

            // 1. Draw perfectly masked silhouette
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // FLIP HORIZONTALLY to fix mirroring!
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);

            // Draw Mask
            canvasCtx.drawImage(results.segmentationMask, 0, 0, canvasElement.width, canvasElement.height);
            
            // Draw Video only where mask is
            canvasCtx.globalCompositeOperation = 'source-in';
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();

            silhouetteTex.needsUpdate = true;

            // 2. Extract Coordinates for Interaction (Flipped to match mirrored canvas)
            // MediaPipe: 15 is Left Wrist, 16 is Right Wrist.
            // Because we flipped the visual, we also flip the X math: (1 - x)
            const leftWrist = results.poseLandmarks[15];
            const rightWrist = results.poseLandmarks[16];
            const bodyCenter = results.poseLandmarks[0]; // Nose for center of mass reference

            // Map normalized coords (0 to 1) to 3D Space matching the Silhouette Plane bounds
            // Plane width is 24 (-12 to 12), Height is 18 (0 to 18)
            const mapX = (x) => ((1 - x) - 0.5) * 24; 
            const mapY = (y) => (1 - y) * 18;

            if(leftWrist.visibility > 0.5) handPositions.left.set(mapX(leftWrist.x), mapY(leftWrist.y), -5);
            else handPositions.left.y = -100;

            if(rightWrist.visibility > 0.5) handPositions.right.set(mapX(rightWrist.x), mapY(rightWrist.y), -5);
            else handPositions.right.y = -100;

            if(bodyCenter.visibility > 0.5) handPositions.center.set(mapX(bodyCenter.x), 0, -5);
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: true,
            smoothSegmentation: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                if (isRunning) await pose.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        // --- 7. Start Logic ---
        // We wait for Pose to initialize to avoid freezing
        pose.initialize().then(() => {
            const statusTxt = document.getElementById('status-text');
            const startBtn = document.getElementById('start-btn');
            statusTxt.innerText = "Models Ready!";
            startBtn.style.display = "block";

            startBtn.addEventListener('click', () => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
                
                // Request Fullscreen
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                }
                
                isRunning = true;
                cameraFeed.start();
            });
        });

        // Keyboard Fullscreen Toggle (Press F)
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        });

        // --- 8. Animation & Game Loop ---
        const clock = new THREE.Clock();

        function checkInteractions() {
            // Helper to check if either hand is near a target
            const isNear = (targetPos, threshold) => {
                return (handPositions.left.distanceTo(targetPos) < threshold || 
                        handPositions.right.distanceTo(targetPos) < threshold);
            };

            // Sun Interaction -> Rainbow
            isSunny = isNear(sun.position, 6);
            rainbowMat.opacity = THREE.MathUtils.lerp(rainbowMat.opacity, isSunny ? 0.8 : 0, 0.05);
            sunAura.scale.setScalar(isSunny ? 1.2 + Math.sin(Date.now()*0.005)*0.2 : 1.0);

            // Cloud Interaction -> Rain
            isRaining = isNear(cloudGroup.position, 6);
            rainMat.opacity = THREE.MathUtils.lerp(rainMat.opacity, isRaining ? 0.6 : 0, 0.1);
            if(isRaining) cloudGroup.position.y = 16 + Math.sin(Date.now()*0.01)*0.2; // Jiggle cloud

            // Flower Interaction -> Bloom
            // Flower head is at Y=6, Z=0. Hands are at Z=-5. We mostly check X and Y distance.
            const flowerTarget = new THREE.Vector3(flowerGroup.position.x, 6, -5); // Project to hand depth
            const touchingFlower = isNear(flowerTarget, 5);
            
            flowerBloom = THREE.MathUtils.lerp(flowerBloom, touchingFlower ? 1 : 0, 0.1);

            // Animate Petals blooming open
            petals.forEach(p => {
                p.rotation.x = THREE.MathUtils.lerp(0.2, 1.8, flowerBloom); // 0.2 = closed, 1.8 = wide open
            });
            flowerHead.rotation.y += 0.01 + (flowerBloom * 0.04); // Spin faster when blooming

            // Sparkles when blooming
            if (touchingFlower && Math.random() > 0.5) {
                pollenPos[pIdx*3] = flowerGroup.position.x + (Math.random()-0.5)*2;
                pollenPos[pIdx*3+1] = 6;
                pollenPos[pIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*2;
                pIdx = (pIdx + 1) % pollenCount;
            }
        }

        function updateParticles() {
            // Rain fall
            const rPos = rainGeo.attributes.position.array;
            for(let i=0; i<rainCount; i++) {
                if (isRaining || rPos[i*3+1] > -5) {
                    rPos[i*3+1] -= 0.3; // Fall down
                    if(rPos[i*3+1] < 0) {
                        rPos[i*3+1] = 16; // Reset to cloud height
                        rPos[i*3] = -12 + (Math.random() - 0.5) * 6;
                    }
                }
            }
            rainGeo.attributes.position.needsUpdate = true;

            // Pollen float up
            const pPos = pollenGeo.attributes.position.array;
            for(let i=0; i<pollenCount; i++) {
                if(pPos[i*3+1] > -50) {
                    pPos[i*3+1] += 0.05; // Float up
                    pPos[i*3] += Math.sin(Date.now()*0.002 + i) * 0.02; // Drift X
                    if(pPos[i*3+1] > 20) pPos[i*3+1] = -100; // Hide
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;
        }

        function animateGrass(time) {
            // Simple grass wind and body push
            for(let i=0; i<numGrass; i++) {
                const gx = grassPositions[i].x;
                const gz = grassPositions[i].z;
                
                // Wind wave
                let wind = Math.sin(time * 2 + gx * 0.5 + gz * 0.5) * 0.15;

                // Body push (Kids moving through)
                // If hand or body X is near grass X
                const distToBody = Math.abs(gx - handPositions.center.x);
                if (distToBody < 3) {
                    wind += (gx > handPositions.center.x ? 0.5 : -0.5) * (3 - distToBody);
                }

                dummy.position.set(gx, 0, gz);
                dummy.rotation.y = grassPositions[i].originalY;
                dummy.rotation.z = wind; // Bend
                dummy.updateMatrix();
                grassInstanced.setMatrixAt(i, dummy.matrix);
            }
            grassInstanced.instanceMatrix.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (isRunning) {
                checkInteractions();
                updateParticles();
                animateGrass(time);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
