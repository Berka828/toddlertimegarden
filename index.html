```html

</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>Initializing Tracking Sensors...</div>
        <div style="font-size: 1.2rem; margin-top: 10px;">Please allow camera access.</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="admin-panel">
            <button id="fullscreen-btn">Toggle Fullscreen (F)</button>
        </div>
    </div>

    <!-- Hidden Video/Canvas for MediaPipe Processing -->
    <video id="input_video" class="hidden" autoplay playsinline></video>
    <canvas id="cutout_canvas" class="hidden"></canvas>

    <script type="module">
        import * as THREE from 'three';

        const brandColors = [0xFFC107, 0xFF5722, 0xE91E63, 0x4CAF50, 0x2196F3];

        // --- 1. THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 10, 45); 
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // --- 2. SCENE OBJECTS ---
        
        // --- Sky Group ---
        const skyGroup = new THREE.Group();
        skyGroup.position.set(0, 22, -20);
        scene.add(skyGroup);

        // Sun (Animated)
        const sunGroup = new THREE.Group();
        sunGroup.position.set(-25, 5, 0);
        skyGroup.add(sunGroup);

        const sunGeo = new THREE.CircleGeometry(6, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFEB3B, side: THREE.DoubleSide });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sunGroup.add(sun);
        
        // Sun Rays
        const rayGeo = new THREE.PlaneGeometry(1, 4);
        const rayMat = new THREE.MeshBasicMaterial({ color: 0xFFC107, side: THREE.DoubleSide });
        for(let i=0; i<8; i++) {
            const ray = new THREE.Mesh(rayGeo, rayMat);
            ray.position.y = 8;
            const pivot = new THREE.Group();
            pivot.rotation.z = (i/8) * Math.PI * 2;
            pivot.add(ray);
            sunGroup.add(pivot);
        }
        let sunInteraction = 0;

        // Cloud (Animated)
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(20, 5, 0);
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
        const puff1 = new THREE.Mesh(new THREE.SphereGeometry(4), cloudMat);
        const puff2 = new THREE.Mesh(new THREE.SphereGeometry(3), cloudMat); puff2.position.set(4, -1, 0);
        const puff3 = new THREE.Mesh(new THREE.SphereGeometry(3), cloudMat); puff3.position.set(-4, -1, 0);
        cloudGroup.add(puff1, puff2, puff3);
        skyGroup.add(cloudGroup);

        // Rain
        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 300;
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = (Math.random()-0.5)*12;
            rainPos[i*3+1] = -Math.random()*25;
            rainPos[i*3+2] = (Math.random()-0.5)*4;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0x42A5F5, size: 0.6, transparent: true, opacity: 0 });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        cloudGroup.add(rainSystem);
        let isRaining = false;
        let rainIntensity = 0;

        // Rainbow (Triggered by Hands Up)
        const rainbowGeo = new THREE.TorusGeometry(30, 3, 16, 100, Math.PI);
        const rainbowMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0, 
            map: createRainbowTexture(), side: THREE.DoubleSide 
        });
        const rainbow = new THREE.Mesh(rainbowGeo, rainbowMat);
        rainbow.position.set(0, -5, -15);
        skyGroup.add(rainbow);

        function createRainbowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 1;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0,0,256,0);
            grad.addColorStop(0, "red"); grad.addColorStop(0.2, "orange"); grad.addColorStop(0.4, "yellow");
            grad.addColorStop(0.6, "green"); grad.addColorStop(0.8, "blue"); grad.addColorStop(1, "violet");
            ctx.fillStyle = grad; ctx.fillRect(0,0,256,1);
            return new THREE.CanvasTexture(canvas);
        }
        let showRainbow = false;

        // Sonic Rings System
        const rings = [];
        const ringGeo = new THREE.TorusGeometry(1, 0.4, 16, 64);
        function spawnSonicRing() {
            const mat = new THREE.MeshBasicMaterial({ 
                color: brandColors[Math.floor(Math.random() * brandColors.length)], 
                transparent: true, opacity: 1, blending: THREE.AdditiveBlending 
            });
            const ring = new THREE.Mesh(ringGeo, mat);
            ring.position.set(0, 15, -10);
            scene.add(ring);
            rings.push({ mesh: ring, scale: 1, opacity: 1 });
        }

        // --- Grass System ---
        const mapSize = 256;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const numGrass = 40000; // Thicker grass
        const grassGeo = new THREE.PlaneGeometry(0.2, 4.0, 1, 4);
        grassGeo.translate(0, 2.0, 0);

        const grassMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.8 });
        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `
                uniform float time; uniform sampler2D windMap; varying vec2 vMyUv;
            ` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(`#include <begin_vertex>`, `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 40.0) / 80.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5) * 0.15;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 3.5 * position.y;
                    transformed.z -= windForce * 3.5 * position.y;
                }
            `);
            shader.fragmentShader = `varying vec2 vMyUv;` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(`#include <color_fragment>`, `
                #include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.15, 0.02);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
            `);
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 80, -2, (Math.random() - 0.5) * 30 - 5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.05, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- Player Silhouette ---
        const cutoutCanvas = document.getElementById('cutout_canvas');
        const cutoutCtx = cutoutCanvas.getContext('2d');
        const cutoutTex = new THREE.CanvasTexture(cutoutCanvas);
        cutoutTex.colorSpace = THREE.SRGBColorSpace;

        const silhouetteGeo = new THREE.PlaneGeometry(80, 60); 
        const silhouetteMat = new THREE.MeshBasicMaterial({
            map: cutoutTex, transparent: true, side: THREE.DoubleSide, depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -10); // Mixed inside the grass
        scene.add(silhouetteMesh);


        // --- Visual Tracking Indicators ---
        const trackerGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const trackerMat = new THREE.MeshBasicMaterial({ color: 0x00FF00, transparent: true, opacity: 0.8 });

        const leftHandTracker = new THREE.Mesh(trackerGeo, trackerMat);
        const rightHandTracker = new THREE.Mesh(trackerGeo, trackerMat);
        scene.add(leftHandTracker, rightHandTracker);

        // --- Grounded Flower ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, -6, 0); // Planted firmly near the ground
        flowerGroup.scale.setScalar(0.7); // Better proportions
        scene.add(flowerGroup);

        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 14, 16).translate(0, 7, 0), new THREE.MeshStandardMaterial({ color: 0x4CAF50 }));
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 14;
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0); petalShape.bezierCurveTo(3, 3, 3.5, 8, 0, 10); petalShape.bezierCurveTo(-3.5, 8, -3, 3, 0, 0);
        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });

        const petals = [];
        for (let i = 0; i < 12; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / 12) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.5; // Starts closed
            flowerHead.add(petal); petals.push(petal);
        }
        const center = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 16).scale(1, 0.4, 1), new THREE.MeshStandardMaterial({ color: 0xFFC107 }));
        flowerHead.add(center);

        let flowerInteraction = 0;

        // Pollen System
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(200 * 3);
        const pollenVel = [];
        for(let i=0; i<200; i++) { pollenPos[i*3+1] = -100; pollenVel.push(new THREE.Vector3()); }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
        const pollenMat = new THREE.PointsMaterial({ color: 0xFFD700, size: 2.5, transparent: true, blending: THREE.AdditiveBlending });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        let pIdx = 0;

        // --- 3. MEDIAPIPE AI TRACKING LOGIC ---
        const videoElement = document.getElementById('input_video');
        let aiInitialized = false;
        let handsUpTimer = 0;

        // 2D distance helper to ignore messy Z-depth issues when touching UI elements
        function dist2D(v1, v2) { return Math.hypot(v1.x - v2.x, v1.y - v2.y); }

        function getThreeCoords(landmark, zDepth) {
            const x = (1 - landmark.x - 0.5) * 80;
            const y = -(landmark.y - 0.5) * 60 + 15;
            return new THREE.Vector3(x, y, zDepth);
        }

        function onPoseResults(results) {
            if (!aiInitialized) {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
                aiInitialized = true;
            }

            if (results.segmentationMask && cutoutCanvas.width === 0) {
                cutoutCanvas.width = videoElement.videoWidth;
                cutoutCanvas.height = videoElement.videoHeight;
            }
            if (results.segmentationMask) {
                cutoutCtx.save();
                cutoutCtx.clearRect(0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.translate(cutoutCanvas.width, 0);
                cutoutCtx.scale(-1, 1);
                cutoutCtx.drawImage(results.segmentationMask, 0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.globalCompositeOperation = 'source-in';
                cutoutCtx.drawImage(results.image, 0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.restore();
                cutoutTex.needsUpdate = true;
            }

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;

                const w1 = getThreeCoords(lm[15], -10); 
                const w2 = getThreeCoords(lm[16], -10);
                const f1 = getThreeCoords(lm[27], -10);
                const f2 = getThreeCoords(lm[28], -10);

                leftHandTracker.position.copy(w1);
                rightHandTracker.position.copy(w2);

                // Grass Wind (Both feet and hands interact with grass now)
                [w1, w2, f1, f2].forEach(pt => {
                    const tx = ((pt.x + 40) / 80) * mapSize;
                    // Approximate depth on the ground plane based on screen Y
                    const mappedZ = (pt.y / 30) * 15; 
                    const ty = ((mappedZ + 15) / 30) * mapSize;
                    
                    windCtx.beginPath();
                    const g = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 15);
                    g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(255,255,255,0)');
                    windCtx.fillStyle = g;
                    windCtx.arc(tx, ty, 15, 0, Math.PI*2); windCtx.fill();
                });

                // Hands Up Gesture (Wrists higher than Shoulders - smaller Y is higher)
                if (lm[15].y < lm[11].y && lm[16].y < lm[12].y) {
                    handsUpTimer++;
                    if (handsUpTimer > 15) { // Held for ~0.5s
                        showRainbow = true;
                        spawnSonicRing();
                        handsUpTimer = 0; // reset
                    }
                } else {
                    handsUpTimer = 0;
                }

                // Interaction 2D checks
                const cloudPos = new THREE.Vector3(20, 27, 0);
                if (dist2D(w1, cloudPos) < 15 || dist2D(w2, cloudPos) < 15) isRaining = true;

                const sunPos = new THREE.Vector3(-25, 27, 0);
                if (dist2D(w1, sunPos) < 15 || dist2D(w2, sunPos) < 15) {
                    sunInteraction = 1;
                } else {
                    sunInteraction = Math.max(0, sunInteraction - 0.05);
                }

                // Flower Center mapped to 2D Screen Space roughly (X=0, Y=4 due to height)
                const flowerPos = new THREE.Vector3(0, 4, 0);
                if (dist2D(w1, flowerPos) < 15 || dist2D(w2, flowerPos) < 15 || dist2D(f1, flowerPos) < 15) {
                    flowerInteraction += 0.1;
                } else {
                    flowerInteraction -= 0.05;
                }
                flowerInteraction = THREE.MathUtils.clamp(flowerInteraction, 0, 1);
            }
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 1, smoothLandmarks: true,
            enableSegmentation: true, smoothSegmentation: true,
            minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        pose.onResults(onPoseResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();


        // --- 4. RENDER ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            windCtx.fillStyle = 'rgba(0,0,0,0.1)';
            windCtx.fillRect(0,0,mapSize,mapSize);
            windTex.needsUpdate = true;
            grassParams.time.value += 0.016;

            // Sun Animation (Rotates and Pulses)
            sunGroup.rotation.z -= 0.005;
            sunGroup.scale.setScalar(1 + Math.sin(time*5) * 0.15 * sunInteraction);
            sun.material.color.setHex(sunInteraction > 0.5 ? 0xFF9800 : 0xFFEB3B);

            // Cloud Animation (Hovering)
            cloudGroup.position.y = 5 + Math.sin(time * 2) * 1.5;

            // Rain Animation
            if(isRaining) {
                rainIntensity = Math.min(1, rainIntensity + 0.05);
                rainMat.opacity = rainIntensity;
                const pos = rainGeo.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    pos[i*3+1] -= 0.8; 
                    if(pos[i*3+1] < -20) { pos[i*3+1] = 5; pos[i*3] = (Math.random()-0.5)*15; }
                }
                rainGeo.attributes.position.needsUpdate = true;
                if(Math.random() < 0.01) isRaining = false;
            } else {
                rainIntensity = Math.max(0, rainIntensity - 0.02);
                rainMat.opacity = rainIntensity;
            }

            // Rainbow Animation
            if (showRainbow) {
                rainbowMat.opacity = Math.min(0.9, rainbowMat.opacity + 0.01);
                rainbow.scale.setScalar(1 + Math.sin(time) * 0.05); // Majestic pulsing
                if (Math.random() < 0.002) showRainbow = false; // Turn off eventually
            } else {
                rainbowMat.opacity = Math.max(0, rainbowMat.opacity - 0.01);
            }

            // Sonic Rings Expansion
            for (let i = rings.length - 1; i >= 0; i--) {
                const r = rings[i];
                r.scale += 0.5;
                r.opacity -= 0.02;
                r.mesh.scale.setScalar(r.scale);
                r.mesh.material.opacity = r.opacity;
                if (r.opacity <= 0) {
                    scene.remove(r.mesh);
                    rings.splice(i, 1);
                }
            }

            // Flower Bloom Animation
            flowerGroup.rotation.z = Math.sin(time) * 0.05;
            flowerGroup.scale.setScalar(0.7 + flowerInteraction * 0.2); // Swells up correctly now
            
            // Bend stem slightly towards hands if interacting
            stem.rotation.z = THREE.MathUtils.lerp(0, Math.sin(time*2)*0.1, flowerInteraction);

            petals.forEach((petal, i) => {
                petal.rotation.x = THREE.MathUtils.lerp(0.5, 2.0, flowerInteraction); // Dramatically opens
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });

            if (flowerInteraction > 0.6) {
                for(let k=0; k<3; k++) {
                    pollenPos[pIdx*3] = flowerHead.position.x + (Math.random()-0.5)*4;
                    pollenPos[pIdx*3+1] = flowerHead.position.y + flowerGroup.position.y;
                    pollenPos[pIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*4;
                    pollenVel[pIdx].set((Math.random()-0.5)*0.3, Math.random()*0.4 + 0.1, (Math.random()-0.5)*0.3);
                    pIdx = (pIdx + 1) % 200;
                }
            }
            const pArr = pollenGeo.attributes.position.array;
            for(let i=0; i<200; i++) {
                if(pArr[i*3+1] > -50) {
                    pArr[i*3] += pollenVel[i].x; pArr[i*3+1] += pollenVel[i].y; pArr[i*3+2] += pollenVel[i].z;
                    pArr[i*3] += Math.sin(time*3+i)*0.03;
                    if(pArr[i*3+1] > 40) pArr[i*3+1] = -100;
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            const pulse = 0.8 + Math.sin(time*10)*0.2;
            leftHandTracker.scale.setScalar(pulse); rightHandTracker.scale.setScalar(pulse);

            renderer.render(scene, camera);
        }
        animate();

        // --- 5. UTILS ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'f') document.getElementById('fullscreen-btn').click(); });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
