```html
<!DOCTYPE html>
<html lang="en">

    <title>BxCM Polished Interactive Meadow</title>
    <style>

        }

        .hidden { display: none !important; }
    </style>

    <!-- MediaPipe AI Libraries -->

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <!-- Three.js Import Map -->

        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>Initializing Vision Sensors...</div>
        <div style="font-size: 1.2rem; margin-top: 10px;">Please step back and allow camera access.</div>
    </div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="admin-panel">
            <button id="fullscreen-btn">Toggle Fullscreen (F)</button>
        </div>
    </div>

    <video id="input_video" class="hidden" autoplay playsinline></video>
    <canvas id="cutout_canvas" class="hidden"></canvas>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7EC8E3); // Soft sky blue
        scene.fog = new THREE.FogExp2(0x7EC8E3, 0.012);

        // Adjusted camera to see floor clearly
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 250);
        camera.position.set(0, 15, 60); 
        camera.lookAt(0, 10, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x666666, 0.9);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.0);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // --- 2. LAYERS & OBJECTS ---
        
        // [LAYER 1]: Player Silhouette (Z = -45)
        const cutoutCanvas = document.getElementById('cutout_canvas');
        const cutoutCtx = cutoutCanvas.getContext('2d');
        const cutoutTex = new THREE.CanvasTexture(cutoutCanvas);
        cutoutTex.colorSpace = THREE.SRGBColorSpace;

        const silhouetteGeo = new THREE.PlaneGeometry(120, 90); 
        const silhouetteMat = new THREE.MeshBasicMaterial({
            map: cutoutTex, transparent: true, side: THREE.DoubleSide, depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -45); 
        scene.add(silhouetteMesh);


        // [LAYER 2]: Sky Elements (Z = -30)
        const skyGroup = new THREE.Group();
        skyGroup.position.set(0, 30, -30);
        scene.add(skyGroup);

        // -- The Sun --
        const sunGroup = new THREE.Group();
        sunGroup.position.set(-30, 5, 0);
        skyGroup.add(sunGroup);

        const sunGeo = new THREE.CircleGeometry(6, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFD54F, side: THREE.DoubleSide });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sunGroup.add(sun);
        
        // Sunbeams (Particles)
        const beamGeo = new THREE.BufferGeometry();
        const beamCount = 100;
        const beamPos = new Float32Array(beamCount * 3);
        const beamVel = [];
        for(let i=0; i<beamCount; i++) { 
            beamPos[i*3] = 0; beamPos[i*3+1] = -100; beamPos[i*3+2] = 0; 
            beamVel.push(new THREE.Vector3()); 
        }
        beamGeo.setAttribute('position', new THREE.BufferAttribute(beamPos, 3));
        const beamMat = new THREE.PointsMaterial({ color: 0xFFE082, size: 1.5, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const beamSys = new THREE.Points(beamGeo, beamMat);
        sunGroup.add(beamSys);
        
        let targetSunScale = 1;
        let currentSunScale = 1;
        let bIdx = 0;

        // -- The Cloud & Rain --
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(30, 5, 0);
        skyGroup.add(cloudGroup);
        
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
        const puff1 = new THREE.Mesh(new THREE.SphereGeometry(4.5), cloudMat);
        const puff2 = new THREE.Mesh(new THREE.SphereGeometry(3.5), cloudMat); puff2.position.set(4, -1, 0);
        const puff3 = new THREE.Mesh(new THREE.SphereGeometry(3.5), cloudMat); puff3.position.set(-4, -1, 0);
        cloudGroup.add(puff1, puff2, puff3);

        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 300;
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = (Math.random()-0.5)*12;
            rainPos[i*3+1] = -Math.random()*25;
            rainPos[i*3+2] = (Math.random()-0.5)*4;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0x42A5F5, size: 0.6, transparent: true, opacity: 0 });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        cloudGroup.add(rainSystem);
        
        let rainTimer = 0;
        let cloudSpread = 0;

        // -- Rainbow --
        const rainbowGeo = new THREE.TorusGeometry(25, 2, 16, 100, Math.PI);
        const rainbowMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0, 
            map: createRainbowTexture(), side: THREE.DoubleSide 
        });
        const rainbow = new THREE.Mesh(rainbowGeo, rainbowMat);
        rainbow.position.set(0, -10, -5);
        skyGroup.add(rainbow);

        function createRainbowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 1;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0,0,256,0);
            grad.addColorStop(0, "red"); grad.addColorStop(0.2, "orange"); grad.addColorStop(0.4, "yellow");
            grad.addColorStop(0.6, "green"); grad.addColorStop(0.8, "blue"); grad.addColorStop(1, "violet");
            ctx.fillStyle = grad; ctx.fillRect(0,0,256,1);
            return new THREE.CanvasTexture(canvas);
        }
        let rainbowTargetOpacity = 0;

        // [LAYER 3]: The Grass (Z = -15 to +15)
        const mapSize = 256;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const numGrass = 40000;
        const grassGeo = new THREE.PlaneGeometry(0.2, 4.0, 1, 4);
        grassGeo.translate(0, 2.0, 0);

        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0x4CAF50, // Base green
            side: THREE.DoubleSide, roughness: 0.9 
        });
        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `
                uniform float time; uniform sampler2D windMap; varying vec2 vMyUv;
            ` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(`#include <begin_vertex>`, `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 50.0) / 100.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 1.5 + instPos.x * 0.3) * 0.2;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 3.0 * position.y;
                    transformed.z -= windForce * 3.0 * position.y;
                }
            `);
            shader.fragmentShader = `varying vec2 vMyUv;` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(`#include <color_fragment>`, `
                #include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.20, 0.02);
                vec3 tipColor = vec3(0.3, 0.8, 0.2);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb * tipColor, vMyUv.y);
            `);
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 100, 0, (Math.random() - 0.5) * 30);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.5 + Math.random() * 0.7);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(grassMesh);

        // [LAYER 4]: Giant Interactive Flower (Z = 15)
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 15); 
        scene.add(flowerGroup);

        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 15, 16).translate(0, 7.5, 0), new THREE.MeshStandardMaterial({ color: 0x2E7D32 }));
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 15;
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0); petalShape.bezierCurveTo(4, 4, 4.5, 10, 0, 12); petalShape.bezierCurveTo(-4.5, 10, -4, 4, 0, 0);
        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });

        const petals = [];
        for (let i = 0; i < 10; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / 10) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.3; // Very closed initially
            flowerHead.add(petal); petals.push(petal);
        }
        const center = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 16).scale(1, 0.4, 1), new THREE.MeshStandardMaterial({ color: 0xFFC107 }));
        flowerHead.add(center);

        let targetFlowerBloom = 0;
        let currentFlowerBloom = 0;

        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(200 * 3);
        const pollenVel = [];
        for(let i=0; i<200; i++) { pollenPos[i*3+1] = -100; pollenVel.push(new THREE.Vector3()); }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
        const pollenMat = new THREE.PointsMaterial({ color: 0xFFD700, size: 2.5, transparent: true, blending: THREE.AdditiveBlending });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        let pIdx = 0;

        // [LAYER 5]: Sonic Rings
        const ringGeo = new THREE.RingGeometry(1, 1.5, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, side: THREE.DoubleSide });
        const rings = [];
        for(let i=0; i<4; i++) {
            let r = new THREE.Mesh(ringGeo, ringMat.clone());
            r.position.y = -100;
            scene.add(r);
            rings.push({ mesh: r, active: false, scale: 1 });
        }
        let ringTimer = 0;

        // --- 3. MEDIAPIPE TRACKING ---
        const videoElement = document.getElementById('input_video');
        let aiInitialized = false;

        function getThreeCoords(landmark, zDepth) {
            // Mapping viewport to 3D. Mirror X.
            const x = (0.5 - landmark.x) * 110; 
            const y = (1 - landmark.y) * 75 - 10; 
            return new THREE.Vector3(x, y, zDepth);
        }

        function spawnRing(pos) {
            let ring = rings.find(r => !r.active);
            if(ring) {
                ring.active = true; ring.mesh.position.copy(pos); ring.scale = 1; ring.mesh.material.opacity = 0.8;
            }
        }

        function onPoseResults(results) {
            if (!aiInitialized) {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
                aiInitialized = true;
            }

            if (results.segmentationMask && cutoutCanvas.width === 0) {
                cutoutCanvas.width = videoElement.videoWidth; cutoutCanvas.height = videoElement.videoHeight;
            }
            if (results.segmentationMask) {
                cutoutCtx.save();
                cutoutCtx.clearRect(0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.translate(cutoutCanvas.width, 0); cutoutCtx.scale(-1, 1);
                cutoutCtx.drawImage(results.segmentationMask, 0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.globalCompositeOperation = 'source-in';
                cutoutCtx.drawImage(results.image, 0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.restore();
                cutoutTex.needsUpdate = true;
            }

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;

                // Hands and Feet mapped to corresponding depths
                const w1_sky = getThreeCoords(lm[15], -30); 
                const w2_sky = getThreeCoords(lm[16], -30);
                const w1_flower = getThreeCoords(lm[15], 15);
                const w2_flower = getThreeCoords(lm[16], 15);
                const f1 = getThreeCoords(lm[27], 0); 
                const f2 = getThreeCoords(lm[28], 0);

                // Grass Wind (Feet)
                [f1, f2].forEach(foot => {
                    const tx = ((foot.x + 50) / 100) * mapSize;
                    const ty = ((foot.z + 15) / 30) * mapSize;
                    windCtx.beginPath();
                    const g = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 25);
                    g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(255,255,255,0)');
                    windCtx.fillStyle = g;
                    windCtx.arc(tx, ty, 25, 0, Math.PI*2); windCtx.fill();
                });

                // Sun Interaction
                const sunWorld = new THREE.Vector3(-30, 35, -30);
                if (w1_sky.distanceTo(sunWorld) < 18 || w2_sky.distanceTo(sunWorld) < 18) {
                    targetSunScale = 1.3;
                    // Spawn Sunbeams
                    if(Math.random() > 0.5) {
                        beamPos[bIdx*3] = sunWorld.x + (Math.random()-0.5)*10;
                        beamPos[bIdx*3+1] = sunWorld.y;
                        beamPos[bIdx*3+2] = sunWorld.z + 2;
                        beamVel[bIdx].set((Math.random()-0.5)*0.2, -Math.random()*0.4 - 0.2, (Math.random()-0.5)*0.2);
                        bIdx = (bIdx + 1) % beamCount;
                    }
                } else {
                    targetSunScale = 1.0;
                }

                // Cloud Interaction
                const cloudWorld = new THREE.Vector3(30, 35, -30);
                if (w1_sky.distanceTo(cloudWorld) < 18 || w2_sky.distanceTo(cloudWorld) < 18) {
                    rainTimer = 300; // ~5 seconds of rain
                }

                // Two-Handed Flower Bloom
                const flowerPos = new THREE.Vector3(0, 15, 15);
                if (w1_flower.distanceTo(flowerPos) < 20 && w2_flower.distanceTo(flowerPos) < 20) {
                    targetFlowerBloom = 1;
                } else {
                    targetFlowerBloom = 0;
                }

                // Hands High for Rainbow & Sonic Rings
                if (lm[15].y < 0.2 && lm[16].y < 0.2) {
                    rainbowTargetOpacity = 0.9;
                    if(ringTimer <= 0) {
                        spawnRing(w1_sky); spawnRing(w2_sky);
                        ringTimer = 30; // Cooldown
                    }
                } else {
                    rainbowTargetOpacity = 0;
                }
                if(ringTimer > 0) ringTimer--;
            }
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({
            modelComplexity: 1, smoothLandmarks: true, enableSegmentation: true, 
            smoothSegmentation: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        pose.onResults(onPoseResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); }, width: 640, height: 480
        });
        cameraUtils.start();


        // --- 4. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Grass Wind Fade
            windCtx.fillStyle = 'rgba(0,0,0,0.08)';
            windCtx.fillRect(0,0,mapSize,mapSize);
            windTex.needsUpdate = true;
            grassParams.time.value += 0.016;

            // Smooth Sun Animation
            currentSunScale += (targetSunScale - currentSunScale) * 0.05;
            sunGroup.scale.setScalar(currentSunScale);
            
            const bArr = beamGeo.attributes.position.array;
            for(let i=0; i<beamCount; i++) {
                if(bArr[i*3+1] > -20) {
                    bArr[i*3] += beamVel[i].x; bArr[i*3+1] += beamVel[i].y; bArr[i*3+2] += beamVel[i].z;
                }
            }
            beamGeo.attributes.position.needsUpdate = true;

            // Smooth Cloud & Rain Animation
            if(rainTimer > 0) {
                rainTimer--; cloudSpread += (1.5 - cloudSpread) * 0.05;
                rainMat.opacity += (0.8 - rainMat.opacity) * 0.05;
                const pos = rainGeo.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    pos[i*3+1] -= 0.6; // Fall
                    if(pos[i*3+1] < -20) { pos[i*3+1] = 5; pos[i*3] = (Math.random()-0.5)*15; }
                }
                rainGeo.attributes.position.needsUpdate = true;
            } else {
                cloudSpread += (0 - cloudSpread) * 0.05;
                rainMat.opacity += (0 - rainMat.opacity) * 0.05;
            }
            puff2.position.x = 4 + cloudSpread; puff3.position.x = -4 - cloudSpread;

            // Smooth Rainbow
            rainbowMat.opacity += (rainbowTargetOpacity - rainbowMat.opacity) * 0.02;

            // Smooth Sonic Rings
            rings.forEach(r => {
                if(r.active) {
                    r.scale += 0.15; r.mesh.scale.setScalar(r.scale);
                    r.mesh.material.opacity -= 0.02;
                    if(r.mesh.material.opacity <= 0) { r.active = false; r.mesh.position.y = -100; }
                }
            });

            // Smooth Two-Hand Flower Bloom
            currentFlowerBloom += (targetFlowerBloom - currentFlowerBloom) * 0.04;
            flowerGroup.rotation.z = Math.sin(time * 0.5) * 0.03; // Gentle sway
            
            petals.forEach((petal) => {
                // Lerp between closed (0.3) and fully wide open (2.0)
                petal.rotation.x = THREE.MathUtils.lerp(0.3, 2.0, currentFlowerBloom);
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });

            // Burst pollen if open
            if (currentFlowerBloom > 0.8) {
                for(let k=0; k<2; k++) {
                    pollenPos[pIdx*3] = flowerHead.position.x + (Math.random()-0.5)*5;
                    pollenPos[pIdx*3+1] = flowerHead.position.y + flowerGroup.position.y;
                    pollenPos[pIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*5;
                    pollenVel[pIdx].set((Math.random()-0.5)*0.15, Math.random()*0.2 + 0.1, (Math.random()-0.5)*0.15);
                    pIdx = (pIdx + 1) % 200;
                }
            }
            const pArr = pollenGeo.attributes.position.array;
            for(let i=0; i<200; i++) {
                if(pArr[i*3+1] > -50) {
                    pArr[i*3] += pollenVel[i].x; pArr[i*3+1] += pollenVel[i].y; pArr[i*3+2] += pollenVel[i].z;
                    pArr[i*3] += Math.sin(time*2+i)*0.02;
                    if(pArr[i*3+1] > 40) pArr[i*3+1] = -100;
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }
        animate();

        // --- 5. UTILS ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'f') document.getElementById('fullscreen-btn').click(); });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
