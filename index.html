<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BxCM Giant Interactive Flower</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #0f0518; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Overlays */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        .bxcm-logo {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;

        #camera-settings {
            background: rgba(0,0,0,0.8);
            padding: 15px;

            pointer-events: auto;
            max-width: 320px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        select, button {
            padding: 10px;
            font-size: 1rem;
            border-radius: 4px;
            margin-top: 10px;

            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
        }
        
        button { background: #E91E63; }
        button:hover { background: #FF5722; }

        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);

        #center-message {

        }
    </style>
</head>
<body>

    <div id="center-message" class="pulse">Step away from the wall to calibrate...<br>Then reach out to touch the Giant Flower!</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <label for="camera-select">🎥 Select Sensor/Camera:</label>
            <select id="camera-select">
                <option value="">Loading cameras...</option>
            </select>
            <button id="calibrate-btn">📸 Calibrate Background</button>
            <div style="font-size: 0.8rem; margin-top: 5px; color: #aaa;">
                *Click when no one is standing in front of the camera to perfectly cut out the kids' silhouettes!
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <!-- Hidden Canvases for Motion Physics & Background Subtraction -->
    <canvas id="motion-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Configuration & State ---
        const config = {
            motionSensitivity: 25,
            bgThreshold: 0.18, // Sensitivity for silhouette cutout
            showWebcam: false,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        const brandColors = [0xFFC107, 0xFF5722, 0xE91E63, 0x4CAF50, 0x2196F3]; 
        let hasStarted = false;

        // --- Setup Admin GUI ---
        const gui = new GUI({ title: '🌸 Interaction Admin Panel' });
        gui.add(config, 'motionSensitivity', 10, 100, 1).name('Motion Tracking Sens.');
        gui.add(config, 'bgThreshold', 0.05, 0.5, 0.01).name('Silhouette Cutout Sens.');
        gui.add(config, 'showWebcam').name('Show Webcam Feed').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Setup Three.js Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0f0518, 0.02);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 10, 28); 
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0f0518, 1); 
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x222222, 0.4);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 30, 20);
        scene.add(dirLight);
        
        // Magical spotlight on the flower
        const spotLight = new THREE.SpotLight(0xE91E63, 500);
        spotLight.position.set(0, 25, 10);
        spotLight.angle = Math.PI / 6;
        spotLight.penumbra = 0.5;
        scene.add(spotLight);

        // --- Background Subtraction Silhouette ---
        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        videoTex.colorSpace = THREE.SRGBColorSpace;

        // Texture to hold the "empty room" background
        const bgCanvas = document.createElement('canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const bgTex = new THREE.CanvasTexture(bgCanvas);
        bgTex.colorSpace = THREE.SRGBColorSpace;

        const silhouetteGeo = new THREE.PlaneGeometry(60, 45); 
        const silhouetteMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTex },
                tBackground: { value: bgTex },
                brandColor: { value: new THREE.Color(0x2196F3) }, 
                threshold: { value: config.bgThreshold }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = vec2(1.0 - uv.x, uv.y); // Mirror image
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform sampler2D tBackground;
                uniform vec3 brandColor;
                uniform float threshold;
                varying vec2 vUv;
                
                void main() {
                    vec4 curr = texture2D(tDiffuse, vUv);
                    vec4 bg = texture2D(tBackground, vUv);

                    // Calculate color distance between live feed and empty background
                    float diff = distance(curr.rgb, bg.rgb);

                    // Create a sharp but smooth mask
                    float alpha = smoothstep(threshold * 0.8, threshold * 1.2, diff);

                    // Blend the actual kid's clothes/colors with the BxCM blue for a magical look
                    vec3 finalColor = mix(brandColor, curr.rgb, 0.7) * 1.2;

                    gl_FragColor = vec4(finalColor, alpha * 0.9);
                }
            `,
            transparent: true,
            blending: THREE.NormalBlending,
            depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -15);
        scene.add(silhouetteMesh);

        // Function to snap the background
        function captureBackground() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                bgCanvas.width = video.videoWidth;
                bgCanvas.height = video.videoHeight;
                bgCtx.drawImage(video, 0, 0);
                bgTex.needsUpdate = true;
                
                if(!hasStarted) {
                    hasStarted = true;
                    document.getElementById('center-message').innerHTML = "Reach out and touch the flower!";
                    setTimeout(() => {
                        document.getElementById('center-message').style.opacity = 0;
                    }, 3000);
                }
            }
        }
        document.getElementById('calibrate-btn').addEventListener('click', captureBackground);

        // --- The Giant Interactive Flower ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 5); // Bring it forward

        // 1. The Stem
        const stemGeo = new THREE.CylinderGeometry(0.3, 0.5, 12, 16);
        stemGeo.translate(0, 6, 0); // Pivot at the bottom
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.6 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        flowerGroup.add(stem);

        // 2. The Flower Head (attached to top of stem)
        const flowerHead = new THREE.Group();
        flowerHead.position.y = 12;
        flowerGroup.add(flowerHead);

        // Realistic Petal Shape
        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0);
        petalShape.bezierCurveTo(1.5, 1.5, 2.0, 5.0, 0, 6.5);
        petalShape.bezierCurveTo(-2.0, 5.0, -1.5, 1.5, 0, 0);
        
        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ 
            color: 0xE91E63, // BxCM Pink
            side: THREE.DoubleSide,
            roughness: 0.4,
            metalness: 0.1
        });

        const petals = [];
        const numPetals = 14;
        for (let i = 0; i < numPetals; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / numPetals) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.6; // Closed state
            flowerHead.add(petal);
            petals.push(petal);
        }

        // Inner Petals (Orange)
        const innerPetals = [];
        const innerPetalMat = new THREE.MeshStandardMaterial({ color: 0xFF5722, side: THREE.DoubleSide });
        for (let i = 0; i < 10; i++) {
            const petal = new THREE.Mesh(petalGeo, innerPetalMat);
            petal.scale.setScalar(0.6);
            petal.rotation.y = (i / 10) * Math.PI * 2 + 0.2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.4;
            flowerHead.add(petal);
            innerPetals.push(petal);
        }

        // 3. Flower Center
        const centerGeo = new THREE.SphereGeometry(1.8, 32, 16);
        centerGeo.scale(1, 0.4, 1);
        const centerMat = new THREE.MeshStandardMaterial({ color: 0xFFC107, roughness: 0.9 });
        const center = new THREE.Mesh(centerGeo, centerMat);
        center.position.y = 0.5;
        flowerHead.add(center);

        scene.add(flowerGroup);

        // --- Magic Pollen Particles ---
        const pollenCount = 300;
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(pollenCount * 3);
        const pollenVel = [];
        
        for(let i=0; i<pollenCount; i++) {
            pollenPos[i*3] = 0; 
            pollenPos[i*3+1] = -100; // Hidden initially
            pollenPos[i*3+2] = 0;
            pollenVel.push(new THREE.Vector3());
        }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
        
        // Texture for glowing pollen
        const pCanvas = document.createElement('canvas');
        pCanvas.width = 32; pCanvas.height = 32;
        const pCtx = pCanvas.getContext('2d');
        const pGrad = pCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
        pGrad.addColorStop(0, 'rgba(255, 193, 7, 1)');
        pGrad.addColorStop(1, 'rgba(255, 193, 7, 0)');
        pCtx.fillStyle = pGrad;
        pCtx.beginPath(); pCtx.arc(16, 16, 16, 0, Math.PI*2); pCtx.fill();
        const pollenTex = new THREE.CanvasTexture(pCanvas);

        const pollenMat = new THREE.PointsMaterial({ 
            size: 1.2, 
            map: pollenTex,
            transparent: true, 
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        
        let pollenIdx = 0;

        // --- Camera Setup ---
        const cameraSelect = document.getElementById('camera-select');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

        const GRID_W = 60, GRID_H = 40;
        motionCanvas.width = GRID_W; motionCanvas.height = GRID_H;

        let prevFrame = null;
        let currentStream = null;
        
        // Interaction State
        let interactionLevel = 0; // 0 to 1
        let interactionTarget = 0;
        let motionX = 0;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) {
                cameraSelect.innerHTML = '<option>Permission Denied/Error</option>';
            }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
                });
                video.srcObject = currentStream;
                
                // Auto-calibrate background shortly after load if they don't click the button
                setTimeout(() => {
                    if(!hasStarted) captureBackground();
                }, 4000);

            } catch (err) { console.error(err); }
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Motion Physics Analysis ---
        function checkMotion() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currentFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;
            let motionCount = 0; 
            let totalX = 0;

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y+=2) { 
                    for (let x = 0; x < GRID_W; x+=2) {
                        const i = (y * GRID_W + x) * 4;

                        const diff = Math.abs(currentFrame[i] - prevFrame[i]) + 
                                     Math.abs(currentFrame[i+1] - prevFrame[i+1]) + 
                                     Math.abs(currentFrame[i+2] - prevFrame[i+2]);

                        if (diff > config.motionSensitivity) {
                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const worldX = normX * 25.0; 
                            
                            totalX += worldX; 
                            motionCount++;
                        }
                    }
                }
            }

            // Check if motion is happening near the giant flower's center X coordinates
            if(motionCount > 5) {
                motionX = totalX / motionCount;
                if (Math.abs(motionX) < 12) { // Kid is in the middle touching it
                    interactionTarget = 1;
                } else {
                    interactionTarget = 0;
                }
            } else {
                interactionTarget = 0;
            }

            prevFrame = new Uint8ClampedArray(currentFrame);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            checkMotion();

            // Update Shader Uniforms
            silhouetteMat.uniforms.threshold.value = config.bgThreshold;

            const time = Date.now() * 0.001;

            // Smoothly ramp up/down interaction
            interactionLevel += (interactionTarget - interactionLevel) * 0.05;

            // 1. Bend the stem towards the kid slightly
            flowerGroup.rotation.z = Math.sin(time) * 0.05 + (interactionLevel * (motionX * 0.02));

            // 2. Animate Petals Blooming
            petals.forEach(petal => {
                // Base 0.6, opens to 1.7 when touched
                petal.rotation.x = THREE.MathUtils.lerp(0.6, 1.7, interactionLevel);
                // Breathe
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });
            innerPetals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.4, 1.4, interactionLevel);
                petal.rotation.x += Math.cos(time * 2.5 + petal.userData.baseRotY) * 0.06;
            });

            // Spin center slowly
            flowerHead.rotation.y = time * 0.2;

            // 3. Emit Pollen if being touched
            if (interactionLevel > 0.4 && Math.random() > 0.3) {
                // Spawn 2 particles
                for(let k=0; k<2; k++) {
                    pollenPos[pollenIdx*3] = flowerHead.position.x + (Math.random()-0.5)*3;
                    pollenPos[pollenIdx*3+1] = flowerHead.position.y + 2;
                    pollenPos[pollenIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*3;
                    
                    pollenVel[pollenIdx].set(
                        (Math.random()-0.5)*0.1, 
                        Math.random()*0.1 + 0.05, 
                        (Math.random()-0.5)*0.1
                    );
                    pollenIdx = (pollenIdx + 1) % pollenCount;
                }
            }

            // Update Pollen Physics
            const pPositions = pollenGeo.attributes.position.array;
            for(let i=0; i<pollenCount; i++) {
                if(pPositions[i*3+1] > -50) { // Active
                    pPositions[i*3] += pollenVel[i].x;
                    pPositions[i*3+1] += pollenVel[i].y;
                    pPositions[i*3+2] += pollenVel[i].z;
                    
                    // Wind swirl
                    pPositions[i*3] += Math.sin(time * 2 + i) * 0.02;
                    
                    // Recycle if it goes too high
                    if(pPositions[i*3+1] > 30) pPositions[i*3+1] = -100;
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // --- Fullscreen and UI Logic ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            const videoContainer = document.getElementById('video-container');

            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
                videoContainer.style.display = 'none';
                gui.hide();
            } else {
                uiOverlay.style.display = 'block';
                if(config.showWebcam) videoContainer.style.display = 'block';
                gui.show();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        getCameras();
        animate();
    </script>
</body>
</html>
