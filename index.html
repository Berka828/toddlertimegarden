<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webcam Interactive Garden</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #101c16;
      font-family: Arial, sans-serif;
    }

    #gardenCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #webcam {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 180px;
      height: 130px;
      object-fit: cover;
      transform: scaleX(-1);
      border-radius: 16px;
      opacity: 0.45;
      border: 2px solid rgba(255,255,255,0.4);
      z-index: 5;
    }

    #motionCanvas {
      display: none;
    }

    #ui {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      padding: 14px 16px;
      border-radius: 16px;
      max-width: 360px;
      backdrop-filter: blur(8px);
    }

    #ui h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    #ui p {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
    }

    #startBtn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      border: none;
      border-radius: 999px;
      padding: 18px 28px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      background: #ffdd57;
      color: #1d1d1d;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    #meter {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      width: 240px;
      height: 16px;
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
      overflow: hidden;
    }

    #meterFill {
      width: 0%;
      height: 100%;
      background: #ffdd57;
      border-radius: 999px;
      transition: width 0.08s linear;
    }
  </style>
</head>
<body>
  <canvas id="gardenCanvas"></canvas>
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="motionCanvas" width="160" height="120"></canvas>

  <div id="ui">
    <h1>Move to Grow the Garden 🌸</h1>
    <p>Wave your hands or move your body. More motion makes flowers bloom, butterflies fly faster, and glowing seeds appear.</p>
  </div>

  <div id="meter"><div id="meterFill"></div></div>
  <button id="startBtn">Start Garden</button>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script>
    const canvas = document.getElementById('gardenCanvas');
    const video = document.getElementById('webcam');
    const motionCanvas = document.getElementById('motionCanvas');
    const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const meterFill = document.getElementById('meterFill');

    let previousFrame = null;
    let motionAmount = 0;
    let smoothedMotion = 0;

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x102018, 8, 28);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4, 11);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x9ed8ff);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x275b36, 1.8);
    scene.add(hemiLight);

    const sun = new THREE.DirectionalLight(0xfff1b8, 1.4);
    sun.position.set(5, 8, 4);
    scene.add(sun);

    const groundGeo = new THREE.PlaneGeometry(40, 28, 48, 48);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x3c8f49 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.05;
    scene.add(ground);

    const flowers = [];
    const flowerColors = [0xff5fa2, 0xffcc33, 0xffffff, 0xbf7cff, 0xff7043, 0x58d68d];

    function createFlower(x, z, scale = 1) {
      const group = new THREE.Group();
      group.position.set(x, 0, z);
      group.userData.baseScale = scale;
      group.userData.bloom = 0.15 + Math.random() * 0.25;
      group.userData.sway = Math.random() * Math.PI * 2;

      const stemGeo = new THREE.CylinderGeometry(0.025 * scale, 0.04 * scale, 1.1 * scale, 8);
      const stemMat = new THREE.MeshLambertMaterial({ color: 0x236b32 });
      const stem = new THREE.Mesh(stemGeo, stemMat);
      stem.position.y = 0.55 * scale;
      group.add(stem);

      const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
      const petalMat = new THREE.MeshLambertMaterial({ color });
      const centerMat = new THREE.MeshLambertMaterial({ color: 0x5a3519 });

      const head = new THREE.Group();
      head.position.y = 1.15 * scale;
      head.scale.setScalar(group.userData.bloom);
      group.userData.head = head;

      for (let i = 0; i < 6; i++) {
        const petal = new THREE.Mesh(
          new THREE.SphereGeometry(0.13 * scale, 16, 12),
          petalMat
        );
        const angle = (i / 6) * Math.PI * 2;
        petal.position.set(Math.cos(angle) * 0.18 * scale, Math.sin(angle) * 0.18 * scale, 0);
        petal.scale.set(1.2, 0.8, 0.35);
        head.add(petal);
      }

      const center = new THREE.Mesh(new THREE.SphereGeometry(0.09 * scale, 16, 12), centerMat);
      center.scale.z = 0.4;
      head.add(center);

      group.add(head);
      scene.add(group);
      flowers.push(group);
    }

    for (let i = 0; i < 90; i++) {
      createFlower(
        (Math.random() - 0.5) * 22,
        -2 - Math.random() * 16,
        0.65 + Math.random() * 1.1
      );
    }

    const butterflies = [];
    function createButterfly() {
      const group = new THREE.Group();
      const wingMat = new THREE.MeshLambertMaterial({ color: flowerColors[Math.floor(Math.random() * flowerColors.length)], side: THREE.DoubleSide });
      const bodyMat = new THREE.MeshLambertMaterial({ color: 0x2c1b10 });

      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.035, 0.22, 4, 8), bodyMat);
      body.rotation.z = Math.PI / 2;
      group.add(body);

      const leftWing = new THREE.Mesh(new THREE.CircleGeometry(0.16, 24), wingMat);
      const rightWing = new THREE.Mesh(new THREE.CircleGeometry(0.16, 24), wingMat);
      leftWing.position.x = -0.12;
      rightWing.position.x = 0.12;
      leftWing.scale.set(1.0, 1.35, 1);
      rightWing.scale.set(1.0, 1.35, 1);
      group.add(leftWing, rightWing);

      group.position.set((Math.random() - 0.5) * 12, 1.6 + Math.random() * 3, -4 - Math.random() * 9);
      group.userData.speed = 0.4 + Math.random() * 0.8;
      group.userData.phase = Math.random() * Math.PI * 2;
      group.userData.leftWing = leftWing;
      group.userData.rightWing = rightWing;
      scene.add(group);
      butterflies.push(group);
    }

    for (let i = 0; i < 18; i++) createButterfly();

    const seedGeo = new THREE.SphereGeometry(0.035, 8, 8);
    const seedMat = new THREE.MeshBasicMaterial({ color: 0xfff6b0, transparent: true, opacity: 0.85 });
    const seeds = [];

    function spawnSeed() {
      const seed = new THREE.Mesh(seedGeo, seedMat.clone());
      seed.position.set((Math.random() - 0.5) * 14, 0.2 + Math.random() * 3, -3 - Math.random() * 12);
      seed.userData.life = 1;
      seed.userData.velocity = new THREE.Vector3((Math.random() - 0.5) * 0.02, 0.025 + Math.random() * 0.035, (Math.random() - 0.5) * 0.015);
      scene.add(seed);
      seeds.push(seed);
    }

    function measureMotion() {
      if (video.readyState < 2) return;

      motionCtx.save();
      motionCtx.scale(-1, 1);
      motionCtx.drawImage(video, -motionCanvas.width, 0, motionCanvas.width, motionCanvas.height);
      motionCtx.restore();

      const currentFrame = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);

      if (!previousFrame) {
        previousFrame = currentFrame;
        return;
      }

      let diff = 0;
      const data = currentFrame.data;
      const prev = previousFrame.data;

      for (let i = 0; i < data.length; i += 16) {
        const r = Math.abs(data[i] - prev[i]);
        const g = Math.abs(data[i + 1] - prev[i + 1]);
        const b = Math.abs(data[i + 2] - prev[i + 2]);
        diff += r + g + b;
      }

      motionAmount = Math.min(diff / 900000, 1);
      smoothedMotion += (motionAmount - smoothedMotion) * 0.12;
      meterFill.style.width = Math.round(smoothedMotion * 100) + '%';
      previousFrame = currentFrame;
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        alert('Camera access was blocked or unavailable. You can still view the garden, but it will not react to movement.');
        console.error(err);
      }
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      measureMotion();

      const bloomBoost = THREE.MathUtils.clamp(smoothedMotion * 1.6, 0, 1.25);

      flowers.forEach((flower, i) => {
        const head = flower.userData.head;
        const targetBloom = flower.userData.bloom + bloomBoost;
        head.scale.lerp(new THREE.Vector3(targetBloom, targetBloom, targetBloom), 0.06);
        flower.rotation.z = Math.sin(t * 1.5 + flower.userData.sway) * (0.025 + smoothedMotion * 0.08);
      });

      butterflies.forEach((b, i) => {
        const speed = b.userData.speed + smoothedMotion * 2.2;
        b.userData.phase += 0.025 * speed;
        b.position.x += Math.sin(t * 0.7 + i) * 0.01 * speed;
        b.position.y += Math.sin(t * 1.3 + i) * 0.008 * speed;
        b.position.z += 0.018 * speed;
        b.rotation.y = Math.sin(t + i) * 0.4;
        b.userData.leftWing.rotation.y = Math.sin(t * 12 * speed) * 0.9;
        b.userData.rightWing.rotation.y = -Math.sin(t * 12 * speed) * 0.9;

        if (b.position.z > 3) {
          b.position.z = -14;
          b.position.x = (Math.random() - 0.5) * 12;
          b.position.y = 1.6 + Math.random() * 3;
        }
      });

      if (smoothedMotion > 0.18 && Math.random() < smoothedMotion * 0.35) {
        spawnSeed();
      }

      for (let i = seeds.length - 1; i >= 0; i--) {
        const seed = seeds[i];
        seed.position.add(seed.userData.velocity);
        seed.userData.life -= 0.012;
        seed.material.opacity = Math.max(seed.userData.life, 0);
        seed.scale.setScalar(1 + (1 - seed.userData.life) * 2.5);
        if (seed.userData.life <= 0) {
          scene.remove(seed);
          seeds.splice(i, 1);
        }
      }

      camera.position.x = Math.sin(t * 0.15) * 0.4;
      camera.lookAt(0, 1.3, -4);
      renderer.render(scene, camera);
    }

    startBtn.addEventListener('click', async () => {
      startBtn.style.display = 'none';
      await startWebcam();
      animate();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
