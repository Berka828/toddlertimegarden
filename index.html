<head>

    <title>BxCM MediaPipe Giant Interactive Flower</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

            text-transform: uppercase;
            letter-spacing: 2px;

    <!-- MediaPipe Libraries -->

</head>
<body>

    <div id="loading-message" class="pulse">Initializing AI Vision...<br><span style="font-size:1.2rem">Please wait</span></div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <p style="margin: 0 0 10px 0; font-size: 0.9rem;">AI Tracking Active. Press <strong>'F'</strong> for Fullscreen.</p>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <!-- Hidden Canvases for AI Segmentation & Physics -->
    <canvas id="seg-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration ---
        const config = {
            brandColor: '#2196F3', // Silhouette Color
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        let hasStarted = false;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xffe4e1, 0.02); 

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 10, 32); 
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xffe4e1, 1); 
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // Decorative Sun
        const sunGeo = new THREE.CircleGeometry(10, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff0aa, fog: false });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(-15, 20, -40);
        scene.add(sun);

        // --- Grass Wind Map ---
        const mapSize = 512;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        // --- Realistic Instanced Grass ---
        const numGrass = 40000;
        const grassGeo = new THREE.PlaneGeometry(0.15, 3.0, 1, 4);
        grassGeo.translate(0, 1.5, 0);

        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            side: THREE.DoubleSide,
            roughness: 0.8
        });

        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `
                uniform float time;
                uniform sampler2D windMap;
                varying vec2 vMyUv;
            ` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 30.0) / 60.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5 + instPos.z * 0.5) * 0.15;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 2.5 * position.y;
                    transformed.z -= windForce * 2.5 * position.y;
                    transformed.y -= windForce * 1.0 * position.y; 
                }
                `
            );
            shader.fragmentShader = `
                varying vec2 vMyUv;
            ` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(
                `#include <color_fragment>`,
                `
                #include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.12, 0.01);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
                `
            );
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 60, 0, (Math.random() - 0.5) * 25 - 2.5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- Perfect AI Silhouette Plane ---
        const segCanvas = document.getElementById('seg-canvas');
        segCanvas.width = 640; segCanvas.height = 480;
        const segCtx = segCanvas.getContext('2d');
        const segTex = new THREE.CanvasTexture(segCanvas);

        const silhouetteGeo = new THREE.PlaneGeometry(50, 37.5); // Aspect ratio 4:3
        const silhouetteMat = new THREE.MeshBasicMaterial({
            map: segTex,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -10); 
        // Mirror the silhouette to match natural movement
        silhouetteMesh.scale.x = -1; 
        scene.add(silhouetteMesh);

        // --- The Giant Interactive Flower ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 5); 
        scene.add(flowerGroup);

        const stemGeo = new THREE.CylinderGeometry(0.4, 0.7, 10, 16);
        stemGeo.translate(0, 5, 0); 
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.6 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 10;
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0);
        petalShape.bezierCurveTo(2.0, 2.0, 2.5, 6.0, 0, 8.0);
        petalShape.bezierCurveTo(-2.5, 6.0, -2.0, 2.0, 0, 0);

        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });

        const petals = [];
        const numPetals = 14;
        for (let i = 0; i < numPetals; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / numPetals) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.5; // Closed
            flowerHead.add(petal);
            petals.push(petal);
        }

        const innerPetals = [];
        const innerPetalMat = new THREE.MeshStandardMaterial({ color: 0xFFC107, side: THREE.DoubleSide });
        for (let i = 0; i < 10; i++) {
            const petal = new THREE.Mesh(petalGeo, innerPetalMat);
            petal.scale.setScalar(0.6);
            petal.rotation.y = (i / 10) * Math.PI * 2 + 0.2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.3;
            flowerHead.add(petal);
            innerPetals.push(petal);
        }

        const centerGeo = new THREE.SphereGeometry(2.2, 32, 16);
        centerGeo.scale(1, 0.4, 1);
        const centerMat = new THREE.MeshStandardMaterial({ color: 0xFF5722, roughness: 0.9 });
        const center = new THREE.Mesh(centerGeo, centerMat);
        center.position.y = 0.5;
        flowerHead.add(center);

        // --- BIG Magic Pollen Particles ---
        const pollenCount = 400;
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(pollenCount * 3);
        const pollenVel = [];

        for(let i=0; i<pollenCount; i++) {
            pollenPos[i*3] = 0; 
            pollenPos[i*3+1] = -100; // Hidden initially
            pollenPos[i*3+2] = 0;
            pollenVel.push(new THREE.Vector3());
        }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));

        const pCanvas = document.createElement('canvas');
        pCanvas.width = 64; pCanvas.height = 64;
        const pCtx = pCanvas.getContext('2d');
        const pGrad = pCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
        pGrad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        pGrad.addColorStop(0.2, 'rgba(255, 215, 0, 0.8)');
        pGrad.addColorStop(1, 'rgba(255, 193, 7, 0)');
        pCtx.fillStyle = pGrad;
        pCtx.beginPath(); pCtx.arc(32, 32, 32, 0, Math.PI*2); pCtx.fill();
        const pollenTex = new THREE.CanvasTexture(pCanvas);

        const pollenMat = new THREE.PointsMaterial({ 
            size: 4.5,
            map: pollenTex,
            transparent: true, 
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xffffff
        });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        let pollenIdx = 0;

        // --- MediaPipe AI Integration ---
        const videoElement = document.getElementById('webcam');
        let interactionLevel = 0; 
        let interactionTarget = 0;
        let motionX = 0;

        function onResults(results) {
            if (!hasStarted) {
                hasStarted = true;
                document.getElementById('loading-message').innerHTML = "Run in to bloom the flower!";
                setTimeout(() => { document.getElementById('loading-message').style.opacity = 0; }, 4000);
            }

            // 1. Render Perfect AI Silhouette Mask
            segCtx.save();
            segCtx.clearRect(0, 0, segCanvas.width, segCanvas.height);
            if (results.segmentationMask) {
                // Draw the mask
                segCtx.drawImage(results.segmentationMask, 0, 0, segCanvas.width, segCanvas.height);
                // Color it with brand blue and preserve transparency
                segCtx.globalCompositeOperation = 'source-in';
                segCtx.fillStyle = config.brandColor;
                segCtx.fillRect(0, 0, segCanvas.width, segCanvas.height);
            }
            segCtx.restore();
            segTex.needsUpdate = true;

            // 2. Process Hand/Body Landmarks for Interaction
            interactionTarget = 0;
            
            if (results.poseLandmarks) {
                // Relevant interaction points (Wrists, Indexes, Ankles)
                const interactionPoints = [
                    results.poseLandmarks[15], // Left Wrist
                    results.poseLandmarks[16], // Right Wrist
                    results.poseLandmarks[19], // Left Index
                    results.poseLandmarks[20], // Right Index
                    results.poseLandmarks[27], // Left Ankle
                    results.poseLandmarks[28]  // Right Ankle
                ];

                interactionPoints.forEach(point => {
                    if(point && point.visibility > 0.5) {
                        // Map normalized MediaPipe coords (0 to 1) to our 3D World space
                        // Note: MediaPipe X is mirrored in our setup
                        const normX = (1 - point.x) * 2 - 1;
                        const normY = -(point.y * 2 - 1);

                        const worldX = normX * 30.0;
                        const worldZ = normY * 15.0;

                        // Add ripples to grass map based on body parts
                        const tx = ((worldX + 30) / 60) * mapSize;
                        const ty = ((worldZ + 15) / 30) * mapSize;

                        windCtx.beginPath();
                        const g1 = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 20);
                        g1.addColorStop(0, 'rgba(255,255,255,1)');
                        g1.addColorStop(1, 'rgba(255,255,255,0)');
                        windCtx.fillStyle = g1;
                        windCtx.arc(tx, ty, 20, 0, Math.PI*2);
                        windCtx.fill();

                        // Check if hands are near the flower center (x ≈ 0, y is upper body)
                        // Using screen coordinates roughly where the flower is (center horizontally)
                        if (point.y < 0.6 && Math.abs(normX) < 0.3) {
                            interactionTarget = 1;
                            motionX = normX * 20; // Used to sway the flower based on hand position
                        }
                    }
                });
            }
            windTex.needsUpdate = true;
        }

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: true,
            smoothSegmentation: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        const cameraMP = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraMP.start();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Fade the Grass Wind Texture
            windCtx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            windCtx.fillRect(0, 0, mapSize, mapSize);

            grassParams.time.value += 0.016;
            const time = Date.now() * 0.001;

            // Ramp interaction (Bloom and bend)
            interactionLevel += (interactionTarget - interactionLevel) * 0.1; // Smooth out the blooming speed

            flowerGroup.rotation.z = Math.sin(time) * 0.05 + (interactionLevel * (motionX * 0.04));
            flowerGroup.scale.setScalar(1.0 + interactionLevel * 0.15); 

            petals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.5, 1.9, interactionLevel); // OPENS WIDE
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });
            innerPetals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.3, 1.7, interactionLevel);
                petal.rotation.x += Math.cos(time * 2.5 + petal.userData.baseRotY) * 0.06;
            });

            flowerHead.rotation.y = time * 0.3;

            // Emit HUGE SPARKLES if interacting
            if (interactionLevel > 0.4) {
                for(let k=0; k<5; k++) { 
                    pollenPos[pollenIdx*3] = flowerHead.position.x + (Math.random()-0.5)*5;
                    pollenPos[pollenIdx*3+1] = flowerHead.position.y + 2 + flowerGroup.position.y;
                    pollenPos[pollenIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*5;

                    pollenVel[pollenIdx].set((Math.random()-0.5)*0.2, Math.random()*0.2 + 0.1, (Math.random()-0.5)*0.2);
                    pollenIdx = (pollenIdx + 1) % pollenCount;
                }
            }

            const pPositions = pollenGeo.attributes.position.array;
            for(let i=0; i<pollenCount; i++) {
                if(pPositions[i*3+1] > -50) { 
                    pPositions[i*3] += pollenVel[i].x;
                    pPositions[i*3+1] += pollenVel[i].y;
                    pPositions[i*3+2] += pollenVel[i].z;
                    pPositions[i*3] += Math.sin(time * 3 + i) * 0.04; // Swirl
                    if(pPositions[i*3+1] > 40) pPositions[i*3+1] = -100; // Recycle
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // --- UI Logic ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
            } else {
                uiOverlay.style.display = 'block';
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
