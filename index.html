    <!-- Import Maps -->
    <script type="importmap">
        {

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';
        import { FilesetResolver, PoseLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs';

        // --- Config & State ---
        const config = {
            showWebcam: false,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        const state = {
            flowerInteraction: 0,
            sunInteraction: 0,
            rainInteraction: 0,
            rainbowOpacity: 0
        };

        // --- GUI Setup ---
        const gui = new GUI({ title: '🌤️ Interactive Weather Panel' });
        gui.add(config, 'showWebcam').name('Show Debug Webcam').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Three.js Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 15, 45); 
        camera.lookAt(0, 10, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB, 1); 
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x888888, 0.7);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(20, 50, 20);
        scene.add(dirLight);

        // --- Silhouette Plane (Masked by AI) ---
        const maskCanvas = document.createElement('canvas');
        const maskCtx = maskCanvas.getContext('2d');
        const maskTex = new THREE.CanvasTexture(maskCanvas);

        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);

        // A large plane placed in the background
        const silhouetteGeo = new THREE.PlaneGeometry(80, 60);
        const silhouetteMat = new THREE.ShaderMaterial({
            uniforms: {
                tVideo: { value: videoTex },
                tMask: { value: maskTex },
                glowColor: { value: new THREE.Color(0x2196F3) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = vec2(1.0 - uv.x, uv.y); // Mirror video
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tVideo;
                uniform sampler2D tMask;
                uniform vec3 glowColor;
                varying vec2 vUv;
                void main() {
                    vec4 vid = texture2D(tVideo, vUv);
                    float mask = texture2D(tMask, vUv).r;
                    
                    // Create a soft glowing silhouette mixed with the real video
                    vec3 finalColor = mix(glowColor, vid.rgb, 0.5);
                    gl_FragColor = vec4(finalColor, mask * 0.85); // Transparent background
                }
            `,
            transparent: true,
            depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 20, -20);
        scene.add(silhouetteMesh);


        // --- Interactive Quadrants & Elements ---

        // 1. The Sun (Top Left)
        const sunGroup = new THREE.Group();
        sunGroup.position.set(-20, 30, -10);
        scene.add(sunGroup);

        const sunGeo = new THREE.CircleGeometry(6, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFC107, transparent: true });
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        sunGroup.add(sunMesh);

        // 2. The Rain Cloud (Top Right)
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(20, 30, -10);
        scene.add(cloudGroup);

        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, transparent: true });
        const c1 = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), cloudMat);
        const c2 = new THREE.Mesh(new THREE.SphereGeometry(3, 16, 16), cloudMat);
        c2.position.set(-3.5, -1, 0);
        const c3 = new THREE.Mesh(new THREE.SphereGeometry(3, 16, 16), cloudMat);
        c3.position.set(3.5, -1, 0);
        cloudGroup.add(c1, c2, c3);

        // Rain Particles
        const rainCount = 1000;
        const rainGeo = new THREE.BufferGeometry();
        const rainPos = new Float32Array(rainCount * 3);
        const rainVel = new Float32Array(rainCount);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = (Math.random() - 0.5) * 12;
            rainPos[i*3+1] = -Math.random() * 40;
            rainPos[i*3+2] = (Math.random() - 0.5) * 4;
            rainVel[i] = 0.5 + Math.random() * 0.5;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0x4FC3F7, size: 0.3, transparent: true, opacity: 0 });
        const rainSys = new THREE.Points(rainGeo, rainMat);
        cloudGroup.add(rainSys);

        // 3. The Rainbow (Center Sky)
        const rainbowGeo = new THREE.TorusGeometry(25, 2, 16, 64, Math.PI);
        
        // Shader to create rainbow stripes
        const rainbowMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform float opacity;
                void main() {
                    vec3 col = vec3(1.0);
                    if(vUv.y < 0.16) col = vec3(1.0, 0.0, 0.0); // Red
                    else if(vUv.y < 0.33) col = vec3(1.0, 0.5, 0.0); // Orange
                    else if(vUv.y < 0.5) col = vec3(1.0, 1.0, 0.0); // Yellow
                    else if(vUv.y < 0.66) col = vec3(0.0, 1.0, 0.0); // Green
                    else if(vUv.y < 0.83) col = vec3(0.0, 0.0, 1.0); // Blue
                    else col = vec3(0.5, 0.0, 1.0); // Purple
                    gl_FragColor = vec4(col, opacity * sin(vUv.x * 3.1415)); // Fade edges
                }
            `,
            uniforms: { opacity: { value: 0.0 } },
            transparent: true, side: THREE.DoubleSide
        });
        const rainbowMesh = new THREE.Mesh(rainbowGeo, rainbowMat);
        rainbowMesh.position.set(0, 5, -15);
        scene.add(rainbowMesh);

        // 4. Center Interactive Flower
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 5); 
        scene.add(flowerGroup);

        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 12, 16), new THREE.MeshStandardMaterial({ color: 0x4CAF50 }));
        stem.geometry.translate(0, 6, 0);
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 12;
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0);
        petalShape.bezierCurveTo(2.0, 2.0, 3.0, 6.0, 0, 9.0);
        petalShape.bezierCurveTo(-3.0, 6.0, -2.0, 2.0, 0, 0);

        const petals = [];
        for (let i = 0; i < 14; i++) {
            const petal = new THREE.Mesh(new THREE.ShapeGeometry(petalShape), new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide }));
            petal.rotation.y = (i / 14) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.5; // Closed
            flowerHead.add(petal);
            petals.push(petal);
        }

        const center = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 16), new THREE.MeshStandardMaterial({ color: 0xFF5722 }));
        center.geometry.scale(1, 0.4, 1);
        flowerHead.add(center);

        // Magic Pollen Particles (Only emit when touched)
        const pollenCount = 200;
        const pollenPos = new Float32Array(pollenCount * 3);
        const pollenVel = [];
        for(let i=0; i<pollenCount; i++) {
            pollenPos[i*3+1] = -100; // Hidden
            pollenVel.push(new THREE.Vector3());
        }
        const pollenGeo = new THREE.BufferGeometry();
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
        const pollenMat = new THREE.PointsMaterial({ color: 0xFFD700, size: 1.5, transparent: true, blending: THREE.AdditiveBlending });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        let pollenIdx = 0;

        // 5. Responsive Grass (Wind Map)
        const mapSize = 512;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const numGrass = 40000;
        const grassGeo = new THREE.PlaneGeometry(0.2, 3.5, 1, 4);
        grassGeo.translate(0, 1.75, 0);

        const grassMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.8 });
        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `uniform float time; uniform sampler2D windMap; varying vec2 vMyUv;` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(`#include <begin_vertex>`, `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 35.0) / 70.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5) * 0.1;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 3.0 * position.y;
                    transformed.z -= windForce * 3.0 * position.y;
                    transformed.y -= windForce * 1.5 * position.y; 
                }
            `);
            shader.fragmentShader = `varying vec2 vMyUv;` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(`#include <color_fragment>`, `
                #include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.15, 0.02);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
            `);
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 70, 0, (Math.random() - 0.5) * 30 - 2.5);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.08, 0.8, 0.3 + Math.random() * 0.25));
        }
        scene.add(grassMesh);


        // --- AI MediaPipe Setup ---
        let poseLandmarker;
        let lastVideoTime = -1;

        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    outputSegmentationMasks: true // Automatically generates silhouette!
                });
                document.getElementById('loading').style.display = 'none';
                getCameras();
            } catch (e) {
                document.getElementById('loading').innerHTML = "Failed to load AI Models.";
                console.error(e);
            }
        }

        // Camera Initialization
        const cameraSelect = document.getElementById('camera-select');
        let currentStream = null;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    cameraSelect.appendChild(new Option(device.label || `Camera ${index + 1}`, device.deviceId));
                });
                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) { cameraSelect.innerHTML = '<option>Error</option>'; }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
            });
            video.srcObject = currentStream;
            video.play();
        }

        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Interaction Logic & Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Process AI
            if (video.readyState >= 2 && poseLandmarker) {
                if (video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    const results = poseLandmarker.detectForVideo(video, performance.now());
                    
                    // Render Silhouette Mask
                    if (results.segmentationMasks && results.segmentationMasks.length > 0) {
                        const mask = results.segmentationMasks[0];
                        maskCanvas.width = mask.width;
                        maskCanvas.height = mask.height;
                        const imageData = new ImageData(new Uint8ClampedArray(mask.getAsFloat32Array().map(v => v * 255)), mask.width, mask.height);
                        
                        // Extract only alpha for the canvas
                        const finalImg = maskCtx.createImageData(mask.width, mask.height);
                        for(let i=0; i<imageData.data.length; i+=4) {
                            finalImg.data[i] = 255;
                            finalImg.data[i+1] = 255;
                            finalImg.data[i+2] = 255;
                            finalImg.data[i+3] = imageData.data[i/4]; // Apply float mask to alpha
                        }
                        maskCtx.putImageData(finalImg, 0, 0);
                        maskTex.needsUpdate = true;
                    }

                    // Reset intentions
                    let targetFlower = 0; let targetSun = 0; let targetRain = 0;

                    // Fade Grass wind
                    windCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                    windCtx.fillRect(0, 0, mapSize, mapSize);

                    // Process Body Interactions
                    if (results.landmarks && results.landmarks.length > 0) {
                        for (const landmarks of results.landmarks) {
                            
                            // Map Hands & Feet to World Coordinates
                            const leftHand = landmarks[15]; // Left wrist
                            const rightHand = landmarks[16]; // Right wrist
                            const feet = [landmarks[27], landmarks[28]]; 

                            [leftHand, rightHand, ...feet].forEach(pt => {
                                if (!pt) return;
                                // Normalized 0-1 mapped to Three.js coordinates
                                // Mirrored X mapping
                                const worldX = ((1.0 - pt.x) * 2 - 1) * 35; 
                                const worldY = -(pt.y * 2 - 1) * 20 + 10;
                                const worldZ = 5;

                                // Grass Bending (draw circles on windmap based on feet/hands)
                                if (pt.y > 0.5) { // Lower body area
                                    const tx = ((worldX + 35) / 70) * mapSize;
                                    const ty = ((0 + 15) / 30) * mapSize;
                                    windCtx.beginPath();
                                    const g1 = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 20);
                                    g1.addColorStop(0, 'rgba(255,255,255,1)');
                                    g1.addColorStop(1, 'rgba(255,255,255,0)');
                                    windCtx.fillStyle = g1;
                                    windCtx.arc(tx, ty, 20, 0, Math.PI*2);
                                    windCtx.fill();
                                    windTex.needsUpdate = true;
                                }

                                // Interactive Distance Checks
                                const distToFlower = Math.hypot(worldX - flowerHead.position.x, worldY - flowerHead.position.y);
                                if (distToFlower < 8.0) targetFlower = 1;

                                const distToSun = Math.hypot(worldX - sunGroup.position.x, worldY - sunGroup.position.y);
                                if (distToSun < 10.0) targetSun = 1;

                                const distToCloud = Math.hypot(worldX - cloudGroup.position.x, worldY - cloudGroup.position.y);
                                if (distToCloud < 10.0) targetRain = 1;
                            });
                        }
                    }

                    // Smooth State Transitions
                    state.flowerInteraction += (targetFlower - state.flowerInteraction) * 0.1;
                    state.sunInteraction += (targetSun - state.sunInteraction) * 0.1;
                    state.rainInteraction += (targetRain - state.rainInteraction) * 0.1;
                }
            }

            const time = Date.now() * 0.001;
            grassParams.time.value += 0.016;

            // --- Animate Quadrants ---
            // Sun 
            sunMesh.scale.setScalar(1.0 + state.sunInteraction * 0.5 + Math.sin(time*3)*0.05);
            sunMat.color.setHex(state.sunInteraction > 0.5 ? 0xFF9800 : 0xFFC107);

            // Cloud & Rain
            cloudGroup.position.y = 30 + Math.sin(time) * 1.5;
            if (state.rainInteraction > 0.1) {
                rainMat.opacity = Math.min(1.0, rainMat.opacity + 0.05);
                const rPos = rainGeo.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    rPos[i*3+1] -= rainVel[i];
                    if (rPos[i*3+1] < -40) { // Reset drop
                        rPos[i*3+1] = 0;
                        rPos[i*3] = (Math.random() - 0.5) * 12;
                    }
                }
                rainGeo.attributes.position.needsUpdate = true;
            } else {
                rainMat.opacity = Math.max(0.0, rainMat.opacity - 0.05);
            }

            // Rainbow (Requires both Sun and Rain)
            const rainbowTarget = (state.sunInteraction > 0.5 && state.rainInteraction > 0.5) ? 1.0 : 0.0;
            state.rainbowOpacity += (rainbowTarget - state.rainbowOpacity) * 0.02;
            rainbowMat.uniforms.opacity.value = state.rainbowOpacity;

            // Flower Bloom
            flowerGroup.rotation.z = Math.sin(time) * 0.05;
            petals.forEach(petal => {
                petal.rotation.x = THREE.MathUtils.lerp(0.5, 1.8, state.flowerInteraction); 
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });

            // Pollen Emit
            if (state.flowerInteraction > 0.5) {
                for(let k=0; k<3; k++) {
                    pollenPos[pollenIdx*3] = flowerHead.position.x + (Math.random()-0.5)*4;
                    pollenPos[pollenIdx*3+1] = flowerHead.position.y + 1;
                    pollenPos[pollenIdx*3+2] = flowerGroup.position.z + (Math.random()-0.5)*4;
                    pollenVel[pollenIdx].set((Math.random()-0.5)*0.15, Math.random()*0.2 + 0.1, (Math.random()-0.5)*0.15);
                    pollenIdx = (pollenIdx + 1) % pollenCount;
                }
            }

            const pPositions = pollenGeo.attributes.position.array;
            for(let i=0; i<pollenCount; i++) {
                if(pPositions[i*3+1] > -50) { 
                    pPositions[i*3] += pollenVel[i].x;
                    pPositions[i*3+1] += pollenVel[i].y;
                    pPositions[i*3+2] += pollenVel[i].z;
                    if(pPositions[i*3+1] > 40) pPositions[i*3+1] = -100;
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // Handle Resizing & Fullscreen
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        document.addEventListener('fullscreenchange', () => {
            document.getElementById('ui-overlay').style.display = document.fullscreenElement ? 'none' : 'block';
            gui[document.fullscreenElement ? 'hide' : 'show']();
        });

        initAI();
        animate();
    </script>
</body>
