<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap');

        body { margin: 0; overflow: hidden; background: #1a0b2e; font-family: 'Quicksand', sans-serif; }
        canvas { display: block; }

        /* UI Overlays */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }

        .bxcm-logo {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);

            border-radius: 50px;
            display: inline-block;

        /* BxCM Brand Colors */

</head>
<body>

    <div id="center-message" class="pulse">Wave your hands to bloom the giant flowers!</div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="camera-settings">
            <label for="camera-select">🎥 Select Sensor/Camera:</label>
            <select id="camera-select">
                <option value="">Loading cameras...</option>
            </select>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <!-- Hidden Canvases for Motion Physics -->
    <canvas id="motion-canvas" style="display:none;"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Configuration & State ---
        const config = {
            motionSensitivity: 35,
            showWebcam: false,
            goFullscreen: () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        };

        const brandColors = [0xFFC107, 0xFF5722, 0xE91E63, 0x2196F3, 0x9C27B0]; 
        let hasStarted = false;

        // --- Setup Admin GUI ---
        const gui = new GUI({ title: '🌿 Meadow Admin Panel' });
        gui.add(config, 'motionSensitivity', 10, 100, 1).name('Motion Sensitivity');
        gui.add(config, 'showWebcam').name('Show Webcam').onChange(v => {
            if (!document.fullscreenElement) document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });
        gui.add(config, 'goFullscreen').name('Toggle Fullscreen (F)');

        // --- Texture Map Physics (Wind & Bloom) ---
        const mapSize = 512;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const bloomCanvas = document.createElement('canvas');
        bloomCanvas.width = mapSize; bloomCanvas.height = mapSize;
        const bloomCtx = bloomCanvas.getContext('2d');
        const bloomTex = new THREE.CanvasTexture(bloomCanvas);

        // --- Setup Three.js Scene ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a0b2e, 0.02); // Twilight mist

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 8, 25); 
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x1a0b2e, 1); // Dark twilight background to make silhouette pop
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);
        const spotLight = new THREE.SpotLight(0xE91E63, 1000);
        spotLight.position.set(0, 30, 0);
        spotLight.angle = Math.PI / 4;
        scene.add(spotLight);

        // --- Realistic Instanced Grass ---
        const numGrass = 40000;
        const grassGeo = new THREE.PlaneGeometry(0.15, 2.5, 1, 4);
        grassGeo.translate(0, 1.25, 0); 

        const grassMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            side: THREE.DoubleSide,
            roughness: 0.8
        });

        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `
                uniform float time;
                uniform sampler2D windMap;
                varying vec2 vMyUv;
            ` + shader.vertexShader;
            
            shader.vertexShader = shader.vertexShader.replace(
                `#include <begin_vertex>`,
                `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 25.0) / 50.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5 + instPos.z * 0.5) * 0.15;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 2.5 * position.y;
                    transformed.z -= windForce * 2.5 * position.y;
                    transformed.y -= windForce * 1.0 * position.y; 
                }
                `
            );
            
            shader.fragmentShader = `
                varying vec2 vMyUv;
            ` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(
                `#include <color_fragment>`,
                `
                #include <color_fragment>
                vec3 rootColor = vec3(0.02, 0.10, 0.05);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
                `
            );
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 50, 0, (Math.random() - 0.5) * 30);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.3 + Math.random() * 0.08, 0.7, 0.2 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- Live Player Silhouette Map ---
        // Creates a magical mirror in the background that captures the actual shape of the kids
        const video = document.getElementById('webcam');
        const videoTex = new THREE.VideoTexture(video);
        videoTex.colorSpace = THREE.SRGBColorSpace;
        
        const silhouetteGeo = new THREE.PlaneGeometry(60, 45); // 4:3 Aspect
        const silhouetteMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTex },
                brandColor: { value: new THREE.Color(0x2196F3) } // BxCM Blue base
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = vec2(1.0 - uv.x, uv.y); // Mirror image
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform vec3 brandColor;
                varying vec2 vUv;
                void main() {
                    vec4 texColor = texture2D(tDiffuse, vUv);
                    
                    // Extract brightness to separate kids from background
                    float luma = dot(texColor.rgb, vec3(0.299, 0.587, 0.114));
                    
                    // Thresholding for glowing edge effect
                    float alpha = smoothstep(0.3, 0.7, luma); 
                    
                    // Mix actual camera colors with brand colors for magical feel
                    vec3 finalColor = mix(brandColor, texColor.rgb, 0.6) * 1.5; 
                    
                    gl_FragColor = vec4(finalColor, alpha * 0.5); // 0.5 opacity for hologram look
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -15);
        scene.add(silhouetteMesh);

        // --- Interactive Giant Hero Flowers ---
        const heroFlowers = [];
        const petalGeo = new THREE.PlaneGeometry(1.5, 5);
        petalGeo.translate(0, 2.5, 0); // pivot at base
        const centerGeo = new THREE.SphereGeometry(1.2, 16, 16);

        function createHeroFlower(x, z, colorHex) {
            const group = new THREE.Group();
            
            const centerMat = new THREE.MeshStandardMaterial({ color: 0xFFC107, roughness: 0.2 });
            const center = new THREE.Mesh(centerGeo, centerMat);
            group.add(center);

            const petalMat = new THREE.MeshStandardMaterial({ 
                color: colorHex, 
                side: THREE.DoubleSide, 
                roughness: 0.4 
            });

            const petals = [];
            for(let i=0; i<8; i++) {
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.rotation.y = (i / 8) * Math.PI * 2;
                petal.userData.baseRotY = petal.rotation.y;
                petal.rotation.x = 0.2; // Closed starting state
                group.add(petal);
                petals.push(petal);
            }
            
            // Stem
            const stemGeo = new THREE.CylinderGeometry(0.2, 0.2, 4);
            stemGeo.translate(0, -2, 0);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            group.add(stem);

            group.position.set(x, 3, z);
            scene.add(group);
            heroFlowers.push({ group, petals, x, z, openLerp: 0 });
        }

        // Place them distinctly in the foreground
        createHeroFlower(-8, 2, brandColors[1]); // Orange
        createHeroFlower(0, 5, brandColors[2]);  // Pink
        createHeroFlower(8, 2, brandColors[4]);  // Purple

        // --- Camera & Motion Setup ---
        const cameraSelect = document.getElementById('camera-select');
        const motionCanvas = document.getElementById('motion-canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

        const GRID_W = 60, GRID_H = 40;
        motionCanvas.width = GRID_W; motionCanvas.height = GRID_H;

        let prevFrame = null;
        let currentStream = null;
        let recentAvgX = 0;
        let recentAvgZ = 0;
        let motionDetected = false;

        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) {
                cameraSelect.innerHTML = '<option>Permission Denied/Error</option>';
            }
        }

        async function startStream(deviceId) {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: deviceId ? { deviceId: { exact: deviceId }, width: 640, height: 480 } : true 
                });
                video.srcObject = currentStream;
            } catch (err) { console.error(err); }
        }
        cameraSelect.addEventListener('change', (e) => startStream(e.target.value));

        // --- Motion Physics Analysis ---
        function checkMotion() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            mCtx.drawImage(video, 0, 0, GRID_W, GRID_H);
            const currentFrame = mCtx.getImageData(0, 0, GRID_W, GRID_H).data;
            let motionCount = 0; let totalX = 0; let totalZ = 0;

            if (prevFrame) {
                for (let y = 0; y < GRID_H; y+=2) { 
                    for (let x = 0; x < GRID_W; x+=2) {
                        const i = (y * GRID_W + x) * 4;

                        const diff = Math.abs(currentFrame[i] - prevFrame[i]) + 
                                     Math.abs(currentFrame[i+1] - prevFrame[i+1]) + 
                                     Math.abs(currentFrame[i+2] - prevFrame[i+2]);

                        if (diff > config.motionSensitivity) {
                            if(!hasStarted) {
                                hasStarted = true;
                                document.getElementById('center-message').style.opacity = 0;
                            }

                            const normX = (1 - (x / GRID_W)) * 2 - 1; 
                            const normY = -( (y / GRID_H) * 2 - 1 );

                            const worldX = normX * 25.0; 
                            const worldZ = normY * 15.0; 

                            totalX += worldX; totalZ += worldZ; motionCount++;

                            const tx = ((worldX + 25) / 50) * mapSize;
                            const ty = ((worldZ + 15) / 30) * mapSize;

                            windCtx.beginPath();
                            const g1 = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 20);
                            g1.addColorStop(0, 'rgba(255,255,255,0.9)');
                            g1.addColorStop(1, 'rgba(255,255,255,0)');
                            windCtx.fillStyle = g1;
                            windCtx.arc(tx, ty, 20, 0, Math.PI*2);
                            windCtx.fill();
                        }
                    }
                }
            }

            if(motionCount > 5) {
                recentAvgX = totalX / motionCount;
                recentAvgZ = totalZ / motionCount;
                motionDetected = true;
            } else {
                motionDetected = false;
            }

            prevFrame = new Uint8ClampedArray(currentFrame);
            windTex.needsUpdate = true;
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Fade Wind
            windCtx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            windCtx.fillRect(0, 0, mapSize, mapSize);

            checkMotion();
            
            grassParams.time.value += 0.016;
            const time = Date.now() * 0.001;

            // Animate Giant Hero Flowers Interactivity
            heroFlowers.forEach(flower => {
                let motionNear = false;
                
                // If motion is happening near this specific flower's X coordinate
                if (motionDetected) {
                    const dist = Math.abs(flower.x - recentAvgX);
                    if (dist < 8) motionNear = true;
                }
                
                // Lerp petal opening
                flower.openLerp += motionNear ? 0.06 : -0.015;
                flower.openLerp = Math.max(0, Math.min(1, flower.openLerp));
                
                flower.petals.forEach(petal => {
                    // Closed rotation: 0.2, Open fully flat: 1.6
                    const targetRotX = THREE.MathUtils.lerp(0.2, 1.6, flower.openLerp);
                    petal.rotation.x = targetRotX;
                    // Add subtle breathing wobble when fully open
                    if(flower.openLerp > 0.9) {
                        petal.rotation.x += Math.sin(time * 3 + petal.userData.baseRotY) * 0.05;
                    }
                });

                // Spin center slowly
                flower.group.children[0].rotation.y = time * 0.5;
                flower.group.position.y = 3 + Math.sin(time + flower.x) * 0.2; // Gentle hover
            });

            renderer.render(scene, camera);
        }

        // --- Fullscreen and UI Logic ---
        document.addEventListener('fullscreenchange', () => {
            const uiOverlay = document.getElementById('ui-overlay');
            const videoContainer = document.getElementById('video-container');

            if (document.fullscreenElement) {
                uiOverlay.style.display = 'none';
                videoContainer.style.display = 'none';
                gui.hide();
            } else {
                uiOverlay.style.display = 'block';
                if(config.showWebcam) videoContainer.style.display = 'block';
                gui.show();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') config.goFullscreen();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        getCameras();
        animate();
    </script>
</body>
</html>
