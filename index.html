</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>Initializing AI Tracking & Body Sensors...</div>
        <div style="font-size: 1.2rem; margin-top: 10px;">Please allow camera access.</div>
    </div>

    <div id="ui-overlay">
        <div class="bxcm-logo">
            <span class="c-y">B</span><span class="c-o">R</span><span class="c-m">O</span><span class="c-g">N</span><span class="c-b">X</span> Children's Museum
        </div>
        <div id="admin-panel">
            <button id="fullscreen-btn">Toggle Fullscreen (F)</button>
            <button id="reset-btn">Reset to Seed (R)</button>
        </div>
    </div>

    <video id="input_video" class="hidden" autoplay playsinline></video>
    <canvas id="cutout_canvas" class="hidden"></canvas>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 12, 45); 
        camera.lookAt(0, 6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0); 
        dirLight.position.set(20, 40, 15);
        scene.add(dirLight);

        // --- 2. SCENE OBJECTS ---
        const skyGroup = new THREE.Group();
        skyGroup.position.set(0, 22, -25);
        scene.add(skyGroup);

        // Sun
        const sunGeo = new THREE.CircleGeometry(6, 32); 
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFEB3B, side: THREE.DoubleSide });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        sun.position.set(-20, 5, 0);
        skyGroup.add(sun);
        let sunInteraction = 0;

        // Cloud
        const cloudGroup = new THREE.Group();
        cloudGroup.position.set(20, 5, 0);
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
        const puff1 = new THREE.Mesh(new THREE.SphereGeometry(3.5), cloudMat);
        const puff2 = new THREE.Mesh(new THREE.SphereGeometry(2.5), cloudMat); puff2.position.set(3.5, -1, 0);
        const puff3 = new THREE.Mesh(new THREE.SphereGeometry(2.5), cloudMat); puff3.position.set(-3.5, -1, 0);
        cloudGroup.add(puff1, puff2, puff3);
        skyGroup.add(cloudGroup);

        // Rain Particles
        const rainGeo = new THREE.BufferGeometry();
        const rainCount = 200;
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount; i++) {
            rainPos[i*3] = (Math.random()-0.5)*10;
            rainPos[i*3+1] = -Math.random()*20; 
            rainPos[i*3+2] = (Math.random()-0.5)*2;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0x42A5F5, size: 0.5, transparent: true, opacity: 0 });
        const rainSystem = new THREE.Points(rainGeo, rainMat);
        cloudGroup.add(rainSystem);
        let isRaining = false;
        let rainIntensity = 0;

        // Rainbow
        const rainbowGeo = new THREE.TorusGeometry(18, 1.2, 16, 100, Math.PI);
        const rainbowMat = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0, 
            map: createRainbowTexture(), side: THREE.DoubleSide 
        });
        const rainbow = new THREE.Mesh(rainbowGeo, rainbowMat);
        rainbow.position.set(0, -5, -5);
        skyGroup.add(rainbow);

        function createRainbowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 1;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0,0,256,0);
            grad.addColorStop(0, "red"); grad.addColorStop(0.2, "orange"); grad.addColorStop(0.4, "yellow");
            grad.addColorStop(0.6, "green"); grad.addColorStop(0.8, "blue"); grad.addColorStop(1, "violet");
            ctx.fillStyle = grad; ctx.fillRect(0,0,256,1);
            return new THREE.CanvasTexture(canvas);
        }

        // --- Player Silhouette ---
        const cutoutCanvas = document.getElementById('cutout_canvas');
        const cutoutCtx = cutoutCanvas.getContext('2d');
        const cutoutTex = new THREE.CanvasTexture(cutoutCanvas);
        cutoutTex.colorSpace = THREE.SRGBColorSpace;

        const silhouetteGeo = new THREE.PlaneGeometry(80, 60); 
        const silhouetteMat = new THREE.MeshBasicMaterial({
            map: cutoutTex, transparent: true, side: THREE.DoubleSide, depthWrite: false
        });
        const silhouetteMesh = new THREE.Mesh(silhouetteGeo, silhouetteMat);
        silhouetteMesh.position.set(0, 15, -35); 
        scene.add(silhouetteMesh);

        // Hand & Finger Tracking Indicators
        const handTrackers = new THREE.Group();
        scene.add(handTrackers);
        
        const trackerGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const trackerMat = new THREE.MeshBasicMaterial({ color: 0x00FF00, transparent: true, opacity: 0.7 });
        
        // Array to hold 4 markers per hand (Wrist, Thumb, Index, Pinky) to show hand span
        const leftHandMarkers = Array.from({length: 4}, () => new THREE.Mesh(trackerGeo, trackerMat));
        const rightHandMarkers = Array.from({length: 4}, () => new THREE.Mesh(trackerGeo, trackerMat));
        
        leftHandMarkers.forEach(m => handTrackers.add(m));
        rightHandMarkers.forEach(m => handTrackers.add(m));

        // --- Responsive Grass ---
        const mapSize = 256;
        const windCanvas = document.createElement('canvas');
        windCanvas.width = mapSize; windCanvas.height = mapSize;
        const windCtx = windCanvas.getContext('2d');
        const windTex = new THREE.CanvasTexture(windCanvas);

        const numGrass = 40000; 
        const grassGeo = new THREE.PlaneGeometry(0.15, 2.8, 1, 4); 
        grassGeo.translate(0, 1.4, 0);

        const grassMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.8 });
        const grassParams = { time: { value: 0 }, windMap: { value: windTex } };

        grassMat.onBeforeCompile = (shader) => {
            shader.uniforms.time = grassParams.time;
            shader.uniforms.windMap = grassParams.windMap;
            shader.vertexShader = `
                uniform float time; uniform sampler2D windMap; varying vec2 vMyUv;
            ` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(`#include <begin_vertex>`, `
                #include <begin_vertex>
                vMyUv = uv;
                vec3 instPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                vec2 mapUv = vec2((instPos.x + 40.0) / 80.0, (instPos.z + 15.0) / 30.0);
                float windForce = texture2D(windMap, mapUv).r;
                float naturalWind = sin(time * 2.0 + instPos.x * 0.5) * 0.15;
                if (position.y > 0.0) {
                    transformed.x += naturalWind * position.y;
                    transformed.x += windForce * 2.5 * position.y;
                    transformed.z -= windForce * 2.5 * position.y;
                }
            `);
            shader.fragmentShader = `varying vec2 vMyUv;` + shader.fragmentShader;
            shader.fragmentShader = shader.fragmentShader.replace(`#include <color_fragment>`, `
                #include <color_fragment>
                vec3 rootColor = vec3(0.01, 0.15, 0.02);
                diffuseColor.rgb = mix(rootColor, diffuseColor.rgb, vMyUv.y);
            `);
        };

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, numGrass);
        const dummy = new THREE.Object3D();
        for(let i = 0; i < numGrass; i++) {
            dummy.position.set((Math.random() - 0.5) * 90, 0, (Math.random() - 0.5) * 30 - 10);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.4 + Math.random() * 0.6);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
            grassMesh.setColorAt(i, new THREE.Color().setHSL(0.28 + Math.random() * 0.05, 0.8, 0.3 + Math.random() * 0.2));
        }
        scene.add(grassMesh);

        // --- Giant Gamified Flower (Starts as Seed) ---
        const flowerGroup = new THREE.Group();
        flowerGroup.position.set(0, 0, 0); 
        scene.add(flowerGroup);

        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.6, 12, 16).translate(0, 6, 0), new THREE.MeshStandardMaterial({ color: 0x4CAF50 }));
        flowerGroup.add(stem);

        const flowerHead = new THREE.Group();
        flowerHead.position.y = 12; 
        flowerGroup.add(flowerHead);

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0); petalShape.bezierCurveTo(3, 3, 3.5, 8, 0, 10); petalShape.bezierCurveTo(-3.5, 8, -3, 3, 0, 0);
        const petalGeo = new THREE.ShapeGeometry(petalShape);
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xE91E63, side: THREE.DoubleSide });

        const petals = [];
        for (let i = 0; i < 12; i++) {
            const petal = new THREE.Mesh(petalGeo, petalMat);
            petal.rotation.y = (i / 12) * Math.PI * 2;
            petal.userData.baseRotY = petal.rotation.y;
            petal.rotation.x = 0.2; // Start tighter
            flowerHead.add(petal); petals.push(petal);
        }
        const center = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 16).scale(1, 0.4, 1), new THREE.MeshStandardMaterial({ color: 0xFFC107 }));
        flowerHead.add(center);

        // Gamification Variables
        let flowerInteraction = 0; // Hand touch
        const seedSize = 0.05;
        let currentFlowerGrowth = seedSize; 
        const maxFlowerGrowth = 0.7; 

        flowerGroup.scale.setScalar(currentFlowerGrowth);

        // Pollen System
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(300 * 3);
        const pollenVel = [];
        for(let i=0; i<300; i++) { pollenPos[i*3+1] = -100; pollenVel.push(new THREE.Vector3()); }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
        const pollenMat = new THREE.PointsMaterial({ color: 0xFFD700, size: 1.5, transparent: true, blending: THREE.AdditiveBlending });
        const pollenSys = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenSys);
        let pIdx = 0;


        // --- 3. MEDIAPIPE LOGIC ---
        const videoElement = document.getElementById('input_video');
        let aiInitialized = false;

        function getThreeCoords(landmark, zDepth) {
            const x = (1 - landmark.x - 0.5) * 80; 
            const y = -(landmark.y - 0.5) * 60 + 15; 
            return new THREE.Vector3(x, y, zDepth);
        }

        function dist2D(v1, v2) {
            return Math.hypot(v1.x - v2.x, v1.y - v2.y);
        }

        function onPoseResults(results) {
            if (!aiInitialized) {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
                aiInitialized = true;
            }

            if (results.segmentationMask && cutoutCanvas.width === 0) {
                cutoutCanvas.width = videoElement.videoWidth;
                cutoutCanvas.height = videoElement.videoHeight;
            }
            if (results.segmentationMask) {
                cutoutCtx.save();
                cutoutCtx.clearRect(0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.translate(cutoutCanvas.width, 0);
                cutoutCtx.scale(-1, 1);
                cutoutCtx.drawImage(results.segmentationMask, 0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.globalCompositeOperation = 'source-in';
                cutoutCtx.drawImage(results.image, 0, 0, cutoutCanvas.width, cutoutCanvas.height);
                cutoutCtx.restore();
                cutoutTex.needsUpdate = true;
            }

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                
                // Track Hand parts: Wrist, Pinky, Index, Thumb
                const leftPoints = [lm[15], lm[17], lm[19], lm[21]].map(p => getThreeCoords(p, -15));
                const rightPoints = [lm[16], lm[18], lm[20], lm[22]].map(p => getThreeCoords(p, -15));
                
                // Update tracker meshes
                leftPoints.forEach((pt, i) => leftHandMarkers[i].position.copy(pt));
                rightPoints.forEach((pt, i) => rightHandMarkers[i].position.copy(pt));

                // Feet/Movement logic for grass
                const f1 = getThreeCoords(lm[27], 0);   
                const f2 = getThreeCoords(lm[28], 0);   
                [f1, f2].forEach(foot => {
                    const tx = ((foot.x + 40) / 80) * mapSize;
                    const ty = ((foot.z + 15) / 30) * mapSize;
                    windCtx.beginPath();
                    const g = windCtx.createRadialGradient(tx, ty, 0, tx, ty, 20);
                    g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(255,255,255,0)');
                    windCtx.fillStyle = g; windCtx.arc(tx, ty, 20, 0, Math.PI*2); windCtx.fill();
                });

                const cloudWorld = new THREE.Vector3(20, 27, 0);
                const sunWorld = new THREE.Vector3(-20, 27, 0);
                const flowerHeadWorld = new THREE.Vector3(0, 10, 0); 

                // Checking interaction using ANY part of the tracked hands
                const leftTouchesSun = leftPoints.some(pt => dist2D(pt, sunWorld) < 18);
                const rightTouchesSun = rightPoints.some(pt => dist2D(pt, sunWorld) < 18);
                const touchingSun = leftTouchesSun || rightTouchesSun;

                const leftTouchesCloud = leftPoints.some(pt => dist2D(pt, cloudWorld) < 18);
                const rightTouchesCloud = rightPoints.some(pt => dist2D(pt, cloudWorld) < 18);
                const touchingCloud = leftTouchesCloud || rightTouchesCloud;

                // --- NEW GAMIFICATION LOGIC ---
                if (touchingSun && touchingCloud) {
                    // Both hands up! Positive Growth
                    currentFlowerGrowth += 0.002;
                    sunInteraction = 1;
                    isRaining = true;
                } else if (touchingSun && !touchingCloud) {
                    // Only sun -> Negative Growth
                    currentFlowerGrowth -= 0.002;
                    sunInteraction = 1;
                    isRaining = false;
                } else if (touchingCloud && !touchingSun) {
                    // Only rain -> Negative Growth
                    currentFlowerGrowth -= 0.002;
                    isRaining = true;
                    sunInteraction = 0;
                } else {
                    // No hands in sky
                    isRaining = false;
                    sunInteraction = Math.max(0, sunInteraction - 0.05);
                }

                // Clamp growth
                currentFlowerGrowth = Math.max(seedSize, Math.min(maxFlowerGrowth, currentFlowerGrowth));

                // Flower Touch Interaction (Blooming)
                const leftTouchesFlower = leftPoints.some(pt => dist2D(pt, flowerHeadWorld) < 15);
                const rightTouchesFlower = rightPoints.some(pt => dist2D(pt, flowerHeadWorld) < 15);
                
                if (leftTouchesFlower || rightTouchesFlower || dist2D(f1, flowerHeadWorld) < 15) {
                    flowerInteraction += 0.1;
                } else {
                    flowerInteraction -= 0.05;
                }
                flowerInteraction = THREE.MathUtils.clamp(flowerInteraction, 0, 1);
            }
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({
            modelComplexity: 1, smoothLandmarks: true, enableSegmentation: true, 
            smoothSegmentation: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        pose.onResults(onPoseResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();


        // --- 4. RENDER ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            windCtx.fillStyle = 'rgba(0,0,0,0.1)';
            windCtx.fillRect(0,0,mapSize,mapSize);
            windTex.needsUpdate = true;
            grassParams.time.value += 0.016;

            // Visual Updates based on logic
            dirLight.intensity = 1.0 + (sunInteraction * 1.5);
            sun.scale.setScalar(1 + Math.sin(time*5) * 0.1 * sunInteraction);
            sun.material.color.setHex(sunInteraction > 0.5 ? 0xFF9800 : 0xFFEB3B);

            if(isRaining) {
                rainIntensity = Math.min(1, rainIntensity + 0.05);
                rainMat.opacity = rainIntensity;
                const pos = rainGeo.attributes.position.array;
                for(let i=0; i<rainCount; i++) {
                    pos[i*3+1] -= 0.8; 
                    if(pos[i*3+1] < -20) { pos[i*3+1] = 5; pos[i*3] = (Math.random()-0.5)*15; }
                }
                rainGeo.attributes.position.needsUpdate = true;
            } else {
                rainIntensity = Math.max(0, rainIntensity - 0.02);
                rainMat.opacity = rainIntensity;
            }

            // Rainbow if both are active
            if (isRaining && sunInteraction > 0.1) {
                rainbowMat.opacity = Math.min(0.8, rainbowMat.opacity + 0.01);
            } else {
                rainbowMat.opacity = Math.max(0, rainbowMat.opacity - 0.01);
            }

            flowerGroup.rotation.z = Math.sin(time) * 0.05;
            flowerGroup.scale.setScalar(currentFlowerGrowth + (flowerInteraction * 0.1)); 

            // FIXED BLOOMING ANIMATION
            petals.forEach((petal, i) => {
                // Tighter petals when it's just a seed
                const baseOpen = THREE.MathUtils.lerp(0.1, 0.4, currentFlowerGrowth / maxFlowerGrowth);
                
                // Max bloom is now ~1.0 radian (approx 57 degrees) so it looks like an open cup, not flopped over
                petal.rotation.x = THREE.MathUtils.lerp(baseOpen, 1.0, flowerInteraction);
                petal.rotation.x += Math.sin(time * 2 + petal.userData.baseRotY) * 0.05;
            });

            // Pollen Burst 
            if (flowerInteraction > 0.6 && currentFlowerGrowth > 0.4) {
                for(let k=0; k<3; k++) {
                    const headWorldX = flowerGroup.position.x;
                    const headWorldY = flowerGroup.position.y + (12 * currentFlowerGrowth);
                    const headWorldZ = flowerGroup.position.z;

                    pollenPos[pIdx*3] = headWorldX + (Math.random()-0.5)*2;
                    pollenPos[pIdx*3+1] = headWorldY;
                    pollenPos[pIdx*3+2] = headWorldZ + (Math.random()-0.5)*2;
                    pollenVel[pIdx].set((Math.random()-0.5)*0.2, Math.random()*0.3 + 0.1, (Math.random()-0.5)*0.2);
                    pIdx = (pIdx + 1) % 300;
                }
            }
            const pArr = pollenGeo.attributes.position.array;
            for(let i=0; i<300; i++) {
                if(pArr[i*3+1] > -50) {
                    pArr[i*3] += pollenVel[i].x; pArr[i*3+1] += pollenVel[i].y; pArr[i*3+2] += pollenVel[i].z;
                    pArr[i*3] += Math.sin(time*3+i)*0.03;
                    if(pArr[i*3+1] > 40) pArr[i*3+1] = -100;
                }
            }
            pollenGeo.attributes.position.needsUpdate = true;

            // Pulse the hand trackers
            const pulse = 0.8 + Math.sin(time*10)*0.2;
            leftHandMarkers.forEach(m => m.scale.setScalar(pulse));
            rightHandMarkers.forEach(m => m.scale.setScalar(pulse));

            renderer.render(scene, camera);
        }
        animate();

        // --- 5. UTILS ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
        
        // Reset Logic
        document.getElementById('reset-btn').addEventListener('click', () => {
            currentFlowerGrowth = seedSize;
            flowerInteraction = 0;
        });

        window.addEventListener('keydown', (e) => { 
            if (e.key.toLowerCase() === 'f') document.getElementById('fullscreen-btn').click(); 
            if (e.key.toLowerCase() === 'r') document.getElementById('reset-btn').click(); 
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
